# git-cliff config for kuso.
#
# We don't enforce conventional commits, so the parser falls back to
# grouping by free-text prefix (`fix:`, `feat:`, `release:`, etc.)
# AND by manual commit-trailer keywords. The result is a CHANGELOG
# that's "good enough" without forcing every dev (or me, on a Tuesday)
# to write `feat(scope): …` to land a fix.
#
# Regenerate: `git-cliff -o CHANGELOG.md`. release.sh runs this
# automatically when KUSO_RELEASE_COMMIT=1.

[changelog]
header = """
# Changelog

All notable changes to kuso. Generated by `git-cliff` from commit
messages on every release. The format is loosely based on
[Keep a Changelog](https://keepachangelog.com/), versions follow
[SemVer](https://semver.org/) (with a v0.x phase that takes liberties).

> **Operator note (v0.18.85): addon helm upgrades were broken cluster-wide.**
> A `helm.sh/resource-policy: keep` annotation on every addon StatefulSet's
> `volumeClaimTemplates` (added in v0.18.84) is an immutable field — K8s
> rejected the patch, so every pre-existing addon's helm upgrade failed and
> rolled back, and no new templates applied. Most visibly, the addon "Public
> TCP endpoint" toggle set `spec.publicTCP` but the Traefik `IngressRouteTCP`
> never rendered, so `<host>:<port>` 301-redirected to the dashboard instead
> of reaching the addon. **v0.18.85 removes the annotation** (PVC data is
> retained regardless — a StatefulSet never GCs its VCT PVCs). Addons created
> before the annotation self-heal on reconcile; addons created *with* it
> (postgres `*-db`) need a one-time data-safe `kubectl delete sts <name>
> --cascade=orphan` (pods + PVCs survive) before the operator recreates the
> clean StatefulSet. See `memory/addon-vct-annotation-breaks-helm-upgrades.md`.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | split(pat="\n") | first }}{% if commit.id %} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/sislelabs/kuso/commit/{{ commit.id }})){% endif %}
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = false   # we don't enforce them
filter_unconventional = false  # but accept them when they appear
split_commits = false
# Parser rules: classify by leading prefix on the subject line. Order
# matters — earlier patterns win. We keep these tolerant so a sloppy
# `Fix the thing` still lands in Bug Fixes.
commit_parsers = [
  { message = "^[Rr]elease:", skip = true },
  { message = "^v[0-9]+\\.[0-9]+\\.[0-9]+", skip = true },   # release commits
  { message = "^[Mm]erge ", skip = true },
  { message = "^[Bb]ump ", skip = true },
  # Self-referential changelog bookkeeping — these commits ONLY regenerate
  # the changelog/archive, so listing them in the changelog is pure noise
  # (and a post-tag one spawns a duplicate version header). Skip them.
  { message = "^[Cc]hore\\(changelog\\)", skip = true },
  { message = "^[Ff]eat(\\(.+\\))?[:!]", group = "✨ Features" },
  { message = "^[Aa]dd ",                  group = "✨ Features" },
  { message = "^[Ii]ntroduce ",            group = "✨ Features" },
  { message = "^[Ff]ix(\\(.+\\))?[:!]",    group = "🐛 Bug Fixes" },
  { message = "^[Ff]ix ",                  group = "🐛 Bug Fixes" },
  { message = "^[Pp]erf(\\(.+\\))?[:!]",   group = "⚡ Performance" },
  { message = "^[Dd]ocs(\\(.+\\))?[:!]",   group = "📝 Docs" },
  { message = "^[Dd]oc ",                  group = "📝 Docs" },
  { message = "^[Rr]efactor(\\(.+\\))?[:!]", group = "🔨 Refactors" },
  { message = "^[Tt]est(\\(.+\\))?[:!]",   group = "🧪 Tests" },
  { message = "^[Cc]hore(\\(.+\\))?[:!]",  group = "🧹 Chores" },
  { message = "^[Rr]emove ",               group = "🧹 Chores" },
  { message = "^[Cc]i(\\(.+\\))?[:!]",     group = "👷 CI" },
  { message = ".*",                        group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "newest"
