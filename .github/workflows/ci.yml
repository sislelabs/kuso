name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.filter.outputs.cli }}
      operator: ${{ steps.filter.outputs.operator }}
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
      mcp: ${{ steps.filter.outputs.mcp }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            cli:
              - 'cli/**'
              - '.github/workflows/ci.yml'
            operator:
              - 'operator/**'
              - '.github/workflows/ci.yml'
            server:
              - 'server/**'
              - '.github/workflows/ci.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci.yml'
            mcp:
              - 'mcp/**'
              - '.github/workflows/ci.yml'

  cli:
    name: cli (Go)
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: cli/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1

  operator:
    name: operator (Helm)
    needs: changes
    if: needs.changes.outputs.operator == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: operator
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.2
      - name: helm lint all charts
        run: |
          for chart in helm-charts/*/; do
            echo "==> Linting $chart"
            helm lint "$chart"
          done

  server:
    name: server (NestJS)
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: server/yarn.lock
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn lint
      - run: yarn build

  client:
    name: client (Vue)
    needs: changes
    if: needs.changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: client/yarn.lock
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build

  mcp:
    name: mcp (Go)
    needs: changes
    if: needs.changes.outputs.mcp == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: mcp/go.sum
      - run: go mod download
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1
      - run: go test -tags=integration ./... -count=1
