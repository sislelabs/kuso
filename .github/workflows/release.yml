# Release workflow.
#
# Trigger: pushing a tag matching v*.*.* (e.g. v0.7.12). The tag name
# IS the release version — we extract it and pass it through to the
# same release.sh that runs on a developer laptop. The two paths share
# code so behavior stays consistent: same image build, same CLI
# cross-builds, same GH release shape.
#
# A release publishes artifacts. It does NOT touch any kuso cluster.
# Each kuso install pulls itself forward through its in-cluster
# updater (`kuso upgrade`, dashboard Update button, or auto-update).
# Release notes go on the GH release, instances watch GH releases.
# Same path your dev test box, customer A's box, and customer B's box
# all take.

name: release

# To enable: visit
#   https://github.com/orgs/sislelabs/packages/container/kuso-server-go/settings
# → "Manage Actions access" → add this repo with **Write** role.
# Until you do, GITHUB_TOKEN can't push to ghcr and the workflow will
# fail at the docker push step. As a workaround, set a KUSO_GHCR_TOKEN
# repo secret to a classic PAT with `write:packages` scope.
#
# Trigger: tag push matching v*.*.* (e.g. v0.7.13). Local `make ship`
# remains the laptop entry point and works regardless.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write    # gh release create
  packages: write    # ghcr push

jobs:
  release:
    name: Build artifacts + cut GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history so git-cliff / release notes work

      # GITHUB_REF is the only attacker-influenceable input here. We
      # bind it to an env var so the regex check + later use happen
      # outside ${{ }} interpolation — no shell-injection surface even
      # if a malicious tag name slipped past git's own validation.
      - name: Resolve version
        id: ver
        env:
          REF: ${{ github.ref }}
        run: |
          VERSION="${REF#refs/tags/}"
          if ! [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-A-Za-z0-9.]*)?$ ]]; then
            echo "::error::Tag '$VERSION' doesn't match vX.Y.Z; refusing." >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server-go/go.mod
          cache-dependency-path: |
            server-go/go.sum
            cli/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      # We log in with a PAT (KUSO_GHCR_TOKEN, write:packages scope) when
      # available, falling back to GITHUB_TOKEN. The fallback only works
      # if the kuso-server-go package on ghcr is configured to "Inherit
      # access from source repository" — otherwise GITHUB_TOKEN can't
      # push regardless of the workflow's `packages: write` permission.
      # That setting lives at:
      #   https://github.com/orgs/sislelabs/packages/container/kuso-server-go/settings
      # Until it's flipped, set the KUSO_GHCR_TOKEN repo secret with a
      # classic PAT that has write:packages.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.KUSO_GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      # release.sh handles all the build + push + tag + GH-release
      # plumbing. We pass the same env vars `make ship` would, minus
      # KUSO_RELEASE_ROLL (no SSH on this runner). KUSO_RELEASE_PUSH=0
      # because the tag triggering this workflow already exists on
      # origin — release.sh's git push step would no-op anyway, but
      # being explicit avoids a confusing warn line in the log.
      #
      # ALLOW_DIRTY=1 because actions/checkout doesn't always produce
      # a strictly-clean tree (CRLF line-ending edge cases, etc); the
      # tag is the source of truth, not the working tree.
      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Run release.sh
        env:
          KUSO_RELEASE_GH: "1"
          KUSO_RELEASE_CLI: "1"
          KUSO_RELEASE_COMMIT: "0"   # tag already exists; no version-bump commit needed
          KUSO_RELEASE_PUSH: "0"     # see above
          KUSO_RELEASE_OPERATOR: "auto"
          KUSO_RELEASE_ALLOW_DIRTY: "1"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          ./hack/release.sh "$VERSION"

      - name: Summary
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## kuso $VERSION released"
            echo ""
            echo "- Server image: \`ghcr.io/sislelabs/kuso-server-go:$VERSION\`"
            echo "- GH release: https://github.com/$REPO/releases/tag/$VERSION"
            echo ""
            echo "Roll the live cluster from your laptop:"
            echo ""
            echo '```bash'
            echo "make release-roll VERSION=$VERSION"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
