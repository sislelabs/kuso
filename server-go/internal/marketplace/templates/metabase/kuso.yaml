apiVersion: kuso/v1
project: metabase
services:
  - name: metabase
    runtime: image
    port: 3000
    image:
      repository: metabase/metabase
      tag: "v0.51.1.4"
    env:
      MB_DB_TYPE: postgres
      MB_DB_CONNECTION_URI: "${{ metabase-db.DATABASE_URL }}"
    domains:
      - host: "${{ prompt.host }}"
        tls: true
    # Metabase's entrypoint runs adduser + su to drop from root to the
    # metabase user — needs the privilege syscalls kuso drops by default.
    securityContext:
      capabilities:
        add: ["SETUID", "SETGID", "CHOWN", "DAC_OVERRIDE", "FOWNER"]
      allowPrivilegeEscalation: true
addons:
  - name: metabase-db
    kind: postgres
    version: "16"
