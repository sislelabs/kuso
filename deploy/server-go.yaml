---
# ServiceAccount + RBAC for the kuso-server pod.
# The previous deploy bundle relied on hack/install.sh inlining these
# at first install — but anyone running `kubectl apply -f deploy/`
# directly (e.g. to redeploy server-go without re-running the installer)
# got a Deployment that hangs forever on `serviceaccount "kuso-server"
# not found`. Including them here makes the bundle self-sufficient.
#
# The cluster-wide grant is tighter than the install.sh historical
# `cluster-admin` binding: only the verbs the server actually needs,
# scoped to the resources we manage. Tighten further once we land
# the namespace-scoped split tracked for v0.8.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-server
  namespace: kuso
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuso-server
rules:
  # Kuso CRDs we own.
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects, kusoservices, kusoenvironments, kusoaddons,
       kusobuilds, kusocrons]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects/status, kusoservices/status, kusoenvironments/status,
       kusoaddons/status, kusobuilds/status, kusocrons/status]
    verbs: [get, update, patch]
  # Kube-native resources we read/write to manage tenants.
  - apiGroups: [""]
    resources: [namespaces, services, configmaps, secrets, pods, events,
                persistentvolumeclaims, nodes, nodes/status]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/log, pods/exec, pods/portforward]
    verbs: [get, list, create]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [helm.cattle.io]
    resources: [helmcharts]
    verbs: [get, list, watch]
  # Metrics for the per-node sparkline + alert engine.
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuso-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuso-server
subjects:
  - kind: ServiceAccount
    name: kuso-server
    namespace: kuso
---
# kuso-platform priority class — every long-lived control-plane pod
# (kuso-server, kuso-operator, traefik, cert-manager) declares this
# so the kubelet can never evict them in favour of a workload pod.
# Build pods, addons, user services keep the default priority. When
# the node runs hot, the kubelet picks the lowest-priority pod to
# evict, which is now always something the user can tolerate losing.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: kuso-platform
value: 100000
globalDefault: false
description: "kuso control-plane pods. Survives workload eviction."
---
# PodDisruptionBudget keeps voluntary evictions (kubectl drain, the
# k3s upgrade controller, cluster-autoscaler) from yanking the
# kuso-server pod. The cost: drain on the control-plane node will
# wait until a human moves on. The benefit: dashboards stay up
# through routine cluster maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kuso-server
  namespace: kuso
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuso-server-go-data
  namespace: kuso
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-server
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-server
spec:
  replicas: 1
  # Recreate is required because the SQLite PVC is RWO — two pods
  # can't both mount /data simultaneously. Real HA needs a non-SQLite
  # backing store; tracked for v0.7.
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-server }
    spec:
      serviceAccountName: kuso-server
      # Highest-priority class on the cluster — see PriorityClass
      # above. Lets the kubelet pick a workload pod to evict before
      # it ever touches kuso-server when memory pressure hits.
      priorityClassName: kuso-platform
      # Pin to the k3s control-plane node. Two reasons:
      #   1. SQLite PVC is RWO local-path → must stay on its node.
      #   2. The /var/lib/rancher/k3s/server/node-token hostPath only
      #      exists on the control plane — kuso-server reads it to
      #      issue agent-join commands when adding nodes.
      # The well-known node-role.kubernetes.io/control-plane label is
      # set by k3s on the bootstrap node automatically.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      # tolerate the standard control-plane NoSchedule taint k3s sets
      # so this pod is allowed to schedule on the CP node despite the
      # taint. Without this it'd be evicted on cluster restarts.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      # Bumped from 30s to 60s: a graceful shutdown path needs to
      # let in-flight HTTP requests finish (audit-log writes, slow
      # SQLite writes) plus close websocket connections cleanly
      # (logs streamer). Under load, SQLite's WAL checkpoint can
      # take 10–20s by itself.
      terminationGracePeriodSeconds: 60
      containers:
        - name: server
          image: ghcr.io/sislelabs/kuso-server-go:v0.8.10
          imagePullPolicy: IfNotPresent
          # Burstable QoS. The kubelet evicts BestEffort pods first,
          # then Burstable, never Guaranteed. Setting requests below
          # limits puts us in Burstable — sufficient because we want
          # to survive host pressure but don't want to pre-allocate
          # 1 CPU we won't use 95% of the time. Limit at 1 CPU /
          # 768Mi prevents a runaway from eating the whole node.
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: KUSO_HTTP_ADDR, value: ":3000" }
            - { name: KUSO_DB_PATH, value: /data/kuso.sqlite }
            # Log search storage lives in its own SQLite file so the
            # logship goroutine's heavy FTS5 write traffic doesn't
            # contend with the latency-sensitive control-plane writes.
            # Same /data PVC as the main DB; just a separate file.
            - { name: KUSO_LOG_DB_PATH, value: /data/logs.sqlite }
            - { name: KUSO_NAMESPACE, value: kuso }
            - { name: KUSO_ADMIN_USERNAME, value: admin }
            - { name: KUSO_ADMIN_EMAIL, value: admin@kuso.sislelabs.com }
            - { name: KUSO_AUDIT, value: "true" }
            - { name: KUSO_TEMPLATES_ENABLED, value: "false" }
          envFrom:
            - secretRef: { name: kuso-server-secrets }
            - secretRef: { name: kuso-github-app, optional: true }
          # PreStop fires AFTER the pod is marked Terminating but
          # BEFORE SIGTERM. Sleeping here gives the kube-proxy /
          # ingress controller time to remove this pod from their
          # endpoint pool — without it, a new request races the
          # SIGTERM and arrives at a closed port. Bumped from 5s →
          # 15s because traefik can take up to 10s to drain endpoint
          # state under load on a single-node cluster.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          # Probes are on /healthz (cheap; no DB hit). Tolerance
          # bumped because a noisy-neighbor workload (kaniko build
          # pod, postgres dump, prometheus scrape) can starve us of
          # CPU briefly without any actual server problem. Old
          # config killed us after 30s of slowness; new gives ~3min
          # liveness grace and 1min readiness grace before
          # de-registering from the kube Service.
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6        # 30s × 6 = 3min before kill
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6        # 10s × 6 = 1min off-rotation
          startupProbe:
            # Lets the pod take up to 90s to come up without the
            # liveness probe killing it during the cold-start race
            # we hit on a busy node. SQLite WAL recovery + opening
            # both DBs + restoring kube informer state can stretch
            # past the 30s default on a 2-vCPU box.
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 18       # 5s × 18 = 90s
          volumeMounts:
            - { name: data, mountPath: /data }
            # Read-only mount of the k3s server node-token. kuso-server
            # reads this when issuing `K3S_TOKEN=… curl … | sh` on a
            # remote VM during the Add Node flow. The file is
            # 0600 root:root on the host — the kuso-server container
            # runs as root, so the read works without extra perms.
            - name: k3s-token
              mountPath: /etc/kuso/k3s-token
              readOnly: true
              subPath: node-token
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: kuso-server-go-data }
        - name: k3s-token
          hostPath:
            # Mount the directory so subPath can resolve. Bare-file
            # hostPath works in some kube versions but not all; the
            # subPath form is portable.
            path: /var/lib/rancher/k3s/server
            type: Directory
