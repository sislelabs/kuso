---
# ServiceAccount + RBAC for the kuso-server pod.
#
# Two-tier RBAC: a thin ClusterRole (kuso-server) with read-only verbs
# on Secrets cluster-wide so the shared informer can see addon conn
# Secrets in any project namespace; plus a Role (kuso-server-managed-ns)
# stamped into every managed namespace via RoleBinding for write +
# exec verbs. The home `kuso` ns gets the binding via the bootstrap
# step below; each new project ns gets one via EnsureNamespace.
#
# An RCE on kuso-server can still list every Secret in the cluster
# (read-only is required for the informer to function), but can no
# longer mutate Secrets in kube-system or any other ns the operator
# hasn't explicitly given us. pods/exec is similarly limited to
# managed namespaces — the addon-password-repair path only ever
# touches postgres addon pods that live there.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-server
  namespace: kuso
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuso-server
rules:
  # Kuso CRDs we own. kusoes is the cluster-level install/config CRD
  # added in a recent release; without it kuso-server fails its
  # startup config-reload with "kusoes is forbidden" and never goes
  # ready. The kusoes/status subresource is included for symmetry —
  # the reconciler patches phase/conditions there.
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects, kusoservices, kusoenvironments, kusoaddons,
       kusobuilds, kusocrons, kusoruns, kusoes]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects/status, kusoservices/status, kusoenvironments/status,
       kusoaddons/status, kusobuilds/status, kusocrons/status,
       kusoruns/status, kusoes/status]
    verbs: [get, update, patch]
  # Kube-native resources we read/write to manage tenants.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch, create, patch]
  - apiGroups: [""]
    resources: [configmaps]
    # patch + delete were missing on releases through v0.11.1: the
    # in-cluster updater Job (kubectl apply on the kuso-update-status
    # ConfigMap) fails with Forbidden until both are granted, and the
    # progress-status writes during an in-place upgrade hard-fail with
    # 403. delete is granted so the updater can GC its old status CMs.
    verbs: [get, list, watch, create, update, patch, delete]
  # Secrets: read-only at cluster scope so the shared informer can
  # see addon conn Secrets across every project namespace. Writes
  # (create/update/patch/delete) live on the namespace-scoped Role
  # below (kuso-server-managed-ns), bound into each managed ns by
  # EnsureNamespace. An RCE on kuso-server can read Secrets cluster-
  # wide but cannot mutate them outside managed namespaces.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, list, watch]
  # serviceaccounts: the in-process buildcontroller (since v0.10, commit
  # be66c12) creates one ServiceAccount per build Job to gate the build
  # pod's identity for admission webhooks (Kyverno/OPA/PSA). The retired
  # helm-operator chart used to handle SA creation transparently; with
  # that gone, kuso-server itself needs the verb or every build fails at
  # ensureJob with "serviceaccounts is forbidden".
  - apiGroups: [""]
    resources: [serviceaccounts]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [get, list, watch]
  - apiGroups: [""]
    # delete: required by `kuso project delete --purge-data`, which wipes
    # each addon's data PVC for a clean-slate recreate. Without it the
    # purge path 403s ("cannot delete persistentvolumeclaims") and the
    # whole project-delete fails after the CRs are already gone.
    resources: [persistentvolumeclaims]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch, patch, delete]
  - apiGroups: [""]
    resources: [nodes/status]
    verbs: [get, list, watch]
  # pods/log: cluster-wide so the dashboard's log streamer can tail
  # any project pod. Read-only — log reads can't mutate cluster state.
  # pods/exec is intentionally NOT here; it lives on the namespace-
  # scoped Role below so kuso-server can only `kubectl exec` into
  # pods in managed namespaces (where addon repair runs psql ALTER
  # ROLE against postgres addon pods).
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get, list]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  # Leader election. Singleton background workers (build poller,
  # alert engine, nodewatch, daily cleanup) contest a Lease lock so
  # exactly one kuso-server pod runs them at a time. Without these
  # verbs the leader-election helper falls back to "always run" and
  # multi-replica deploys double-promote builds + double-fire alerts.
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [helm.cattle.io]
    resources: [helmcharts]
    verbs: [get, list, watch]
  # CRDs: the in-cluster updater Job (kuso upgrade) applies the
  # crds.yaml shipped with each release so schema additions (new
  # fields on KusoService/KusoEnvironment/etc.) reach the cluster
  # without a manual install step. Without these verbs every upgrade
  # past v0.11.0 fails with `customresourcedefinitions is forbidden`
  # at the kubectl-apply preflight step. Get + create + update +
  # patch are the minimum for `kubectl apply` against an existing
  # CRD; list/watch let the updater see what's already installed
  # before deciding what to add.
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch, create, update, patch]
  # Metrics for the per-node sparkline + alert engine.
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
  # RBAC: kuso-server creates per-project RoleBindings at
  # EnsureNamespace time so it can mutate Secrets + exec into addon
  # pods inside the project namespace. get + list let the stamper
  # check idempotence; create lets it land the binding. delete/patch
  # are NOT granted — once stamped, bindings are immutable from the
  # server's view (project deletion drops the whole namespace, which
  # cascades to the binding).
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [rolebindings]
    verbs: [get, list, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuso-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuso-server
subjects:
  - kind: ServiceAccount
    name: kuso-server
    namespace: kuso
---
# Namespace-scoped Role for the write verbs that don't belong cluster-
# wide. Every managed namespace (home `kuso` + each project ns) gets a
# RoleBinding to this Role. EnsureNamespace stamps the binding for new
# project namespaces; the bootstrap RoleBinding below covers the home
# `kuso` ns. The ClusterRole template is referenced by RoleBinding (not
# Role) so we keep one canonical definition.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuso-server-managed-ns
rules:
  # Secret writes — addon conn Secrets, per-service Secrets, GitHub
  # clone-token Secrets, kuso-server-secrets in the home ns. Scope:
  # ONLY the managed namespace this Role is bound into.
  - apiGroups: [""]
    resources: [secrets]
    verbs: [create, update, patch, delete]
  # pods/exec: addons.repair execs into postgres addon pods to push
  # password resyncs via psql ALTER ROLE. Strictly namespace-scoped
  # to managed project namespaces.
  - apiGroups: [""]
    resources: [pods/exec]
    verbs: [create]
---
# Bootstrap binding for the home `kuso` namespace. New project
# namespaces get their RoleBinding created by EnsureNamespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuso-server-managed-ns
  namespace: kuso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuso-server-managed-ns
subjects:
  - kind: ServiceAccount
    name: kuso-server
    namespace: kuso
---
# kuso-platform priority class — every long-lived control-plane pod
# (kuso-server, kuso-operator, traefik, cert-manager) declares this
# so the kubelet can never evict them in favour of a workload pod.
# Build pods, addons, user services keep the default priority. When
# the node runs hot, the kubelet picks the lowest-priority pod to
# evict, which is now always something the user can tolerate losing.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: kuso-platform
value: 100000
globalDefault: false
description: "kuso control-plane pods. Survives workload eviction."
---
# PodDisruptionBudget keeps voluntary evictions (kubectl drain, the
# k3s upgrade controller, cluster-autoscaler) from yanking the
# kuso-server pod. The cost: drain on the control-plane node will
# wait until a human moves on. The benefit: dashboards stay up
# through routine cluster maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kuso-server
  namespace: kuso
  annotations:
    # Single-replica installs: this PDB will block `kubectl drain`
    # until you scale kuso-server to 2+ replicas. Either:
    #   - kubectl -n kuso scale deploy/kuso-server --replicas=2
    #   - kubectl -n kuso delete pdb kuso-server   # uncordon yourself
    # Multi-replica installs: drain works as expected (PDB allows
    # one disruption while keeping the second pod up).
    kuso.sislelabs.com/single-replica-drain-hint: "scale to 2+ replicas OR delete this PDB before draining the only kuso-server node"
spec:
  # maxUnavailable=1 instead of minAvailable=1 means: tolerate one
  # voluntarily-evicted pod at any moment. On a single-replica
  # deployment this still blocks drain (1 pod can't be 1 unavail
  # AND remain up), but the annotation above tells the operator
  # exactly what to do. On multi-replica it's strictly better than
  # minAvailable=1 because it scales: a 5-replica deploy lets node
  # maintenance roll one host at a time without per-host knob fiddling.
  maxUnavailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-server
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-server
spec:
  # Default 1 replica for indie installs. HA is supported — bump
  # this to 2+ on multi-node clusters by running:
  #
  #   kubectl scale deployment kuso-server -n kuso --replicas=2
  #
  # What's already HA-safe:
  #   - Postgres backend (deploy/postgres.yaml or external managed DB)
  #   - JWT signing key in kube Secret kuso-server-secrets
  #   - Leader-elected singletons (build poller, alert engine,
  #     nodewatch, nodemetrics, audit trim) on Lease objects
  #     kuso-server-singletons + kuso-server-cluster-singletons
  #   - Stateless HTTP handlers (JWT auth, no server-side session)
  #
  # Caveats at >1 replica:
  #   - In-process query caches are per-pod (5-10s stale window
  #     after a write hits pod A but pod B serves the next read —
  #     correctness preserved, just briefly stale UI)
  #   - Per-user WebSocket slot caps are per-pod, so a single user
  #     can hit maxWSPerUser × N pods worth of streams
  #   - WebSocket reconnects on pod failover (acceptable for log
  #     tails; the next frame is the current tail anyway)
  #
  # The DB still needs to be HA on its own — point KUSO_DB_DSN at a
  # managed Postgres (RDS / Crunchy / Supabase) when running >1
  # kuso-server pod, since deploy/postgres.yaml is a single-instance
  # StatefulSet pinned to the control-plane node.
  replicas: 1
  # RollingUpdate replaces the pre-v0.9 Recreate strategy. The RWO
  # PVC was the only reason for Recreate; with Postgres there's no
  # shared-state file, so a new pod can come up while the old one
  # drains. maxUnavailable=0 keeps the dashboard always reachable
  # during a roll.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-server }
      # Opt in to the in-cluster Prometheus's pod-discovery scrape.
      # Picked up by the `kubernetes-pods` job in deploy/prometheus.yaml
      # via the prometheus.io/scrape="true" relabel rule. /metrics is
      # mounted by the chi router on port 8080 (the same port the
      # service listens on); no extra Service needed because the
      # scrape goes pod-to-pod.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kuso-server
      # Highest-priority class on the cluster — see PriorityClass
      # above. Lets the kubelet pick a workload pod to evict before
      # it ever touches kuso-server when memory pressure hits.
      priorityClassName: kuso-platform
      # No nodeSelector — kuso-server is now schedulable on worker
      # nodes. The k3s node-token used to require a hostPath mount on
      # the control-plane, but install.sh now writes the token to a
      # kube Secret (kuso-k3s-token) and mounts it via envFrom on
      # every replica. Single-node installs land on whatever node is
      # available; multi-replica installs spread across the cluster.
      tolerations:
        # Keep this so the pod CAN land on the control-plane node in
        # single-node installs (k3s control-plane has the
        # NoSchedule taint applied by default).
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      # Anti-affinity: when running multi-replica, prefer to spread
      # across nodes. Soft preference (ScheduleAnyway via
      # preferredDuringScheduling) so single-node clusters still
      # schedule both pods on the same host.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kuso-server
      # 60s gives the graceful-shutdown path room to let in-flight
      # requests finish + close websocket connections (logs
      # streamer). Postgres connections close fast; the bound is
      # the slow HTTP work, not DB.
      terminationGracePeriodSeconds: 60
      containers:
        - name: server
          image: ghcr.io/sislelabs/kuso-server-go:v0.18.25
          imagePullPolicy: IfNotPresent
          # Burstable QoS. Setting requests below limits puts us in
          # Burstable — survives host pressure without pre-allocating
          # capacity we won't use 95% of the time.
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: KUSO_HTTP_ADDR, value: ":3000" }
            # Postgres DSN. The install script + the kuso-postgres-
            # dsn-stamp Job (deploy/postgres.yaml) compose this and
            # write it into the kuso-postgres-conn Secret. By default
            # the DSN points at kuso-pgbouncer:6432 (transaction
            # pooler) when PgBouncer is present, falling back to
            # kuso-postgres-rw:5432 otherwise. Deploy-only installs
            # bringing their own Postgres / pooler can replace this
            # with their own valueFrom.
            - name: KUSO_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: kuso-postgres-conn
                  key: dsn
            - { name: KUSO_NAMESPACE, value: kuso }
            - { name: KUSO_ADMIN_USERNAME, value: admin }
            - { name: KUSO_ADMIN_EMAIL, value: admin@example.com }
            # Admin password is now sourced from a mounted file (see
            # volumeMounts below) instead of the envFrom-loaded
            # kuso-server-secrets. The file path is read on first
            # boot only — see cmd/kuso-server/admin_password.go.
            # The env-var path still works as a fallback for
            # backwards-compat with older installs that haven't
            # re-run install.sh.
            - { name: KUSO_ADMIN_PASSWORD_FILE, value: /etc/kuso/admin/password }
            - { name: KUSO_AUDIT, value: "true" }
            - { name: KUSO_TEMPLATES_ENABLED, value: "false" }
          envFrom:
            - secretRef: { name: kuso-server-secrets }
            - secretRef: { name: kuso-github-app, optional: true }
            # k3s server node-token, required to issue agent-join
            # commands. install.sh writes this Secret on initial
            # install (key: token); kuso-server reads
            # KUSO_K3S_TOKEN before falling back to the hostPath
            # mount below. optional=true so existing installs that
            # haven't been re-installed since v0.9.36 keep working.
            - secretRef: { name: kuso-k3s-token, optional: true }
          # PreStop fires AFTER the pod is marked Terminating but
          # BEFORE SIGTERM. Sleeping here gives the kube-proxy /
          # ingress controller time to remove this pod from their
          # endpoint pool. 15s — traefik can take up to 10s to
          # drain endpoint state under load.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          # Liveness checks the process is up — /healthz is cheap and
          # never touches DB. Readiness checks dependencies via /readyz
          # (Postgres ping + kube informer cache synced) so the LB
          # drains a pod whose DB connection is broken instead of
          # silently 5xx-ing every request. Tolerant config absorbs
          # noisy-neighbor CPU starvation without killing the pod:
          # 3min liveness grace, 1min readiness grace.
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            # Up to 90s for first-boot to absorb Postgres connection
            # ping retries (the pod may start before postgres is
            # fully up on a fresh install) plus kube informer
            # restoration. Uses /readyz so we wait for cache sync
            # before serving any traffic.
            httpGet: { path: /readyz, port: http }
            periodSeconds: 5
            failureThreshold: 18
          volumeMounts:
            # Admin bootstrap password projected as a file. Kept off
            # the env so `kubectl exec` / `describe pod` doesn't
            # surface it. Marked optional so OAuth-only installs
            # (no password admin) start without complaint.
            - name: admin-credentials
              mountPath: /etc/kuso/admin
              readOnly: true
      volumes:
        - name: admin-credentials
          secret:
            secretName: kuso-admin-credentials
            optional: true
            # 0444 not 0400: the kuso-server container runs as the non-root
            # `kuso` user (Dockerfile `USER kuso`), and projected secrets
            # are owned by root:root. With 0400 only root can read the
            # file — the kuso user gets EACCES, readAdminPassword() logs
            # "permission denied" and skips first-boot admin bootstrap,
            # leaving no admin user in the DB. 0444 makes the password
            # world-readable inside the pod (still scoped to the mount,
            # still single-tenant, still in-cluster).
            defaultMode: 0444
            items:
              - key: password
                path: password
      # k3s node-token used to be a hostPath
      # of /var/lib/rancher/k3s/server/node-token, which pinned the
      # pod to the control-plane node. Now KUSO_K3S_TOKEN is sourced
      # from the kuso-k3s-token Secret (envFrom above), so the pod
      # can run anywhere. install.sh creates that Secret at install
      # time by reading the node-token from the host. Existing
      # installs that haven't been re-installed since v0.9.36 keep
      # working via the hostPath fallback in nodejoin.ReadServerToken
      # — but only on the control-plane node.
