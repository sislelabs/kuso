apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuso-server-go-data
  namespace: kuso
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-server
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-server
spec:
  replicas: 1
  # Recreate is required because the SQLite PVC is RWO — two pods
  # can't both mount /data simultaneously. Real HA needs a non-SQLite
  # backing store; tracked for v0.7.
  strategy: { type: Recreate }
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-server }
    spec:
      serviceAccountName: kuso-server
      # Pin to the k3s control-plane node. Two reasons:
      #   1. SQLite PVC is RWO local-path → must stay on its node.
      #   2. The /var/lib/rancher/k3s/server/node-token hostPath only
      #      exists on the control plane — kuso-server reads it to
      #      issue agent-join commands when adding nodes.
      # The well-known node-role.kubernetes.io/control-plane label is
      # set by k3s on the bootstrap node automatically.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      # tolerate the standard control-plane NoSchedule taint k3s sets
      # so this pod is allowed to schedule on the CP node despite the
      # taint. Without this it'd be evicted on cluster restarts.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      # 30s grace period: SIGTERM → preStop sleep 5s (lets in-flight
      # requests finish + ingress drain reach this pod's removal) →
      # process gets ~25s to actually quit. Without this, ingress
      # routes new requests to a terminating pod for the first 1-2s
      # of shutdown and they 502.
      terminationGracePeriodSeconds: 30
      containers:
        - name: server
          image: ghcr.io/sislelabs/kuso-server-go:v0.6.30
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: KUSO_HTTP_ADDR, value: ":3000" }
            - { name: KUSO_DB_PATH, value: /data/kuso.sqlite }
            - { name: KUSO_NAMESPACE, value: kuso }
            - { name: KUSO_ADMIN_USERNAME, value: admin }
            - { name: KUSO_ADMIN_EMAIL, value: admin@kuso.sislelabs.com }
            - { name: KUSO_AUDIT, value: "true" }
            - { name: KUSO_TEMPLATES_ENABLED, value: "false" }
          envFrom:
            - secretRef: { name: kuso-server-secrets }
            - secretRef: { name: kuso-github-app, optional: true }
          # PreStop fires AFTER the pod is marked Terminating but
          # BEFORE SIGTERM. Sleeping here gives the kube-proxy /
          # ingress controller time to remove this pod from their
          # endpoint pool — without it, a new request races the
          # SIGTERM and arrives at a closed port. 5s is the
          # standard recommendation for traefik+kube-proxy.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          volumeMounts:
            - { name: data, mountPath: /data }
            # Read-only mount of the k3s server node-token. kuso-server
            # reads this when issuing `K3S_TOKEN=… curl … | sh` on a
            # remote VM during the Add Node flow. The file is
            # 0600 root:root on the host — the kuso-server container
            # runs as root, so the read works without extra perms.
            - name: k3s-token
              mountPath: /etc/kuso/k3s-token
              readOnly: true
              subPath: node-token
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: kuso-server-go-data }
        - name: k3s-token
          hostPath:
            # Mount the directory so subPath can resolve. Bare-file
            # hostPath works in some kube versions but not all; the
            # subPath form is portable.
            path: /var/lib/rancher/k3s/server
            type: Directory
