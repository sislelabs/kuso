---
# ServiceAccount + RBAC for the kuso-server pod.
# The previous deploy bundle relied on hack/install.sh inlining these
# at first install — but anyone running `kubectl apply -f deploy/`
# directly (e.g. to redeploy server-go without re-running the installer)
# got a Deployment that hangs forever on `serviceaccount "kuso-server"
# not found`. Including them here makes the bundle self-sufficient.
#
# The cluster-wide grant is tighter than the install.sh historical
# `cluster-admin` binding: only the verbs the server actually needs,
# scoped to the resources we manage. Tighten further once we land
# the namespace-scoped split tracked for v0.8.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-server
  namespace: kuso
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuso-server
rules:
  # Kuso CRDs we own.
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects, kusoservices, kusoenvironments, kusoaddons,
       kusobuilds, kusocrons]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects/status, kusoservices/status, kusoenvironments/status,
       kusoaddons/status, kusobuilds/status, kusocrons/status]
    verbs: [get, update, patch]
  # Kube-native resources we read/write to manage tenants.
  - apiGroups: [""]
    resources: [namespaces, services, configmaps, secrets, pods, events,
                persistentvolumeclaims, nodes, nodes/status]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/log, pods/exec, pods/portforward]
    verbs: [get, list, create]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets]
    verbs: [get, list, watch, patch, update]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch]
  - apiGroups: [helm.cattle.io]
    resources: [helmcharts]
    verbs: [get, list, watch]
  # Metrics for the per-node sparkline + alert engine.
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuso-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuso-server
subjects:
  - kind: ServiceAccount
    name: kuso-server
    namespace: kuso
---
# kuso-platform priority class — every long-lived control-plane pod
# (kuso-server, kuso-operator, traefik, cert-manager) declares this
# so the kubelet can never evict them in favour of a workload pod.
# Build pods, addons, user services keep the default priority. When
# the node runs hot, the kubelet picks the lowest-priority pod to
# evict, which is now always something the user can tolerate losing.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: kuso-platform
value: 100000
globalDefault: false
description: "kuso control-plane pods. Survives workload eviction."
---
# PodDisruptionBudget keeps voluntary evictions (kubectl drain, the
# k3s upgrade controller, cluster-autoscaler) from yanking the
# kuso-server pod. The cost: drain on the control-plane node will
# wait until a human moves on. The benefit: dashboards stay up
# through routine cluster maintenance.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kuso-server
  namespace: kuso
spec:
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-server
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-server
spec:
  # Single replica. Two constraints keep us here:
  #   1. The build poller assumes singleton (cmd/kuso-server/main.go
  #      has the leader-election TODO). Two pollers double-promote
  #      queued builds.
  #   2. deploy/postgres.yaml is itself a single-instance node-
  #      pinned StatefulSet — kuso-server replicas wouldn't add
  #      availability since the DB is the single point of failure.
  # Real HA requires both the leader-election wrapper AND an
  # external managed Postgres (RDS / Crunchy / Supabase). Until
  # then this is intentional, not aspirational.
  replicas: 1
  # RollingUpdate replaces the pre-v0.9 Recreate strategy. The RWO
  # PVC was the only reason for Recreate; with Postgres there's no
  # shared-state file, so a new pod can come up while the old one
  # drains. maxUnavailable=0 keeps the dashboard always reachable
  # during a roll.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-server }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-server }
    spec:
      serviceAccountName: kuso-server
      # Highest-priority class on the cluster — see PriorityClass
      # above. Lets the kubelet pick a workload pod to evict before
      # it ever touches kuso-server when memory pressure hits.
      priorityClassName: kuso-platform
      # Pin to the k3s control-plane node. The reason is now ONLY
      # the k3s node-token hostPath at /var/lib/rancher/k3s/server,
      # which kuso-server reads when issuing agent-join commands
      # for new VMs. Once that flow moves to a worker-node-friendly
      # mechanism (ssh from a sidecar, or a dedicated join-token
      # Secret), the pin can drop.
      nodeSelector:
        node-role.kubernetes.io/control-plane: "true"
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      # 60s gives the graceful-shutdown path room to let in-flight
      # requests finish + close websocket connections (logs
      # streamer). Postgres connections close fast; the bound is
      # the slow HTTP work, not DB.
      terminationGracePeriodSeconds: 60
      containers:
        - name: server
          image: ghcr.io/sislelabs/kuso-server-go:v0.9.5
          imagePullPolicy: IfNotPresent
          # Burstable QoS. Setting requests below limits puts us in
          # Burstable — survives host pressure without pre-allocating
          # capacity we won't use 95% of the time.
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          ports:
            - { containerPort: 3000, name: http }
          env:
            - { name: KUSO_HTTP_ADDR, value: ":3000" }
            # Postgres DSN. The install script creates a Secret
            # `kuso-postgres-conn` with key `dsn`; deploy-only
            # installs that bring their own Postgres can replace
            # this with their own valueFrom.
            - name: KUSO_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: kuso-postgres-conn
                  key: dsn
            - { name: KUSO_NAMESPACE, value: kuso }
            - { name: KUSO_ADMIN_USERNAME, value: admin }
            - { name: KUSO_ADMIN_EMAIL, value: admin@kuso.sislelabs.com }
            - { name: KUSO_AUDIT, value: "true" }
            - { name: KUSO_TEMPLATES_ENABLED, value: "false" }
          envFrom:
            - secretRef: { name: kuso-server-secrets }
            - secretRef: { name: kuso-github-app, optional: true }
          # PreStop fires AFTER the pod is marked Terminating but
          # BEFORE SIGTERM. Sleeping here gives the kube-proxy /
          # ingress controller time to remove this pod from their
          # endpoint pool. 15s — traefik can take up to 10s to
          # drain endpoint state under load.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]
          # Probes hit /healthz (cheap; no DB hit). Tolerant config
          # absorbs noisy-neighbor CPU starvation without killing
          # the pod: 3min liveness grace, 1min readiness grace.
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          startupProbe:
            # Up to 90s for first-boot to absorb Postgres connection
            # ping retries (the pod may start before postgres is
            # fully up on a fresh install) plus kube informer
            # restoration.
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
            failureThreshold: 18
          volumeMounts:
            # Read-only mount of the k3s server node-token. kuso-server
            # reads this when issuing `K3S_TOKEN=… curl … | sh` on a
            # remote VM during the Add Node flow.
            - name: k3s-token
              mountPath: /etc/kuso/k3s-token
              readOnly: true
              subPath: node-token
      volumes:
        - name: k3s-token
          hostPath:
            path: /var/lib/rancher/k3s/server
            type: Directory
