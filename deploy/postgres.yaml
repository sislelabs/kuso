---
# DO NOT apply this file when KUSO_USE_EXTERNAL_POSTGRES=1.
# hack/install.sh skips it in that mode. If you're doing
# `kubectl apply -f deploy/` against an external Postgres install,
# delete this file from the bundle first OR the dsn-stamp Job will
# fail trying to find a CNPG-managed cluster that doesn't exist.
#
# Metadata Postgres for kuso-server.
#
# v0.9.38: switched from a single-replica StatefulSet on local-path
# RWO to a CloudNativePG-managed Cluster. The old setup pinned
# Postgres to the control-plane node, with a local-path PVC that
# couldn't reschedule — control-plane node failure took the entire
# control plane (auth, audit, env vars, build state, addon secrets)
# offline until manual PVC rescue. The same SPOF the README
# explicitly told users to avoid for HA addons was sitting under
# kuso itself.
#
# CNPG gives us:
#   - 3-instance cluster with continuous WAL streaming between them
#   - Automatic failover (~30s on primary loss) — kuso-server
#     reconnects through the kuso-postgres-rw Service which CNPG
#     points at the current primary
#   - Pod anti-affinity so the 3 instances land on different nodes
#   - Optional WAL-archive backup when the operator wires
#     spec.backup.barmanObjectStore (post-install via kubectl edit)
#
# CNPG operator must be installed first (hack/install.sh handles it,
# or `kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.0.yaml`).
#
# Bootstrap order:
#   1. Install CNPG operator
#   2. Create kuso namespace
#   3. Create kuso-postgres-conn Secret with {user, password, database}
#      keys (install.sh does this with a freshly-generated password)
#   4. Apply this manifest — CNPG bootstraps using the credentials
#      from the Secret, then the dsn-stamp Job patches the same
#      Secret with the {dsn, host, port} composed-field shape
#      kuso-server reads.
#
# Single-node dev clusters (1 worker): set
# KUSO_POSTGRES_SINGLE_NODE=true on the install command, which
# patches `instances: 1` and disables anti-affinity. Default install
# assumes ≥3 nodes.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kuso-postgres
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-postgres
    app.kubernetes.io/component: control-plane-db
spec:
  # Pin a known-good Postgres minor; CNPG ships images at this tag.
  # Bump deliberately on major upgrades; CNPG handles in-place minor
  # upgrades via rolling restart of the standbys then a switchover.
  imageName: "ghcr.io/cloudnative-pg/postgresql:16.4"

  # 3 instances = 1 primary + 2 streaming standbys. Tolerates one
  # node failure without quorum loss; a second failure during
  # recovery degrades to read-only (correct behaviour). Tune to 5
  # for stricter availability targets at the cost of write latency.
  instances: 3

  # Unsupervised: CNPG drives the failover automatically. The
  # alternative ("supervised") requires an operator to bless every
  # promotion, which is wrong for a control-plane DB whose downtime
  # is the actual incident.
  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: kuso
      owner: kuso
      # CNPG reads the {username, password} keys from this Secret
      # on bootstrap. install.sh creates kuso-postgres-conn with
      # those keys before applying this manifest.
      secret:
        name: kuso-postgres-conn

  storage:
    size: 10Gi
    # CNPG falls back to the cluster-default StorageClass when
    # storageClass is unset. On vanilla k3s that's local-path; on a
    # real cluster you'd override at install time with
    # KUSO_POSTGRES_STORAGE_CLASS=longhorn (or similar) — install.sh
    # passes that into the Cluster spec.

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Pod anti-affinity: the 3 instances must land on different nodes.
  # Single-node dev clusters: install.sh kustomize-patches this off.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    # Schedulable on control-plane nodes; we tolerate the standard
    # taint so a 1-node "test cluster" can still schedule (with the
    # single-node patch above).
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  # Same priority class as kuso-server — DB must survive workload
  # eviction on a hot node.
  priorityClassName: kuso-platform

  # CNPG ships a default PodDisruptionBudget (minAvailable=1). Drains
  # roll one instance at a time, with the primary protected until a
  # standby has caught up. We don't override.
---
# v0.9.38: Job that augments kuso-postgres-conn with the dsn key
# kuso-server reads. CNPG's bootstrap creates {clustername}-app with
# {username, password, dbname}; we compose the libpq URI from those
# and write it back to kuso-postgres-conn. install.sh seeded
# kuso-postgres-conn with bootstrap-shape user/password keys; this
# Job adds the composed {dsn, host, port, database} keys kuso-server
# reads.
#
# Idempotent: re-running replaces the dsn/host/port keys. The user/
# password keys are also overwritten on each run with the values
# CNPG actually used during bootstrap — this is the correct
# behaviour because if install.sh re-ran with a stale password (e.g.
# secret was deleted between runs and CNPG bootstrapped against the
# fresh one), kuso-server should connect with what CNPG actually
# minted, not with what install.sh thought it minted.
apiVersion: batch/v1
kind: Job
metadata:
  name: kuso-postgres-dsn-stamp
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-postgres-dsn-stamp
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: kuso-postgres-dsn
      containers:
        - name: stamp
          image: bitnami/kubectl:1.30
          command: [/bin/sh, -ec]
          args:
            - |
              set -e
              # Wait for CNPG to publish the -app Secret (means the
              # primary is up + initdb is done). 5 min budget.
              for i in $(seq 1 60); do
                if kubectl -n kuso get secret kuso-postgres-app >/dev/null 2>&1; then
                  break
                fi
                echo "[stamp] waiting for kuso-postgres-app Secret ($i/60)…"
                sleep 5
              done
              if ! kubectl -n kuso get secret kuso-postgres-app >/dev/null 2>&1; then
                echo "[stamp] FATAL: kuso-postgres-app Secret never appeared. Check the CNPG operator + Cluster status:" >&2
                echo "  kubectl -n kuso describe cluster kuso-postgres" >&2
                echo "  kubectl -n cnpg-system logs deploy/cnpg-controller-manager --tail=200" >&2
                exit 1
              fi
              user=$(kubectl -n kuso get secret kuso-postgres-app -o jsonpath='{.data.username}' | base64 -d)
              pass=$(kubectl -n kuso get secret kuso-postgres-app -o jsonpath='{.data.password}' | base64 -d)
              dbname=$(kubectl -n kuso get secret kuso-postgres-app -o jsonpath='{.data.dbname}' | base64 -d)
              if [ -z "$user" ] || [ -z "$pass" ] || [ -z "$dbname" ]; then
                echo "[stamp] FATAL: kuso-postgres-app Secret has empty username/password/dbname — CNPG bootstrap likely failed." >&2
                kubectl -n kuso get secret kuso-postgres-app -o yaml >&2
                exit 1
              fi
              # Verify the rw Service exists before composing the DSN —
              # CNPG creates it once the primary is healthy. If it's
              # missing the operator hasn't finished promotion yet.
              if ! kubectl -n kuso get service kuso-postgres-rw >/dev/null 2>&1; then
                echo "[stamp] FATAL: Service kuso-postgres-rw doesn't exist yet — CNPG primary not promoted." >&2
                exit 1
              fi
              host="kuso-postgres-rw"
              port="5432"
              dsn="postgres://${user}:${pass}@${host}:${port}/${dbname}?sslmode=disable"
              kubectl -n kuso patch secret kuso-postgres-conn --type=merge \
                -p "$(printf '{"stringData":{"dsn":"%s","host":"%s","port":"%s","username":"%s","user":"%s","password":"%s","database":"%s"}}' \
                  "$dsn" "$host" "$port" "$user" "$user" "$pass" "$dbname")"
              echo "[stamp] kuso-postgres-conn updated; kuso-server can now connect"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kuso-postgres-app]
    verbs: [get]
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kuso-postgres-conn]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kuso-postgres-dsn
subjects:
  - kind: ServiceAccount
    name: kuso-postgres-dsn
    namespace: kuso
