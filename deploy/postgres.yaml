---
# DO NOT apply this file when KUSO_USE_EXTERNAL_POSTGRES=1.
# hack/install.sh skips it in that mode. If you're doing
# `kubectl apply -f deploy/` against an external Postgres install,
# delete this file from the bundle first OR the dsn-stamp Job will
# fail trying to find a CNPG-managed cluster that doesn't exist.
#
# Metadata Postgres for kuso-server.
#
# v0.9.38: switched from a single-replica StatefulSet on local-path
# RWO to a CloudNativePG-managed Cluster. The old setup pinned
# Postgres to the control-plane node, with a local-path PVC that
# couldn't reschedule — control-plane node failure took the entire
# control plane (auth, audit, env vars, build state, addon secrets)
# offline until manual PVC rescue. The same SPOF the README
# explicitly told users to avoid for HA addons was sitting under
# kuso itself.
#
# CNPG gives us:
#   - 3-instance cluster with continuous WAL streaming between them
#   - Automatic failover (~30s on primary loss) — kuso-server
#     reconnects through the kuso-postgres-rw Service which CNPG
#     points at the current primary
#   - Pod anti-affinity so the 3 instances land on different nodes
#   - Optional WAL-archive backup when the operator wires
#     spec.backup.barmanObjectStore (post-install via kubectl edit)
#
# CNPG operator must be installed first (hack/install.sh handles it,
# or `kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.24/releases/cnpg-1.24.0.yaml`).
#
# Bootstrap order:
#   1. Install CNPG operator
#   2. Create kuso namespace
#   3. Create kuso-postgres-conn Secret with {user, password, database}
#      keys (install.sh does this with a freshly-generated password)
#   4. Apply this manifest — CNPG bootstraps using the credentials
#      from the Secret, then the dsn-stamp Job patches the same
#      Secret with the {dsn, host, port} composed-field shape
#      kuso-server reads.
#
# Single-node dev clusters (1 worker): set
# KUSO_POSTGRES_SINGLE_NODE=true on the install command, which
# patches `instances: 1` and disables anti-affinity. Default install
# assumes ≥3 nodes.

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kuso-postgres
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-postgres
    app.kubernetes.io/component: control-plane-db
spec:
  # Pin a known-good Postgres minor; CNPG ships images at this tag.
  # Bump deliberately on major upgrades; CNPG handles in-place minor
  # upgrades via rolling restart of the standbys then a switchover.
  imageName: "ghcr.io/cloudnative-pg/postgresql:16.4"

  # 3 instances = 1 primary + 2 streaming standbys. Tolerates one
  # node failure without quorum loss; a second failure during
  # recovery degrades to read-only (correct behaviour). Tune to 5
  # for stricter availability targets at the cost of write latency.
  instances: 3

  # Unsupervised: CNPG drives the failover automatically. The
  # alternative ("supervised") requires an operator to bless every
  # promotion, which is wrong for a control-plane DB whose downtime
  # is the actual incident.
  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: kuso
      owner: kuso
      # CNPG reads the {username, password} keys from this Secret
      # on bootstrap. install.sh creates kuso-postgres-conn with
      # those keys before applying this manifest.
      secret:
        name: kuso-postgres-conn

  storage:
    size: 10Gi
    # CNPG falls back to the cluster-default StorageClass when
    # storageClass is unset. On vanilla k3s that's local-path; on a
    # real cluster you'd override at install time with
    # KUSO_POSTGRES_STORAGE_CLASS=longhorn (or similar) — install.sh
    # passes that into the Cluster spec.

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Pod anti-affinity: the 3 instances must land on different nodes.
  # Single-node dev clusters: install.sh kustomize-patches this off.
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
    # Schedulable on control-plane nodes; we tolerate the standard
    # taint so a 1-node "test cluster" can still schedule (with the
    # single-node patch above).
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  # Same priority class as kuso-server — DB must survive workload
  # eviction on a hot node.
  priorityClassName: kuso-platform

  # CNPG ships a default PodDisruptionBudget (minAvailable=1). Drains
  # roll one instance at a time, with the primary protected until a
  # standby has caught up. We don't override.
---
# v0.9.38: Job that augments kuso-postgres-conn with the dsn key
# kuso-server reads. CNPG's bootstrap creates {clustername}-app with
# {username, password, dbname}; we compose the libpq URI from those
# and write it back to kuso-postgres-conn. install.sh seeded
# kuso-postgres-conn with bootstrap-shape user/password keys; this
# Job adds the composed {dsn, host, port, database} keys kuso-server
# reads.
#
# Idempotent: re-running replaces the dsn/host/port keys. The user/
# password keys are also overwritten on each run with the values
# CNPG actually used during bootstrap — this is the correct
# behaviour because if install.sh re-ran with a stale password (e.g.
# secret was deleted between runs and CNPG bootstrapped against the
# fresh one), kuso-server should connect with what CNPG actually
# minted, not with what install.sh thought it minted.
apiVersion: batch/v1
kind: Job
metadata:
  name: kuso-postgres-dsn-stamp
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-postgres-dsn-stamp
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: kuso-postgres-dsn
      containers:
        - name: stamp
          image: alpine/k8s:1.30.4
          command: [/bin/sh, -ec]
          args:
            - |
              set -e
              # The user-supplied bootstrap mode (initdb.secret.name)
              # tells CNPG to use kuso-postgres-conn as the SOURCE for
              # the user's password — it does NOT publish a separate
              # kuso-postgres-app Secret. install.sh has already seeded
              # username/password/database into kuso-postgres-conn
              # before this Job runs; we just need to wait for the rw
              # Service (signal that the primary is promoted) and then
              # add the composed dsn key.
              #
              # Pre-fix this Job waited for kuso-postgres-app to appear
              # for 5 minutes and then failed — bootstrap mode never
              # creates that name. Caught when migrating to a new box.
              for i in $(seq 1 60); do
                if kubectl -n kuso get service kuso-postgres-rw >/dev/null 2>&1; then
                  break
                fi
                echo "[stamp] waiting for kuso-postgres-rw Service ($i/60)…"
                sleep 5
              done
              if ! kubectl -n kuso get service kuso-postgres-rw >/dev/null 2>&1; then
                echo "[stamp] FATAL: Service kuso-postgres-rw never appeared. Check the CNPG operator + Cluster status:" >&2
                echo "  kubectl -n kuso describe cluster kuso-postgres" >&2
                echo "  kubectl -n cnpg-system logs deploy/cnpg-controller-manager --tail=200" >&2
                exit 1
              fi
              user=$(kubectl -n kuso get secret kuso-postgres-conn -o jsonpath='{.data.username}' | base64 -d)
              pass=$(kubectl -n kuso get secret kuso-postgres-conn -o jsonpath='{.data.password}' | base64 -d)
              dbname=$(kubectl -n kuso get secret kuso-postgres-conn -o jsonpath='{.data.database}' | base64 -d)
              if [ -z "$user" ] || [ -z "$pass" ] || [ -z "$dbname" ]; then
                echo "[stamp] FATAL: kuso-postgres-conn missing username/password/database — install.sh seeding likely failed." >&2
                kubectl -n kuso get secret kuso-postgres-conn -o yaml >&2
                exit 1
              fi
              # Wait for PgBouncer too — the DSN we stamp points at it
              # (kuso-pgbouncer:6432, transaction-pool mode), so kuso-
              # server can't connect until the pooler is up. Falls
              # back to the direct rw Service after 60s of waiting so
              # a broken/disabled PgBouncer doesn't wedge install
              # forever; operators see the fallback in the log and
              # know to investigate.
              pgbouncer_host="kuso-pgbouncer"
              pgbouncer_port="6432"
              for i in $(seq 1 12); do
                if kubectl -n kuso get service "$pgbouncer_host" >/dev/null 2>&1; then
                  break
                fi
                echo "[stamp] waiting for kuso-pgbouncer Service ($i/12)…"
                sleep 5
              done
              if kubectl -n kuso get service "$pgbouncer_host" >/dev/null 2>&1; then
                host="$pgbouncer_host"
                port="$pgbouncer_port"
                echo "[stamp] routing DSN through PgBouncer at $host:$port"
              else
                host="kuso-postgres-rw"
                port="5432"
                echo "[stamp] PgBouncer not present — falling back to direct rw Service at $host:$port"
              fi
              dsn="postgres://${user}:${pass}@${host}:${port}/${dbname}?sslmode=disable"
              kubectl -n kuso patch secret kuso-postgres-conn --type=merge \
                -p "$(printf '{"stringData":{"dsn":"%s","host":"%s","port":"%s","username":"%s","user":"%s","password":"%s","database":"%s"}}' \
                  "$dsn" "$host" "$port" "$user" "$user" "$pass" "$dbname")"
              echo "[stamp] kuso-postgres-conn updated; kuso-server can now connect"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
rules:
  # Read username/password/database from the user-supplied bootstrap
  # secret (install.sh seeds it before CNPG bootstraps) and patch in
  # the composed DSN + host/port keys once the primary is up.
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [kuso-postgres-conn]
    verbs: [get, patch]
  # Wait for kuso-postgres-rw Service — CNPG creates it once the
  # primary is promoted. The Job uses `kubectl get service` to
  # check; this rule gives it just that one verb on that one name.
  # kuso-pgbouncer is also listed because the Job prefers to route
  # the DSN through PgBouncer when it's reachable.
  - apiGroups: [""]
    resources: [services]
    resourceNames: [kuso-postgres-rw, kuso-pgbouncer]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuso-postgres-dsn
  namespace: kuso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kuso-postgres-dsn
subjects:
  - kind: ServiceAccount
    name: kuso-postgres-dsn
    namespace: kuso
---
# PgBouncer in transaction-pooling mode.
#
# Why: CNPG primary defaults to max_connections=100. Three kuso-server
# replicas (pool=25 each) + the operator + logship + addon pollers
# fills that ceiling the moment a serious install scales horizontally.
# PgBouncer fronts the primary with one process holding ~50 server
# connections and multiplexes thousands of client connections onto
# them — the per-client wait shifts from "wait for a free server
# conn" (slow) to "wait for a free pool slot" (fast).
#
# Mode = transaction. Audited the server-go DB code for incompatible
# usage before flipping this on:
#   - PrepareContext lives on *Tx (transaction-scoped) → safe.
#   - pg_advisory_xact_lock (bootstrap.go) → transaction-scoped → safe.
#   - SET LOCAL statement_timeout (backups.go) → resets on COMMIT → safe.
#   - No LISTEN/NOTIFY, no session-level prepared statements.
#
# When you bring your own managed Postgres (RDS / Crunchy / Supabase)
# point KUSO_DB_DSN at the managed pooler directly and either delete
# this Deployment or set its replicas to 0. The bundled CNPG cluster
# stays present for any addon that's also project-scoped.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kuso-pgbouncer-config
  namespace: kuso
data:
  pgbouncer.ini: |
    [databases]
    ; * matches any dbname client connects with. CNPG bootstrap names
    ; the kuso DB after the install secret's `database` key; we keep
    ; this generic so future migrations (different DB name) don't need
    ; a config update.
    * = host=kuso-postgres-rw port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    ; transaction pool: per-transaction multiplexing. See Mode comment
    ; above for the audit confirming kuso's DB usage is compatible.
    pool_mode = transaction
    ; Per-pool server connections. With 3 kuso-server replicas the
    ; pooler holds at most 3 × 50 = 150 client conns total against
    ; ~50 actual server conns — comfortable under the default
    ; CNPG max_connections=100 with ~50 headroom for CNPG internals,
    ; replication, and admin tooling.
    max_client_conn = 200
    default_pool_size = 25
    ; Reserve a couple of slots so admin SQL (psql -h ...) can always
    ; get in even under heavy app load.
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    ; Bound the time clients wait for a server conn — slow timeout +
    ; fast surfacing of "pool exhausted" beats unbounded wedge.
    query_wait_timeout = 30
    server_idle_timeout = 600
    ; Logs to stderr so kubectl logs works.
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    ignore_startup_parameters = extra_float_digits,search_path
    admin_users = kuso
---
apiVersion: v1
kind: Service
metadata:
  name: kuso-pgbouncer
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-pgbouncer
spec:
  selector:
    app.kubernetes.io/name: kuso-pgbouncer
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kuso-pgbouncer
  namespace: kuso
spec:
  # minAvailable=1 keeps at least one pooler reachable during voluntary
  # disruptions (node drain, autoscaler-down, the k3s upgrade
  # controller). Paired with replicas=2 and the anti-affinity below,
  # a node drain rolls one pooler at a time without taking the whole
  # DB path down.
  minAvailable: 1
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-pgbouncer }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-pgbouncer
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-pgbouncer
spec:
  # 2 replicas because the DSN routes through here by default —
  # a single-replica pooler is a SPOF in front of CNPG's 3-replica
  # HA. Anti-affinity below spreads the pair across nodes when
  # possible. v0.12 shipped this single-replica which was a real
  # availability regression; v0.13 corrects it.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-pgbouncer }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-pgbouncer }
    spec:
      # kuso-platform priority so the kubelet picks a workload pod
      # to evict before the pooler.
      priorityClassName: kuso-platform
      # Prefer to spread the two pooler pods across nodes — when
      # the cluster is single-node both end up there anyway (soft
      # preference, ScheduleAnyway via preferredDuringScheduling).
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: kuso-pgbouncer
      # Init container reads username/password from kuso-postgres-conn
      # and writes the PgBouncer userlist.txt to a shared emptyDir.
      # Done at pod start (not via a Secret mount) because PgBouncer's
      # userlist format is `"user" "md5<hash>"` and CNPG bootstraps
      # the user with a plaintext password we have to hash. Refreshing
      # is a pod restart, which is fine — password rotation is a rare
      # operator action.
      initContainers:
        - name: render-userlist
          image: alpine/k8s:1.30.4
          command: [/bin/sh, -ec]
          args:
            - |
              set -e
              user="$(cat /etc/pg-conn/username)"
              pass="$(cat /etc/pg-conn/password)"
              if [ -z "$user" ] || [ -z "$pass" ]; then
                echo "[render-userlist] FATAL: username/password missing from kuso-postgres-conn" >&2
                exit 1
              fi
              # PgBouncer's userlist.txt format under auth_type=md5 is
              # "username" "md5<hex>", where <hex> is md5(password+username).
              # The previous "plaintext password" approach landed
              # `pq: password authentication failed (08P01)` on every
              # client connect because PgBouncer compares the literal
              # bytes — the plaintext doesn't match the md5 hash the
              # client computes from its credentials.
              #
              # We derive the hash with `md5sum`, which the alpine/k8s
              # image already has. printf -n is portable here because
              # we feed the concatenation through a pipe (no shell
              # newline appended).
              hash="$(printf '%s%s' "$pass" "$user" | md5sum | awk '{print $1}')"
              printf '"%s" "md5%s"\n' "$user" "$hash" > /shared/userlist.txt
              # 0444 (world-readable). The pgbouncer container runs as
              # uid 70 (postgres in edoburu's image), and writes from
              # the init container land as root:root. 0440 prevented
              # pgbouncer from reading its own userlist and the auth
              # path silently failed on every connect.
              chmod 0444 /shared/userlist.txt
          volumeMounts:
            - { name: pg-conn, mountPath: /etc/pg-conn, readOnly: true }
            - { name: shared, mountPath: /shared }
      containers:
        - name: pgbouncer
          # edoburu's tag scheme is v<pgbouncer>-p<patch>, NOT <pgbouncer>.
          # Confirmed against docker.io/edoburu/pgbouncer/tags. The
          # previous "1.23.1" pulled 404 from the registry and wedged
          # the v0.13.0 rollout (server-go now routes through this
          # pooler, so a missing PgBouncer means crashlooping kuso pods).
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          ports:
            - { name: pgbouncer, containerPort: 6432 }
          # Skip the image's default entrypoint (it tries to render its
          # own pgbouncer.ini from env vars); we provide a complete
          # config + userlist via the mounts below. The binary lives
          # at /usr/bin/pgbouncer in the edoburu image (Alpine apk
          # install). If this path changes in a future image bump,
          # `kubectl logs` will show CrashLoopBackoff with the
          # bad-exec message.
          command: ["/usr/bin/pgbouncer"]
          args: ["/etc/pgbouncer/pgbouncer.ini"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 6432 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 6432 }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: config, mountPath: /etc/pgbouncer/pgbouncer.ini, subPath: pgbouncer.ini, readOnly: true }
            - { name: shared, mountPath: /etc/pgbouncer/userlist.txt, subPath: userlist.txt, readOnly: true }
      volumes:
        - name: config
          configMap: { name: kuso-pgbouncer-config }
        - name: pg-conn
          secret:
            secretName: kuso-postgres-conn
            items:
              - { key: username, path: username }
              - { key: password, path: password }
        - name: shared
          emptyDir: {}
