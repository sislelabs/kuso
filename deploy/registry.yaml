# In-cluster Docker registry. Lives at kuso-registry.kuso.svc.cluster.local:5000.
#
# Used by the build pipeline as the destination for kaniko builds. Each
# KusoEnvironment then pulls FROM this registry. Internal-only: no
# Ingress, no public DNS, no TLS. The k3s nodes need to trust the
# registry as an unauthenticated insecure registry — handled in
# hack/install.sh by writing /etc/rancher/k3s/registries.yaml.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuso-registry-data
  namespace: kuso
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-registry
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kuso-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuso-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            # Allow image deletion via DELETE — useful for the cleanup
            # job that prunes preview-env builds.
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kuso-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: kuso-registry
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kuso-registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
---
# v0.9.38: weekly registry GC. The registry binary supports DELETE
# (REGISTRY_STORAGE_DELETE_ENABLED=true above), but every push leaves
# orphan blobs that the registry's own `garbage-collect` subcommand
# has to compact. Without this CronJob, a busy build cluster fills the
# 20Gi PVC silently and kaniko push starts failing with opaque "no
# space left on device" errors that point nowhere obvious.
#
# `--delete-untagged=true` removes blobs no tag references — needed
# because deleting a manifest without this flag leaves the layer
# blobs orphaned forever. We pause the registry first because GC
# isn't safe under concurrent writes (the registry README is explicit
# about this); the build admission cap means a few-minute downtime
# at midnight is harmless.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kuso-registry-gc
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-registry-gc
spec:
  schedule: "17 3 * * 0"  # 03:17 every Sunday
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      # Reap the finished Job (+ its pods) 24h after completion so a failed
      # GC run doesn't linger as an Error pod until the CronJob history
      # limit rotates it out. Matches the TTL convention on kuso's other
      # Jobs (release, previewdb, pkgupdates). successfulJobsHistoryLimit/
      # failedJobsHistoryLimit above still bound how many run records are
      # kept; this ensures timely pod cleanup on top of that.
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: kuso-registry-gc
          # Single-pod design (replaces the v0.9.38 nested kubectl run
          # which baked a 4-line JSON --overrides blob into bash and
          # was a nightmare to maintain). The Pod has two phases:
          #
          #   initContainer scaler  — scales the registry Deployment
          #     to 0 + waits for the pod to drain. Uses the bitnami/
          #     kubectl image and the kuso-registry-gc ServiceAccount
          #     (Role above grants the verbs).
          #
          #   main container gc     — runs the registry binary against
          #     the same PVC the live registry uses (RWO so it's safe
          #     because the live registry is now scaled to 0).
          #
          # PostStop / scale-up runs in a `lifecycle.preStop` block on
          # the gc container — it fires when the GC binary exits
          # successfully OR the pod is killed, so the registry comes
          # back up either way.
          initContainers:
            - name: scaler-down
              image: alpine/k8s:1.30.4
              command: [/bin/sh, -ec]
              args:
                - |
                  set -e
                  echo "[gc] scaling registry down (GC is not safe under concurrent writes)"
                  kubectl -n kuso scale deployment kuso-registry --replicas=0
                  kubectl -n kuso wait --for=delete pod -l app.kubernetes.io/name=kuso-registry --timeout=120s || true
          containers:
            - name: gc
              image: registry:2
              command: [/bin/sh, -ec]
              args:
                - |
                  set -e
                  echo "[gc] running garbage-collect"
                  registry garbage-collect /etc/docker/registry/config.yml --delete-untagged=true
                  echo "[gc] done"
              volumeMounts:
                - { name: data, mountPath: /var/lib/registry }
            - name: scaler-up
              # Sidecar that waits for `gc` to finish and scales the
              # registry back up. We can't rely on initContainer
              # ordering for "post-main" work, so this sidecar pattern
              # is the simplest correct shape.
              #
              # CORRECTNESS: the registry must only come back once GC
              # has genuinely finished (exit 0) or been abandoned.
              # Under restartPolicy=OnFailure a non-zero gc exit is
              # TRANSIENT — kubelet restarts the container in-pod — so
              # scaling up on "terminated" alone would let a restarted
              # GC run concurrently with live registry writes, which
              # the registry README explicitly calls unsafe. So:
              #   - terminated exitCode==0        → restore, exit 0
              #   - terminated exitCode!=0        → keep waiting for the
              #     kubelet restart (crash backoff caps at 5m); only if
              #     it stays dead-failed >10m do we assume kubelet gave
              #     up and restore anyway (registry can't stay down).
              #   - pod killed (Job backoffLimit exhausted deletes the
              #     pod) → TERM trap restores on the way out, inside
              #     the pod's 30s grace period.
              image: alpine/k8s:1.30.4
              command: [/bin/sh, -ec]
              args:
                - |
                  set -e
                  POD=$(hostname)
                  scale_up() {
                    echo "[scaler-up] scaling registry back up"
                    kubectl -n kuso scale deployment kuso-registry --replicas=1
                    kubectl -n kuso rollout status deployment kuso-registry --timeout=120s || true
                  }
                  # Abandonment path: the Job controller terminates the
                  # pod once backoffLimit is exhausted. Restore the
                  # registry before dying — nothing else will.
                  trap 'echo "[scaler-up] pod terminating — restoring registry"; scale_up; exit 0' TERM INT
                  echo "[scaler-up] waiting for gc container in pod $POD"
                  FAILED_SINCE=""
                  while true; do
                    EXIT_CODE=$(kubectl -n kuso get pod "$POD" \
                      -o jsonpath='{.status.containerStatuses[?(@.name=="gc")].state.terminated.exitCode}' 2>/dev/null || echo "")
                    if [ "$EXIT_CODE" = "0" ]; then
                      echo "[scaler-up] gc succeeded"
                      scale_up
                      echo "[scaler-up] done"
                      exit 0
                    elif [ -n "$EXIT_CODE" ]; then
                      # Failed-terminated: kubelet will restart it
                      # (OnFailure). Don't restore writes yet — wait
                      # for the retry. 10m stuck in this state means
                      # no restart is coming; give up and restore.
                      NOW=$(date +%s)
                      if [ -z "$FAILED_SINCE" ]; then FAILED_SINCE=$NOW; fi
                      if [ $((NOW - FAILED_SINCE)) -ge 600 ]; then
                        echo "[scaler-up] gc dead (exit $EXIT_CODE, no restart in 10m) — restoring registry and failing"
                        scale_up
                        exit 1
                      fi
                    else
                      # Running / waiting (includes the post-failure
                      # restart) — reset the stuck-failed clock.
                      FAILED_SINCE=""
                    fi
                    sleep 5
                  done
          volumes:
            - name: data
              persistentVolumeClaim:
                claimName: kuso-registry-data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-registry-gc
  namespace: kuso
---
# Tightly-scoped — only what the GC job needs to scale the registry
# Deployment and run an ephemeral pod against the data PVC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kuso-registry-gc
  namespace: kuso
rules:
  - apiGroups: [apps]
    resources: [deployments, deployments/scale]
    resourceNames: [kuso-registry]
    verbs: [get, patch, update]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [list, watch]
  - apiGroups: [""]
    resources: [pods, pods/log]
    verbs: [get, list, watch, create, delete]
  - apiGroups: [""]
    resources: [persistentvolumeclaims]
    resourceNames: [kuso-registry-data]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kuso-registry-gc
  namespace: kuso
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kuso-registry-gc
subjects:
  - kind: ServiceAccount
    name: kuso-registry-gc
    namespace: kuso
