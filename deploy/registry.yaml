# In-cluster Docker registry. Lives at kuso-registry.kuso.svc.cluster.local:5000.
#
# Used by the build pipeline as the destination for kaniko builds. Each
# KusoEnvironment then pulls FROM this registry. Internal-only: no
# Ingress, no public DNS, no TLS. The k3s nodes need to trust the
# registry as an unauthenticated insecure registry — handled in
# hack/install.sh by writing /etc/rancher/k3s/registries.yaml.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuso-registry-data
  namespace: kuso
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-registry
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-registry
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kuso-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuso-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - name: registry
              containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
            # Allow image deletion via DELETE — useful for the cleanup
            # job that prunes preview-env builds.
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          readinessProbe:
            httpGet:
              path: /
              port: registry
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kuso-registry-data
---
apiVersion: v1
kind: Service
metadata:
  name: kuso-registry
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-registry
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kuso-registry
  ports:
    - name: registry
      port: 5000
      targetPort: registry
