---
# Off-cluster backup of kuso-postgres (the control-plane DB).
#
# Why this is critical: the in-cluster kuso-postgres StatefulSet is the
# single source of truth for users, audit logs, notification configs,
# build metadata, the github-app installation map, addon connection
# secrets, and node-bootstrap tokens. Lose its PVC and every project
# in the cluster orphans. Addon backups (handlers/backups.go) only
# cover user databases — the kuso DB itself was never being backed up
# until this CronJob.
#
# Strategy: pg_dump every hour to S3-compatible object storage. Keeps
# 24 hourly + 7 daily + 12 monthly snapshots. The schedule is opt-in
# via the kuso-postgres-backup Secret — every secretKeyRef below is
# optional:true, and the job exits 0 with a "not configured" log line
# when the Secret is absent/incomplete rather than failing loudly.
# The backup-health banner (internal/backuphealth) reads Secret
# presence, so operators still get nagged to configure it.
#
# Two containers so no tooling is installed at runtime (the pod runs
# as uid 999 with all capabilities dropped — apt-get/installers can't
# work, and shouldn't):
#   initContainer dump   (postgres:16-bookworm)  pg_dump | gzip → emptyDir
#   container    upload  (amazon/aws-cli)        aws s3 cp ← emptyDir
#
# Restore is documented in docs/runbooks/restore-postgres.md and is
# manual: pause kuso-server, exec into postgres pod, psql < dump.sql.
# A future v0.10 will add a /api/admin/restore endpoint.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kuso-postgres-backup
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-postgres-backup
spec:
  # Hourly. Cheap (a single pg_dump of the kuso DB is < 50 MB
  # compressed even at 10k services) and gives an RPO of an hour.
  schedule: "0 * * * *"
  # Don't pile up Jobs if a previous one is still running (e.g. slow
  # S3 upload during a network blip).
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 5
  startingDeadlineSeconds: 600
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kuso-postgres-backup
        spec:
          restartPolicy: OnFailure
          # Pin to the same node as Postgres — the dump streams over
          # localhost between containers but kube-scheduling still
          # decides the node, so this keeps egress local on a single-
          # box install.
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
          volumes:
            - name: workdir
              emptyDir: {}
          initContainers:
            - name: dump
              # postgres image carries pg_dump. It only writes to the
              # shared emptyDir — no runtime package installs (the pod
              # runs non-root with all caps dropped; apt-get can't work).
              image: postgres:16-bookworm
              command: ["/bin/bash", "-eu", "-c"]
              args:
                - |
                  # Opt-in gate: without a complete kuso-postgres-backup
                  # Secret this is a documented no-op (exit 0), not a
                  # failure. The backup-health banner keeps nagging the
                  # operator until the Secret exists.
                  if [ -z "${KUSO_BACKUP_BUCKET:-}" ] || [ -z "${KUSO_BACKUP_ENDPOINT:-}" ] \
                     || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
                    echo "backup not configured (kuso-postgres-backup Secret missing or incomplete) — skipping"
                    exit 0
                  fi

                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  DUMP="/backup/kuso-${TS}.sql.gz"

                  echo "dumping kuso DB → $DUMP"
                  pg_dump --format=plain --no-owner --no-privileges \
                    --quote-all-identifiers \
                    "$KUSO_DB_DSN" | gzip -9 > "$DUMP"

                  SIZE=$(stat -c%s "$DUMP")
                  echo "dump size: $SIZE bytes"

                  # Hand off to the upload container. Retention slot keys
                  # are computed HERE so dump + upload agree on the hour
                  # even if the pod straddles a boundary between containers.
                  cat > /backup/meta.env <<META
                  TS=$TS
                  HOUR=$(date -u +%H)
                  DOW=$(date -u +%u)
                  DOM=$(date -u +%d)
                  MONTH=$(date -u +%m)
                  SIZE=$SIZE
                  DUMP=$DUMP
                  META
              env:
                # DSN of the kuso DB — same Secret kuso-server consumes,
                # so credential rotation flows through automatically.
                - name: KUSO_DB_DSN
                  valueFrom:
                    secretKeyRef:
                      name: kuso-postgres-conn
                      key: dsn
                # S3 target config is read here ONLY for the opt-in
                # gate; the upload container consumes it for real.
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: AWS_ACCESS_KEY_ID, optional: true }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: AWS_SECRET_ACCESS_KEY, optional: true }
                - name: KUSO_BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: KUSO_BACKUP_BUCKET, optional: true }
                - name: KUSO_BACKUP_ENDPOINT
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: KUSO_BACKUP_ENDPOINT, optional: true }
              volumeMounts:
                - { name: workdir, mountPath: /backup }
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
          containers:
            - name: upload
              # Official image already carries the aws CLI — nothing to
              # install at runtime. Pinned for reproducibility.
              image: amazon/aws-cli:2.22.35
              command: ["/bin/sh", "-eu", "-c"]
              args:
                - |
                  if [ ! -f /backup/meta.env ]; then
                    echo "nothing to upload — backup not configured (see dump container log)"
                    exit 0
                  fi
                  . /backup/meta.env
                  DEST_PREFIX="${KUSO_BACKUP_PREFIX:-kuso-postgres}"

                  # Hourly retention: 24 slots, keyed by UTC hour.
                  HOURLY="${DEST_PREFIX}/hourly/${HOUR}.sql.gz"
                  aws s3 cp "$DUMP" "s3://${KUSO_BACKUP_BUCKET}/${HOURLY}" \
                    --endpoint-url "$KUSO_BACKUP_ENDPOINT" \
                    --metadata "kuso-ts=$TS,kuso-size=$SIZE"

                  # Daily retention: 7 slots, keyed by UTC weekday.
                  if [ "$HOUR" = "00" ]; then
                    DAILY="${DEST_PREFIX}/daily/${DOW}.sql.gz"
                    aws s3 cp "$DUMP" "s3://${KUSO_BACKUP_BUCKET}/${DAILY}" \
                      --endpoint-url "$KUSO_BACKUP_ENDPOINT" \
                      --metadata "kuso-ts=$TS,kuso-size=$SIZE"
                  fi

                  # Monthly retention: 12 slots, keyed by month.
                  if [ "$HOUR" = "00" ] && [ "$DOM" = "01" ]; then
                    MONTHLY="${DEST_PREFIX}/monthly/${MONTH}.sql.gz"
                    aws s3 cp "$DUMP" "s3://${KUSO_BACKUP_BUCKET}/${MONTHLY}" \
                      --endpoint-url "$KUSO_BACKUP_ENDPOINT" \
                      --metadata "kuso-ts=$TS,kuso-size=$SIZE"
                  fi

                  echo "backup complete"
              env:
                # HOME must be writable for the aws CLI's config/cache.
                - name: HOME
                  value: /tmp
                # S3-compatible target. The kuso-postgres-backup Secret
                # is operator-supplied; all refs optional so the CronJob
                # no-ops (never errors) until it exists. Set up via:
                #
                #   kubectl create secret generic kuso-postgres-backup \
                #     -n kuso \
                #     --from-literal=AWS_ACCESS_KEY_ID=... \
                #     --from-literal=AWS_SECRET_ACCESS_KEY=... \
                #     --from-literal=KUSO_BACKUP_BUCKET=kuso-backups \
                #     --from-literal=KUSO_BACKUP_ENDPOINT=https://s3.eu-central-1.amazonaws.com \
                #     --from-literal=KUSO_BACKUP_PREFIX=hetzner-prod
                #
                # Works with AWS S3, Backblaze B2, Cloudflare R2,
                # Hetzner Object Storage, MinIO — anything with the
                # AWS S3 API.
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: AWS_ACCESS_KEY_ID, optional: true }
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: AWS_SECRET_ACCESS_KEY, optional: true }
                - name: KUSO_BACKUP_BUCKET
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: KUSO_BACKUP_BUCKET, optional: true }
                - name: KUSO_BACKUP_ENDPOINT
                  valueFrom:
                    secretKeyRef: { name: kuso-postgres-backup, key: KUSO_BACKUP_ENDPOINT, optional: true }
                - name: KUSO_BACKUP_PREFIX
                  valueFrom:
                    secretKeyRef:
                      name: kuso-postgres-backup
                      key: KUSO_BACKUP_PREFIX
                      optional: true
                - name: AWS_DEFAULT_REGION
                  valueFrom:
                    secretKeyRef:
                      name: kuso-postgres-backup
                      key: AWS_DEFAULT_REGION
                      optional: true
              volumeMounts:
                - { name: workdir, mountPath: /backup }
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              securityContext:
                runAsNonRoot: true
                runAsUser: 999
                runAsGroup: 999
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
