# kuso-operator — v0.2 manifest.
#
# Hand-authored, replacing the 2475-line operator-sdk-generated bundle from
# v0.1 which referenced the deleted KusoApp/KusoPipeline/KusoAddon* kinds.
#
# Apply CRDs first:
#   kubectl apply -f operator/config/crd/bases/
# Then this file:
#   kubectl apply -f deploy/operator.yaml
#
# hack/install.sh does both in order.

apiVersion: v1
kind: Namespace
metadata:
  name: kuso-operator-system
  labels:
    control-plane: controller-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-operator
  namespace: kuso-operator-system
---
# v0.2 simplification: grant cluster-admin to the operator. The operator
# reconciles helm charts that emit Deployments, Services, Ingresses,
# StatefulSets, PVCs, Secrets, ConfigMaps, HPAs across multiple namespaces.
# Tighten in v0.3 with explicit Roles per namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuso-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kuso-operator
    namespace: kuso-operator-system
---
# Empty operator config. Reserved for future feature flags.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kuso-operator-config
  namespace: kuso-operator-system
data:
  # Placeholder; the helm-operator binary doesn't read this directly.
  # Future: feature gates, polling intervals, allowed addon kinds.
  version: "v0.2.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-operator-controller-manager
  namespace: kuso-operator-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kuso-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: kuso-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          # Bumped on every release. install.sh rewrites this via sed
          # at apply-time; the literal here is the source of truth
          # for `kubectl apply -f deploy/` direct users — who pulled
          # the long-stale v0.1.0-dev tag pre-v0.9.4.
          image: ghcr.io/sislelabs/kuso-operator:v0.9.5
          imagePullPolicy: Always
          args:
            - "--leader-election-id=kuso-operator"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 64Mi
