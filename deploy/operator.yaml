# kuso-operator — v0.2 manifest.
#
# Hand-authored, replacing the 2475-line operator-sdk-generated bundle from
# v0.1 which referenced the deleted KusoApp/KusoPipeline/KusoAddon* kinds.
#
# Apply CRDs first:
#   kubectl apply -f operator/config/crd/bases/
# Then this file:
#   kubectl apply -f deploy/operator.yaml
#
# hack/install.sh does both in order.

apiVersion: v1
kind: Namespace
metadata:
  name: kuso-operator-system
  labels:
    control-plane: controller-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuso-operator
  namespace: kuso-operator-system
---
# v0.9.38: explicit operator ClusterRole replaces the old
# cluster-admin grant. Audited from operator/helm-charts/* — these
# are the verbs/resources the rendered helm releases actually emit
# across the kuso-app-* namespaces. Tighter than cluster-admin (no
# cluster-scoped writes other than the few CRDs we own + the
# CertManager glue + the leader Lease + helm-release Secrets), so a
# compromised operator pod can't pivot to ClusterRoles, RBAC,
# kube-system, or arbitrary CRDs it doesn't manage.
#
# If a chart needs a verb missing here, the helm release fails with
# a clear "forbidden" message — far better than silently allowing it
# to do anything. Add the new verb here and re-apply.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuso-operator
rules:
  # CRDs we own — read+write for both the resource and its status.
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects, kusoservices, kusoenvironments, kusoaddons,
       kusobuilds, kusocrons, kusoruns]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [application.kuso.sislelabs.com]
    resources:
      [kusoprojects/status, kusoservices/status, kusoenvironments/status,
       kusoaddons/status, kusobuilds/status, kusocrons/status,
       kusoruns/status,
       kusoprojects/finalizers, kusoservices/finalizers,
       kusoenvironments/finalizers, kusoaddons/finalizers,
       kusobuilds/finalizers, kusocrons/finalizers, kusoruns/finalizers]
    verbs: [get, update, patch]
  # Core kube objects helm charts emit per env namespace.
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch, create, update, patch]
  - apiGroups: [""]
    resources:
      [services, endpoints, configmaps, secrets, serviceaccounts,
       persistentvolumeclaims, pods, events]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets, replicasets, daemonsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [roles, rolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  # Cert-manager glue (per-service custom-domain Certificates).
  - apiGroups: [cert-manager.io]
    resources: [certificates, certificaterequests, issuers, clusterissuers]
    verbs: [get, list, watch, create, update, patch, delete]
  # CloudNativePG glue for HA Postgres addons (kept here so a fresh
  # install isn't surprised when ha:true fails). If CNPG isn't
  # installed, these resources don't exist; the verb is harmless.
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters, scheduledbackups, backups, poolers]
    verbs: [get, list, watch, create, update, patch, delete]
  # Leader election (helm-operator's manager.go uses a Lease).
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # k3s native helm shim — used by some bundled addon charts.
  - apiGroups: [helm.cattle.io]
    resources: [helmcharts, helmchartconfigs]
    verbs: [get, list, watch, create, update, patch, delete]
  # Read-only on Nodes so the placement matcher in helm templates
  # can render nodeSelector blocks. No write — placement is decided
  # at the kuso-server side.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuso-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuso-operator
subjects:
  - kind: ServiceAccount
    name: kuso-operator
    namespace: kuso-operator-system
---
# Empty operator config. Reserved for future feature flags.
apiVersion: v1
kind: ConfigMap
metadata:
  name: kuso-operator-config
  namespace: kuso-operator-system
data:
  # Placeholder; the helm-operator binary doesn't read this directly.
  # Future: feature gates, polling intervals, allowed addon kinds.
  version: "v0.2.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-operator-controller-manager
  namespace: kuso-operator-system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: kuso-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      control-plane: controller-manager
  template:
    metadata:
      labels:
        control-plane: controller-manager
    spec:
      serviceAccountName: kuso-operator
      terminationGracePeriodSeconds: 10
      securityContext:
        runAsNonRoot: true
      containers:
        - name: manager
          # Bumped on every release. install.sh rewrites this via sed
          # at apply-time; the literal here is the source of truth
          # for `kubectl apply -f deploy/` direct users — who pulled
          # the long-stale v0.1.0-dev tag pre-v0.9.4.
          image: ghcr.io/sislelabs/kuso-operator:v0.18.26
          imagePullPolicy: Always
          args:
            - "--leader-election-id=kuso-operator"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              # Helm template rendering + Secret lookups (e.g.
              # kusoaddon/s3.yaml's existing-secret lookup) push the
              # operator past 256Mi under reconcile bursts after a
              # fresh install. 256Mi → OOMKill loop → CRs sit in
              # `pending` forever with no Job. 512Mi gives ~2x headroom
              # without taxing single-node 4GB hosts.
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 64Mi
