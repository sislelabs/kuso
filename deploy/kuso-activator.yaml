# kuso-activator — the scale-to-zero request-holding proxy.
#
# Runs the kuso-server image in `--activator` mode. For sleep-enabled
# services the kusoenvironment Ingress routes its backend directly here
# (not the app's own Service): the activator resolves the target env from
# the Host header, scales its Deployment to 1, holds the request until
# the Service has a ready endpoint, then reverse-proxies it. A request to
# a slept (0-replica) app is served instead of 503-ing; when the app is
# awake the activator passes through transparently (~15ms overhead).
#
# See docs/design/SCALE_TO_ZERO.md.
#
# Reuses the kuso-server ServiceAccount + ClusterRole — the activator's
# kube needs (kusoenvironments + deployments get/patch, endpoints read)
# are a subset of what kuso-server already holds, so no new RBAC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuso-activator
  namespace: kuso
  labels:
    app.kubernetes.io/name: kuso-activator
spec:
  # Two replicas: the activator is in the request path for waking apps,
  # so it must survive a node drain without dropping wakes. They don't
  # coordinate — all shared state is on the Deployment objects they
  # scale, so racing replicas converge.
  replicas: 2
  selector:
    matchLabels: { app.kubernetes.io/name: kuso-activator }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app.kubernetes.io/name: kuso-activator }
    spec:
      serviceAccountName: kuso-server
      priorityClassName: kuso-platform
      containers:
        - name: activator
          image: ghcr.io/sislelabs/kuso-server-go:v0.18.127
          args: ["--activator"]
          env:
            - { name: KUSO_HTTP_ADDR, value: ":3000" }
            - { name: KUSO_NAMESPACE, value: kuso }
          ports:
            - { name: http, containerPort: 3000 }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            # The activator is a thin proxy — small footprint. It's a
            # fixed shared cost amortized across every scaled-to-zero app.
            requests: { cpu: 25m, memory: 64Mi }
            limits: { memory: 256Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: kuso-activator
  namespace: kuso
  labels: { app.kubernetes.io/name: kuso-activator }
spec:
  selector: { app.kubernetes.io/name: kuso-activator }
  ports:
    - { name: http, port: 80, targetPort: 3000, protocol: TCP }
---
# Catch-all fallback route. A domain pointed at kuso with NO matching
# service (e.g. a base domain when only www.<domain> is configured, or a
# typo'd host) otherwise lands on traefik's bare "404 page not found".
# This lowest-priority PathPrefix(`/`) route claims every host no specific
# Ingress matches and sends it to the activator, which serves a branded
# "no service here" page. `priority: 1` guarantees any real per-service
# route (they don't set priority → default higher) wins, so this only ever
# catches genuinely-unclaimed hosts. Rendered on plain HTTP; the websecure
# variant relies on traefik's default cert (an unclaimed host has no kuso
# cert, so the browser shows "Not secure" — the branded page still renders).
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kuso-activator-catchall
  namespace: kuso
  labels: { app.kubernetes.io/name: kuso-activator }
spec:
  entryPoints: [web, websecure]
  routes:
    - match: PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: kuso-activator
          port: 80
