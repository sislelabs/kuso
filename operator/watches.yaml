# helm-operator watches. v0.2 reshape.
#
# maxConcurrentReconciles bumps each kind's worker pool from the
# helm-operator default of 1. Reconcile is one-helm-render-and-apply
# per CR, taking ~500ms-2s; with N=1 a fresh restart on a 200-service
# cluster takes 3-7 minutes to catch up because reconciles serialise
# per kind. Bumping to 4 cuts that to ~1-2 minutes without overwhelming
# the kube-apiserver — each reconcile is mostly CPU-bound on rendering
# helm templates, not API throughput. Tune up further only if reconcile
# lag is actually visible at scale.
#
# Removed in v0.9.61: the legacy "Kind: Kuso" entry. That CRD was
# retired pre-v0.5 and never came back, but the watch survived in
# this file. On a fresh install (no kusoes CRD registered) the
# operator's cache-sync timed out trying to watch a non-existent
# resource and the entire manager exited non-zero, so NO CR got
# reconciled — addons stayed as YAML, services never came up.
# Caught during the migration to the 16GB box.
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoProject
  chart: helm-charts/kusoproject
  reconcilePeriod: 3m
  maxConcurrentReconciles: 4
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoService
  chart: helm-charts/kusoservice
  # Service + Environment are the highest-cardinality kinds (one Service
  # and >=1 Environment per app). At hundreds of each, a 3m periodic
  # resync means ~600 full helm renders every 3 minutes — reconcile lag
  # grows unboundedly somewhere past ~300 CRs. Spec edits still reconcile
  # immediately via the watch, so the periodic resync only self-heals
  # drift; a 10m cadence is plenty and 8 workers clears a restart backlog
  # faster. Same rationale the KusoAddon 30m period already relies on.
  reconcilePeriod: 10m
  maxConcurrentReconciles: 8
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoEnvironment
  chart: helm-charts/kusoenvironment
  reconcilePeriod: 10m
  maxConcurrentReconciles: 8
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoAddon
  chart: helm-charts/kusoaddon
  # Addons are stateful and rarely change after creation; spec edits still
  # reconcile immediately via the watch. The periodic resync only exists to
  # self-heal drift, so a slow cadence is plenty. Crucially it bounds the
  # blast radius of any residual render-vs-stored mismatch: every periodic
  # reconcile that decides to `helm upgrade` re-applies the addon Service,
  # and a Service re-apply makes the CNI reprogram iptables — a brief window
  # where the addon ClusterIP refuses connections. The conn-Secret base64
  # `data:` fix removes the usual mismatch; this longer period is the
  # belt-and-braces so a future drift source can't churn datastores every
  # 3 minutes and flake migration release Jobs / `kuso run`.
  reconcilePeriod: 30m
  maxConcurrentReconciles: 4
# KusoBuild was removed from the operator's watch list as of v0.10.
# Builds are now rendered to Jobs in-process by the kuso-server
# build controller (server-go/internal/buildcontroller). The chart
# at helm-charts/kusobuild/ remains in the tree as a compatibility
# stub for older clusters; new installs do not deploy it.
#
# The old block accumulated three workarounds for the
# helm-operator path: per-CR helm-render tax (3 min reconcile), a
# build-state=done watch selector (otherwise every old CR
# reconciled forever burning CPU), and a sharp-edged Cancel path
# that had to delete the CR + the Job + the helm-release secret
# to stop resurrection. The Go controller replaces all three with
# direct Job creation owned by an informer event handler.
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoCron
  chart: helm-charts/kusocron
  reconcilePeriod: 3m
  maxConcurrentReconciles: 4
- group: application.kuso.sislelabs.com
  version: v1alpha1
  kind: KusoRun
  chart: helm-charts/kusorun
  # Runs are terminal-by-design — once the chart renders the Job
  # there's nothing for the operator to do until spec.done flips. A
  # 5m reconcile period is plenty; the run-phase write path goes
  # through the kuso-server runs poller, not helm-operator.
  reconcilePeriod: 5m
  maxConcurrentReconciles: 4
#+kubebuilder:scaffold:watch
