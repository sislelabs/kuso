{{- /* Workers have no HTTP surface — no ingress regardless of host.
       Internal=true services keep their kube Service (so other pods
       can reach them via in-cluster DNS) but skip the Ingress
       entirely — no public domain, no Let's Encrypt cert, no
       traefik route. The user opts into this in Settings →
       Networking → Internal-only. */ -}}
{{- if and
      (not (eq (default "" .Values.runtime) "worker"))
      (not .Values.internal) -}}
{{- $primary := .Values.host -}}
{{- $extra := default (list) .Values.additionalHosts -}}
{{- $hosts := list -}}
{{- if $primary -}}
  {{- $hosts = append $hosts $primary -}}
{{- end -}}
{{- range $extra -}}
  {{- if . -}}{{- $hosts = append $hosts . -}}{{- end -}}
{{- end -}}
{{- /* Filter hosts to only those eligible for a public Let's
       Encrypt cert. The server pre-computes this list (using the
       Mozilla public-suffix database, which catches "hui.com" as
       valid AND "service.hui" as not — a fake-TLD test that the
       chart can't replicate without shipping the 80kB suffix list).
       It writes the result onto KusoEnvironment.spec.tlsHosts.

       Why this matters: traefik's ingress tls block is all-or-
       nothing — one missing primary secret on the Ingress means
       traefik falls back to TRAEFIK DEFAULT CERT for *every* host
       on the same Ingress, including custom domains the user added
       later that DO have valid LE certs. Pre-v0.9.5 a user typing
       "hui" as their baseDomain bricked HTTPS for the whole
       service even after they added a real custom domain; the user
       saw "I added a custom domain, the cert minted, the URL still
       serves a self-signed cert" with no obvious cause.

       Fallback: when tlsHosts is nil/empty (legacy CRs from a
       pre-v0.9.5 server, or charts rendered offline without the
       server in the loop), apply a chart-level minimum filter
       (multi-label, non-reserved-suffix) so legacy data still
       produces a usable Ingress.
     */ -}}
{{- $tlsHosts := list -}}
{{- /* Intersect any server-stamped tlsHosts with the currently-rendered
       $hosts: a host pinned in .Values.tlsHosts that's no longer in
       primary/additionalHosts is stale (the user removed the domain or
       the env's Host got patched out-of-band by `kubectl edit`).
       Keeping stale entries would mint extra Let's Encrypt certs for
       domains the Ingress doesn't actually serve anymore.

       Falls through to the TLD-suffix filter when tlsHosts is empty —
       legacy CRs that predate the server-stamping (pre-v0.9.5) or
       offline-rendered charts. */ -}}
{{- $reservedSuffix := list "local" "internal" "localhost" "test" "example" "invalid" "arpa" -}}
{{- if .Values.tlsHosts -}}
  {{- $hostSet := dict -}}
  {{- range $hosts -}}{{- $_ := set $hostSet . true -}}{{- end -}}
  {{- range .Values.tlsHosts -}}
    {{- if hasKey $hostSet . -}}
      {{- $tlsHosts = append $tlsHosts . -}}
    {{- end -}}
  {{- end -}}
{{- else -}}
  {{- range $hosts -}}
    {{- $h := . -}}
    {{- $parts := splitList "." $h -}}
    {{- if gt (len $parts) 1 -}}
      {{- $tld := lower (index $parts (sub (len $parts) 1)) -}}
      {{- if and (ge (len $tld) 2) (not (has $tld $reservedSuffix)) -}}
        {{- $tlsHosts = append $tlsHosts $h -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- /* Belt-and-braces: always include the primary host if it passes
       the same TLD filter, even when tlsHosts was server-stamped
       without it (happens when env.spec.host was patched via kubectl
       after env-create and the server didn't propagate the update).
       Without this the Ingress's PRIMARY host gets no tls entry,
       traefik falls back to its default self-signed cert, and the
       browser's HSTS error fires. */ -}}
{{- if and $primary .Values.tlsEnabled -}}
  {{- $primaryParts := splitList "." $primary -}}
  {{- if gt (len $primaryParts) 1 -}}
    {{- $primaryTLD := lower (index $primaryParts (sub (len $primaryParts) 1)) -}}
    {{- if and (ge (len $primaryTLD) 2) (not (has $primaryTLD $reservedSuffix)) -}}
      {{- if not (has $primary $tlsHosts) -}}
        {{- $tlsHosts = prepend $tlsHosts $primary -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if $hosts }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kusoenvironment.fullname" . }}
  labels:
    {{- include "kusoenvironment.labels" . | nindent 4 }}
  {{- if and .Values.tlsEnabled $tlsHosts }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.clusterIssuer | quote }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingressClassName | quote }}
  {{- /* Skip the tls block entirely if no host qualifies — the
         Ingress still serves HTTP traffic on every host, just no
         HTTPS. cert-manager.io/cluster-issuer annotation is also
         dropped in that case so cert-manager doesn't issue empty
         orders. */ -}}
  {{- if and .Values.tlsEnabled $tlsHosts }}
  tls:
    {{- /* One TLS entry per host so cert-manager mints + maintains
           a per-host certificate. Bundling all hosts under a single
           secret would cap us at 100 SANs per cert and force a re-
           issue on every domain edit; per-host certs roll
           independently.

           Primary host keeps the legacy secretName "<fqn>-tls" so
           the cert minted before custom-domain support shipped
           survives the chart upgrade — re-issuing it would burn the
           Let's Encrypt prod rate limit on a no-op (5 failed
           validations/hour, 50 certs/week per registered domain).
           Additional hosts get "<fqn>-tls-extra-<host>" with the
           host pinned into the secret name so adding/removing one
           never re-orders the others' secrets. */ -}}
    {{- range $i, $h := $tlsHosts }}
    - hosts:
        - {{ $h | quote }}
      {{- /* Match the original "primary" naming when this is the
             KusoEnvironment primary host (Values.host), regardless
             of the position in the TLS-eligible list. Otherwise
             the primary's secretName flips to a non-primary one
             whenever the primary itself is filtered out. */}}
      {{- if eq $h $.Values.host }}
      secretName: {{ printf "%s-tls" (include "kusoenvironment.fullname" $) | quote }}
      {{- else }}
      secretName: {{ printf "%s-tls-extra-%s" (include "kusoenvironment.fullname" $) (regexReplaceAll "[^a-z0-9-]" (lower $h) "-") | quote }}
      {{- end }}
    {{- end }}
  {{- end }}
  rules:
    {{- /* Scale-to-zero: for sleep-enabled services route the Ingress
           backend to the shared kuso-activator instead of the app's own
           Service. The activator resolves the target by Host, wakes the
           Deployment, and proxies the held request — so a request to a
           0-replica (slept) app is served instead of 503-ing. When the
           app is awake the activator transparently passes through with
           ~15ms overhead. (The errors-middleware approach was tried
           first but traefik didn't reliably forward/hold the request;
           a direct backend is the validated mechanism — see
           docs/design/SCALE_TO_ZERO.md.) */ -}}
    {{- /* Route to the activator when the env is sleep-enabled OR
           hard-stopped. Sleeping: activator wakes it on the request.
           Stopped: activator refuses to wake and serves a branded
           "service stopped" page — WITHOUT this, a stopped (non-sleeping)
           env routes to its own 0-endpoint Service and traefik returns a
           bare "no available server" instead. */ -}}
    {{- $useActivator := or (and .Values.sleep .Values.sleep.enabled) .Values.stopped -}}
    {{- range $hosts }}
    - host: {{ . | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if $useActivator }}
                name: kuso-activator
                port:
                  number: 80
                {{- else }}
                name: {{ include "kusoenvironment.fullname" $ }}
                port:
                  name: http
                {{- end }}
    {{- end }}
{{- end }}
{{- /* Wildcard hosts (spec.wildcardDomains): a SEPARATE Ingress with
       NO cert-manager annotation. Each entry serves "*.example.com"
       with a pre-provisioned TLS secret (a DNS-01 wildcard cert the
       operator minted out of band). Two reasons for the split:
         1. cert-manager's ingress-shim creates a Certificate for every
            tls[] entry on an annotated Ingress — it would try (and
            fail, HTTP-01) to issue for the wildcard, burning LE quota
            on retries.
         2. Keeping per-host and wildcard TLS blocks independent means
            a missing wildcard secret can't drag the per-host Ingress
            into traefik's default-cert fallback.
       Backend logic (activator vs service) mirrors the main Ingress. */ -}}
{{- if and
      (not (eq (default "" .Values.runtime) "worker"))
      (not .Values.internal)
      .Values.wildcardDomains }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kusoenvironment.fullname" . }}-wildcard
  labels:
    {{- include "kusoenvironment.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingressClassName | quote }}
  {{- if .Values.tlsEnabled }}
  tls:
    {{- range .Values.wildcardDomains }}
    - hosts:
        - {{ .host | quote }}
      secretName: {{ .tlsSecret | quote }}
    {{- end }}
  {{- end }}
  rules:
    {{- $useActivator := or (and .Values.sleep .Values.sleep.enabled) .Values.stopped -}}
    {{- range .Values.wildcardDomains }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if $useActivator }}
                name: kuso-activator
                port:
                  number: 80
                {{- else }}
                name: {{ include "kusoenvironment.fullname" $ }}
                port:
                  name: http
                {{- end }}
    {{- end }}
{{- end }}
{{- end }}
