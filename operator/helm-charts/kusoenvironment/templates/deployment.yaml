apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kusoenvironment.fullname" . }}
  labels:
    {{- include "kusoenvironment.labels" . | nindent 4 }}
spec:
  {{/*
    Holding state before the first build: a service whose build pipeline
    hasn't produced an image yet has image.repository="". Without a guard
    the container image renders as ":latest", the kubelet rejects it with
    InvalidImageName, and the Deployment crash-loops a placeholder pod
    that confuses users ("why is my brand-new service failing?"). Pin
    replicas to 0 until a real image lands so the service sits in a clean
    "awaiting first build" state (0/0, no crash-loop) instead. The build
    promote patches spec.image.repository, the operator reconciles, and
    the Deployment scales up to replicaCount on its own. runtime=image
    services set image.repository directly so they skip this hold.

    Replicas: only stamp spec.replicas when autoscaling is OFF. With an
    HPA wired up, helm-operator reconciles every 3m and would otherwise
    keep clobbering the autoscaler's chosen replica count back to
    replicaCount, producing periodic capacity dips and 503s during
    traffic spikes. Standard chart pattern: omit the field when the HPA
    owns it.
  */}}
  {{- if .Values.stopped }}
  {{/* Hard stop wins over everything: pin to 0 AND (via hpa.yaml gating
       the HPA off when stopped) keep the autoscaler from scaling it back
       up. Distinct from scale-to-zero sleep — the activator refuses to
       wake a stopped env, so this stays at 0 until the user starts it. */}}
  replicas: 0
  {{- else if not .Values.image.repository }}
  replicas: 0
  {{- else if not (and .Values.autoscaling .Values.autoscaling.enabled) }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{/*
    Bounded rollout history. Default is 10. When a rollout wedges (new
    image crashloops while the cluster still keeps the last-Ready RS
    around, e.g. placeholder DATABASE_URL → instant exit), kuso users
    can pile up 20+ orphan ReplicaSets on a single service in an hour
    of secret editing. They cost ~nothing operationally but they
    clutter `kubectl get rs` and the kuso UI's deployment view. Three
    is enough for "roll back the last bad push" + one in flight.
    Override via .Values.revisionHistoryLimit if a user needs deeper
    rollback (forensic audits, regulated environments).
  */}}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit | default 3 }}
  {{- /*
    Zero-downtime rolling update. maxSurge=1 + maxUnavailable=0 means
    kube ALWAYS brings up a new pod and waits for it to be Ready
    before killing any old pod, even at replicas=1. Combined with the
    HTTP readinessProbe below this is what makes env-var edits roll
    without dropping requests — the new pod has to actually answer on
    its port before traffic shifts. Without these two, the default
    25%/25% strategy on a single-replica deployment briefly runs zero
    Ready pods and clients see connection-refused / 503.
  */}}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "kusoenvironment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoenvironment.selectorLabels" . | nindent 8 }}
        {{- include "kusoenvironment.labels" . | nindent 8 }}
        {{- if not .Values.privateEgress }}
        kuso.sislelabs.com/network-egress-public: "true"
        {{- end }}
        {{- if .Values.platformApiEgress }}
        kuso.sislelabs.com/network-egress-platform-api: "true"
        {{- end }}
      {{- with .Values.secretsRev }}
      annotations:
        kuso.sislelabs.com/secrets-rev: {{ . | quote }}
      {{- end }}
    spec:
      # Pod-level securityContext kept minimal so users' Dockerfiles
      # can pick their own USER directive (named users like
      # `nextjs`, `node`, `nginx` are widely used and kubelet's
      # runAsNonRoot=true admission gate rejects them with
      # "image has non-numeric user, cannot verify user is non-root".
      # Container-level capabilities are still dropped below — same
      # blast-radius reduction without breaking real-world images.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # User pods don't need to talk to the kube apiserver. Disable
      # the default SA token mount so a compromised app container
      # can't list secrets / impersonate ServiceAccounts. Apps that
      # genuinely need kube access can opt back in via a custom
      # serviceAccountName + automountServiceAccountToken: true on
      # the parent KusoService spec (future work).
      automountServiceAccountToken: false
      {{- /*
        Placement — pin to a subset of nodes by label and/or hostname.
        labels become a nodeSelector; nodes become a required
        nodeAffinity matchExpression. When labels.region is set we
        also add a matching toleration so the kuso.sislelabs.com/region
        NoSchedule taint that the labels editor reconciles doesn't
        block scheduling.
      */}}
      {{- with .Values.placement }}
      {{- /*
        Value labels → nodeSelector (exact match). Empty-value labels are
        capability flags (e.g. `gpu`): a nodeSelector with value "" would
        exact-match the empty string, NOT check presence, so those render
        as a nodeAffinity Exists matchExpression instead. Both empty-label
        Exists terms and the hostname pin (.nodes) share one nodeAffinity
        matchExpressions list so they AND together.
      */}}
      {{- $valueLabels := dict }}
      {{- $flagLabels := list }}
      {{- range $k, $v := .labels }}
      {{- if $v }}{{ $_ := set $valueLabels $k $v }}{{ else }}{{ $flagLabels = append $flagLabels $k }}{{ end }}
      {{- end }}
      {{- if $valueLabels }}
      nodeSelector:
        {{- range $k, $v := $valueLabels }}
        {{ printf "kuso.sislelabs.com/%s" $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
      {{- if or .nodes $flagLabels }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  {{- range $flagLabels }}
                  - key: {{ printf "kuso.sislelabs.com/%s" . | quote }}
                    operator: Exists
                  {{- end }}
                  {{- if .nodes }}
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .nodes }}
                      - {{ . | quote }}
                      {{- end }}
                  {{- end }}
      {{- end }}
      {{- if .labels.region }}
      tolerations:
        - key: kuso.sislelabs.com/region
          operator: Equal
          value: {{ .labels.region | quote }}
          effect: NoSchedule
      {{- end }}
      {{- end }}
      {{- /*
        Even spread: when replicaCount > 1, land each replica on a
        different node so a single host reboot/outage can't take all
        replicas down.

        whenUnsatisfiable is driven by spec.spreadPolicy, which the
        server sets from the live schedulable-node count:
          - "hard"  → DoNotSchedule: a HARD guarantee — two replicas
            cannot both sit on one node while another node is free.
            Set only when there's >1 schedulable node, so nothing hangs
            Pending.
          - "soft"/unset → ScheduleAnyway: best-effort. The default, and
            what a single-node cluster gets (so the 2nd replica still
            schedules on the only node).
        Default "soft" keeps existing env CRs (no spreadPolicy yet)
        rendering exactly as before until the server re-stamps them.

        When the user pins via placement.nodes (specific hostnames),
        spread is meaningless, so we skip the block entirely.
      */}}
      {{- if and (gt (int .Values.replicaCount) 1) (not (and .Values.placement .Values.placement.nodes)) }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: {{ if eq (.Values.spreadPolicy | default "soft") "hard" }}DoNotSchedule{{ else }}ScheduleAnyway{{ end }}
          labelSelector:
            matchLabels:
              {{- include "kusoenvironment.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ if and .Values.securityContext .Values.securityContext.allowPrivilegeEscalation }}true{{ else }}false{{ end }}
            capabilities:
              drop: ["ALL"]
              {{- with .Values.securityContext }}
              {{- with .capabilities }}
              {{- with .add }}
              add:
                {{- range . }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
              {{- end }}
              {{- end }}
          {{- /* Any service may override the image's default CMD with a
                 user-supplied command. Workers use it for queue consumers
                 (e.g. `bundle exec sidekiq`); web services use it to pick
                 one of several processes baked into an image (e.g. run only
                 the Next.js server in a container that bundles a sidecar
                 that would otherwise contend for the same PORT). Empty =
                 keep the image's default CMD. */}}
          {{- if .Values.command }}
          command:
            {{- range .Values.command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- /* Workers have no HTTP port + no probes — they're
                 long-running queue consumers. Web services expose
                 .Values.port and inherit standard probes (set by
                 the kuso server when wiring the env). */}}
          {{- if not (eq (default "" .Values.runtime) "worker") }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- end }}
          {{- /*
            Auto-inject PORT for web services. Most app frameworks
            (Express, Flask, FastAPI, Rails, Spring Boot) read $PORT
            and bind there; if we don't set it the app falls back to
            its built-in default (3000, 5000, 8080), the kube Service
            forwards to the wrong containerPort, and traefik returns
            502 — the most common newcomer footgun. PORT is on the
            kuso reservedEnvNames list so users can't override (the
            value would silently desync from spec.port). Workers
            don't bind a port so we skip the injection there; their
            envVars (if any) still render below.
          */}}
          {{- $isWeb := not (eq (default "" .Values.runtime) "worker") }}
          {{- if or $isWeb .Values.envVars .Values.publicEnv }}
          env:
            {{- if $isWeb }}
            - name: PORT
              value: {{ .Values.port | quote }}
            {{- end }}
            {{- /* publicEnv: the names of vars baked as __KUSO_RUNTIME_<KEY>__
                   sentinels at build. The image's entrypoint reads
                   KUSO_PUBLIC_ENV (a space-separated list) and substitutes each
                   sentinel with the real runtime value (which arrives via the
                   normal envVars/envFromSecrets below) — "build once, run
                   anywhere" without a fragile, image-specific generic wrapper
                   that kuso can't safely inject. */}}
            {{- with .Values.publicEnv }}
            - name: KUSO_PUBLIC_ENV
              value: {{ join " " . | quote }}
            {{- end }}
            {{- with .Values.envVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFromSecrets }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ . | quote }}
                optional: true
            {{- end }}
          {{- end }}
          {{- /*
            Web services get a TCP readinessProbe on the user's port
            so the rollout strategy actually waits for the new pod to
            bind before shifting traffic. Workers have no port and
            skip probes entirely.

            We use TCP (not HTTP) on purpose — apps may not expose a
            healthz route, may use non-standard frameworks, or may
            return non-2xx on /. TCP just checks "is the socket
            accepting connections?" which is the minimum signal that
            the process is past startup. initialDelaySeconds=2 gives
            the runtime a beat to bind; failureThreshold=30 with
            periodSeconds=2 means a slow Rails/Spring boot has a full
            minute before being declared unready.

            startupProbe carries slow-boot apps for up to 5 min so
            the readinessProbe doesn't false-fail during cold starts.
          */}}
          {{- if not (eq (default "" .Values.runtime) "worker") }}
          {{- if and .Values.healthcheck .Values.healthcheck.path }}
          {{- /*
            HTTP health check (user opted in via spec.healthcheck.path).
            We render BOTH readiness (gate traffic) AND liveness (restart
            a wedged process) against the path — the key win over the TCP
            default is liveness: a process that accepts the socket but has
            deadlocked/500s its handler is now detected and restarted
            instead of reading healthy forever. Startup stays TCP so a
            slow-booting app isn't liveness-killed before it's up (the
            startupProbe gates liveness/readiness until it first passes).
          */}}
          {{- $hcPort := .Values.healthcheck.port | default .Values.port }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path | quote }}
              port: {{ $hcPort }}
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds | default 2 }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold | default 3 }}
            successThreshold: 1
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path | quote }}
              port: {{ $hcPort }}
            initialDelaySeconds: {{ .Values.healthcheck.initialDelaySeconds | default 5 }}
            periodSeconds: {{ .Values.healthcheck.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.healthcheck.timeoutSeconds | default 2 }}
            failureThreshold: {{ .Values.healthcheck.failureThreshold | default 3 }}
          startupProbe:
            tcpSocket:
              port: {{ .Values.port }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 60
          {{- else }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
            successThreshold: 1
          startupProbe:
            tcpSocket:
              port: {{ .Values.port }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 60
          {{- end }}
          {{- end }}
          {{- /*
            A CPU-target HPA computes utilization as a percentage of the
            container's CPU *request* — with no request, the HPA reports
            cpu:<unknown>, ScalingActive=False, and the deployment is
            stuck at minReplicas forever (it can never scale up). So when
            autoscaling is enabled we GUARANTEE a CPU request: use the
            user's resources verbatim if they set requests.cpu, otherwise
            merge in a small default floor (100m) so the HPA can compute.
            When autoscaling is off, resources pass through untouched
            (empty {} is fine — no HPA depends on a request).
          */}}
          {{- $res := .Values.resources | default dict }}
          {{- if and .Values.autoscaling .Values.autoscaling.enabled }}
          {{- $req := (get $res "requests") | default dict }}
          {{- if not (get $req "cpu") }}
          {{- $req = merge (dict "cpu" "100m") $req }}
          {{- $res = merge (dict "requests" $req) $res }}
          {{- end }}
          {{- end }}
          resources:
            {{- toYaml $res | nindent 12 }}
          {{- with .Values.volumes }}
          volumeMounts:
            {{- range . }}
            - name: {{ .name | quote }}
              mountPath: {{ .mountPath | quote }}
            {{- end }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- range . }}
        - name: {{ .name | quote }}
          persistentVolumeClaim:
            # The PVC is defined in pvc.yaml — naming is
            # <release>-<volume name> so multi-volume services don't
            # collide.
            claimName: {{ printf "%s-%s" (include "kusoenvironment.fullname" $) .name | quote }}
        {{- end }}
      {{- end }}
