apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kusoenvironment.fullname" . }}
  labels:
    {{- include "kusoenvironment.labels" . | nindent 4 }}
spec:
  {{- /*
    Replicas: only stamp spec.replicas when autoscaling is OFF. With an
    HPA wired up, helm-operator reconciles every 3m and would otherwise
    keep clobbering the autoscaler's chosen replica count back to
    replicaCount, producing periodic capacity dips and 503s during
    traffic spikes. Standard chart pattern: omit the field when the HPA
    owns it.
  */ -}}
  {{- if not (and .Values.autoscaling .Values.autoscaling.enabled) }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- /*
    Zero-downtime rolling update. maxSurge=1 + maxUnavailable=0 means
    kube ALWAYS brings up a new pod and waits for it to be Ready
    before killing any old pod, even at replicas=1. Combined with the
    HTTP readinessProbe below this is what makes env-var edits roll
    without dropping requests — the new pod has to actually answer on
    its port before traffic shifts. Without these two, the default
    25%/25% strategy on a single-replica deployment briefly runs zero
    Ready pods and clients see connection-refused / 503.
  */}}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "kusoenvironment.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoenvironment.selectorLabels" . | nindent 8 }}
        {{- include "kusoenvironment.labels" . | nindent 8 }}
      {{- with .Values.secretsRev }}
      annotations:
        kuso.sislelabs.com/secrets-rev: {{ . | quote }}
      {{- end }}
    spec:
      # Pod-level securityContext kept minimal so users' Dockerfiles
      # can pick their own USER directive (named users like
      # `nextjs`, `node`, `nginx` are widely used and kubelet's
      # runAsNonRoot=true admission gate rejects them with
      # "image has non-numeric user, cannot verify user is non-root".
      # Container-level capabilities are still dropped below — same
      # blast-radius reduction without breaking real-world images.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      # User pods don't need to talk to the kube apiserver. Disable
      # the default SA token mount so a compromised app container
      # can't list secrets / impersonate ServiceAccounts. Apps that
      # genuinely need kube access can opt back in via a custom
      # serviceAccountName + automountServiceAccountToken: true on
      # the parent KusoService spec (future work).
      automountServiceAccountToken: false
      {{- /*
        Placement — pin to a subset of nodes by label and/or hostname.
        labels become a nodeSelector; nodes become a required
        nodeAffinity matchExpression. When labels.region is set we
        also add a matching toleration so the kuso.sislelabs.com/region
        NoSchedule taint that the labels editor reconciles doesn't
        block scheduling.
      */}}
      {{- with .Values.placement }}
      {{- if .labels }}
      nodeSelector:
        {{- range $k, $v := .labels }}
        {{ printf "kuso.sislelabs.com/%s" $k }}: {{ $v | quote }}
        {{- end }}
      {{- end }}
      {{- if .nodes }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      {{- range .nodes }}
                      - {{ . | quote }}
                      {{- end }}
      {{- end }}
      {{- if .labels.region }}
      tolerations:
        - key: kuso.sislelabs.com/region
          operator: Equal
          value: {{ .labels.region | quote }}
          effect: NoSchedule
      {{- end }}
      {{- end }}
      {{- /*
        Even spread: when replicaCount > 1, prefer to land each replica
        on a different node so a single host outage doesn't take the
        service down. ScheduleAnyway (not DoNotSchedule) so a single-
        node cluster still schedules everything — the constraint
        becomes a soft preference there. When the user pins via
        placement.nodes (specific hostnames), spread is meaningless,
        so we skip it.
      */}}
      {{- if and (gt (int .Values.replicaCount) 1) (not (and .Values.placement .Values.placement.nodes)) }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kusoenvironment.selectorLabels" . | nindent 14 }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          {{- /* Workers override the image's default CMD with the
                 user-supplied command (e.g. `bundle exec sidekiq`).
                 Web services keep the image's default. */}}
          {{- if and (eq (default "" .Values.runtime) "worker") .Values.command }}
          command:
            {{- range .Values.command }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          {{- /* Workers have no HTTP port + no probes — they're
                 long-running queue consumers. Web services expose
                 .Values.port and inherit standard probes (set by
                 the kuso server when wiring the env). */}}
          {{- if not (eq (default "" .Values.runtime) "worker") }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          {{- end }}
          {{- /*
            Auto-inject PORT for web services. Most app frameworks
            (Express, Flask, FastAPI, Rails, Spring Boot) read $PORT
            and bind there; if we don't set it the app falls back to
            its built-in default (3000, 5000, 8080), the kube Service
            forwards to the wrong containerPort, and traefik returns
            502 — the most common newcomer footgun. PORT is on the
            kuso reservedEnvNames list so users can't override (the
            value would silently desync from spec.port). Workers
            don't bind a port so we skip the injection there; their
            envVars (if any) still render below.
          */}}
          {{- $isWeb := not (eq (default "" .Values.runtime) "worker") }}
          {{- if or $isWeb .Values.envVars }}
          env:
            {{- if $isWeb }}
            - name: PORT
              value: {{ .Values.port | quote }}
            {{- end }}
            {{- with .Values.envVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.envFromSecrets }}
          envFrom:
            {{- range . }}
            - secretRef:
                name: {{ . | quote }}
                optional: true
            {{- end }}
          {{- end }}
          {{- /*
            Web services get a TCP readinessProbe on the user's port
            so the rollout strategy actually waits for the new pod to
            bind before shifting traffic. Workers have no port and
            skip probes entirely.

            We use TCP (not HTTP) on purpose — apps may not expose a
            healthz route, may use non-standard frameworks, or may
            return non-2xx on /. TCP just checks "is the socket
            accepting connections?" which is the minimum signal that
            the process is past startup. initialDelaySeconds=2 gives
            the runtime a beat to bind; failureThreshold=30 with
            periodSeconds=2 means a slow Rails/Spring boot has a full
            minute before being declared unready.

            startupProbe carries slow-boot apps for up to 5 min so
            the readinessProbe doesn't false-fail during cold starts.
          */}}
          {{- if not (eq (default "" .Values.runtime) "worker") }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.port }}
            initialDelaySeconds: 2
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
            successThreshold: 1
          startupProbe:
            tcpSocket:
              port: {{ .Values.port }}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 60
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.volumes }}
          volumeMounts:
            {{- range . }}
            - name: {{ .name | quote }}
              mountPath: {{ .mountPath | quote }}
            {{- end }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- range . }}
        - name: {{ .name | quote }}
          persistentVolumeClaim:
            # The PVC is defined in pvc.yaml — naming is
            # <release>-<volume name> so multi-volume services don't
            # collide.
            claimName: {{ printf "%s-%s" (include "kusoenvironment.fullname" $) .name | quote }}
        {{- end }}
      {{- end }}
