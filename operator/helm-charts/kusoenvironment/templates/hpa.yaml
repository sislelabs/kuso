{{- /* Skip the HPA until the first build lands a real image. Pre-build
       the Deployment is pinned to replicas: 0 (see deployment.yaml's
       holding state); an HPA with minReplicas>=1 would fight that hold
       and churn the apiserver trying to scale a target that has no
       runnable image. The HPA reappears the moment image.repository is
       set and the operator reconciles. */ -}}
{{- /* A hard-stopped env has no HPA: the deployment is pinned to 0 and
       an autoscaler with minReplicas>=1 would immediately fight that pin
       and scale it back up, defeating the stop. Drop the HPA while
       stopped; it reappears on start. */ -}}
{{- if and .Values.autoscaling.enabled .Values.image.repository (not .Values.stopped) }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "kusoenvironment.fullname" . }}
  labels:
    {{- include "kusoenvironment.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "kusoenvironment.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  # Conservative scaling behavior. Without an explicit behavior block the HPA
  # uses defaults that, combined with a flaky metrics-server (transient
  # "no metrics returned" scrape blips, or rollouts where new pods have no
  # metrics yet), let replicas ratchet toward maxReplicas and stay pinned there
  # — a metric gap reads as "can't prove I should scale down". We:
  #   - scale UP gently: at most +1 pod per 60s, so a brief CPU spike or a
  #     single bad reading can't jump straight to max.
  #   - scale DOWN after a 300s stabilization window so we don't flap, but still
  #     return to baseline once load genuinely subsides.
  behavior:
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleUpStabilizationSeconds | default 60 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.autoscaling.scaleDownStabilizationSeconds | default 300 }}
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
{{- end }}
