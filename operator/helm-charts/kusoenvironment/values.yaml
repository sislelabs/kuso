# Default values for KusoEnvironment CRs. The server creates these — one per
# (service, env) tuple. Mirrors KusoEnvironment.spec from docs/REDESIGN.md.

# project / service: required. The KusoProject and KusoService this env
# belongs to. Used for label scoping, addon-secret discovery, and ownership.
project: ""
service: ""

# kind: production | preview
kind: production

# branch: git ref this env tracks. For production envs this is the project
# defaultBranch; for previews it's the PR head ref.
branch: main

# image: container image to run. Set by the build pipeline (server-side) to
# the freshly built image after a push or PR sync.
image:
  repository: ""
  tag: latest
  pullPolicy: IfNotPresent

# port: container port to expose, copied from KusoService.spec.port.
port: 8080

# replicaCount, autoscaling: copied from KusoService.spec.scale, optionally
# overridden by KusoEnvironment.spec.overrides.scale.
replicaCount: 1
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

# sleep: copied from KusoService.spec.sleep.
sleep:
  enabled: false

# host: primary ingress hostname. Auto-emitted by the server as
# <service>.<project>.<baseDomain> for production or
# <service>-pr-<n>.<project>.<baseDomain> for previews.
host: ""

# additionalHosts: extra hosts that should route to the same pod.
# Server populates this from KusoService.spec.domains so users can
# attach custom domains without losing the auto-generated hostname.
# Each entry generates its own Ingress rule + (when tlsEnabled) its
# own cert-manager-managed cert. Empty for services without custom
# domains; cleared via SetEnv / PatchService propagation.
additionalHosts: []

# internal: when true, skip the Ingress entirely. The Service still
# exists so sibling pods can reach this env via in-cluster DNS, but
# nothing is exposed to traefik. Mirrors KusoService.spec.internal.
internal: false

# tlsEnabled: when true, attach cert-manager.io/cluster-issuer annotation and
# request a per-host cert via Ingress.spec.tls. Defaults to true; override to
# false on bare-IP installs without cert-manager.
tlsEnabled: true
clusterIssuer: letsencrypt-prod

# ingressClassName: usually "traefik" on k3s. Override per-cluster.
ingressClassName: traefik

# envVars: per-env env var overrides. The server merges these on top of the
# KusoService.spec.envVars at reconcile time before stamping into the values.
envVars: []
# - name: LOG_LEVEL
#   value: debug

# envFromSecrets: list of Secret names whose entries are injected as envFrom.
# The server populates this with the project's addon connection secrets so
# that DATABASE_URL, REDIS_URL, etc. are available in every container.
envFromSecrets: []
# - my-project-pg-conn
# - my-project-redis-conn

# secretsRev: opaque revision string bumped by the server every time a
# secret value referenced by envFromSecrets changes. The chart stamps
# this into the pod template's annotations so the Deployment rolls a new
# ReplicaSet when a secret value flips. Without this, env var changes via
# envFrom are invisible to running pods (kubelet does not restart on
# Secret data updates for envFrom mounts).
secretsRev: ""

# resources: per-env CPU/mem limits and requests.
resources: {}

# volumes: persistent disks mounted into every pod. The chart renders
# one PVC per entry plus the matching volumeMount on the app
# container. ReadWriteOnce + cluster-default StorageClass means it
# Just Works on k3s + local-path.
#
# volumes:
#   - { name: data, mountPath: /var/lib/app, sizeGi: 5 }
#   - { name: cache, mountPath: /var/cache, sizeGi: 1, accessMode: ReadWriteOnce }
volumes: []

# placement: pin pods to a subset of nodes. The server resolves this
# from env > service > project precedence and stamps the result onto
# the env CR before reconcile, so the chart only sees the effective
# value. Empty = schedule anywhere.
#
# labels keys are bare (no namespace); the chart prefixes them with
# kuso.sislelabs.com/ to match what /settings/nodes writes. nodes is
# a list of kubernetes.io/hostname values.
placement: {}
# placement:
#   labels:
#     region: eu
#     tier: premium
#   nodes:
#     - node-1
#     - node-2

# Used by helm release naming inside templates.
nameOverride: ""
fullnameOverride: ""

# runtime: matches KusoService.spec.runtime. When "worker" the
# template skips Service+Ingress+probes and applies .command as the
# container CMD override.
runtime: ""
# command: argv override for worker runtimes. Ignored when runtime != "worker".
command: []
