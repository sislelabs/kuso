apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "kusocron.fullname" . }}
  labels:
    {{- include "kusocron.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.schedule | quote }}
  suspend: {{ .Values.suspend }}
  concurrencyPolicy: {{ .Values.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      {{- if gt (int .Values.activeDeadlineSeconds) 0 }}
      activeDeadlineSeconds: {{ .Values.activeDeadlineSeconds }}
      {{- end }}
      template:
        metadata:
          labels:
            {{- include "kusocron.labels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          {{- /* Pod securityContext is kind-dependent:

                 kind=http uses our own curlimages/curl image, whose
                 USER is the NON-NUMERIC name "curl_user" (UID 100).
                 kubelet's runAsNonRoot=true gate can't verify a named
                 user is non-root and rejects the pod with
                 CreateContainerConfigError — so we pin runAsUser:100
                 (curl's UID) to make the non-root proof numeric.

                 kind=service/command run the USER's own image, which
                 may declare its own named user (node, nginx, …). Same
                 reason kusoenvironment doesn't set runAsNonRoot pod-
                 wide: pinning a UID there would break those images.
                 Hardening still comes from the container's
                 capabilities.drop:ALL + allowPrivilegeEscalation:false
                 below. */}}
          securityContext:
            seccompProfile:
              type: RuntimeDefault
            {{- if eq (default "service" .Values.kind) "http" }}
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 100
            {{- end }}
          {{- /* Placement — same model as services + addons. region
                 label gets a matching toleration so the cron lands on
                 the right node when a region taint exists. */}}
          {{- with .Values.placement }}
          {{- if .labels }}
          nodeSelector:
            {{- range $k, $v := .labels }}
            {{ printf "kuso.sislelabs.com/%s" $k }}: {{ $v | quote }}
            {{- end }}
          {{- end }}
          {{- if .nodes }}
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: kubernetes.io/hostname
                        operator: In
                        values:
                          {{- range .nodes }}
                          - {{ . | quote }}
                          {{- end }}
          {{- end }}
          {{- if .labels.region }}
          tolerations:
            - key: kuso.sislelabs.com/region
              operator: Equal
              value: {{ .labels.region | quote }}
              effect: NoSchedule
          {{- end }}
          {{- end }}
          containers:
            - name: cron
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              {{- /* kind=http synthesises a curl probe. Image is
                     curlimages/curl — a 5MB scratch+curl image with
                     no other tools, which means no stray sh, no
                     package manager, minimal CVE surface. Pinned by
                     digest-friendly tag rather than :latest so two
                     cron firings on a fast-changing :latest can't
                     pull different code mid-rollout.

                     kind=service / kind=command honour what the
                     server stamped on the spec. */}}
              {{- if eq (default "service" .Values.kind) "http" }}
              image: "curlimages/curl:8.10.1"
              imagePullPolicy: IfNotPresent
              command: ["sh", "-c"]
              args:
                - |
                  set -e
                  echo "==> probe {{ .Values.url }}"
                  curl -fsS -o /dev/null -w "status=%{http_code} time=%{time_total}s\n" {{ .Values.url | quote }}
                  echo "==> ok"
              {{- else }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default "latest" }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                {{- range .Values.command }}
                - {{ . | quote }}
                {{- end }}
              {{- end }}
              {{- with .Values.envFromSecrets }}
              envFrom:
                {{- range . }}
                - secretRef:
                    name: {{ . | quote }}
                {{- end }}
              {{- end }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
