# Default values for KusoBuild CRs. The operator copies the CR spec onto
# these and renders a Job that runs kaniko.

project: ""
service: ""
ref: ""        # commit SHA — used as image tag
branch: main

repo:
  url: ""
  path: "."

# Build strategy. v0.2 ships dockerfile, nixpacks, buildpacks, static.
#   - dockerfile: kaniko reads <path>/Dockerfile from the repo (default).
#   - nixpacks: init container runs `nixpacks build --out` to emit a
#     Dockerfile + context, then kaniko builds. Daemonless via --out.
#   - buildpacks: replaces kaniko with the CNB lifecycle's `creator`,
#     which auto-detects, builds, and pushes daemonless. Builder image
#     defaults to paketo jammy-base.
#   - static: init container runs an optional buildCmd (e.g.
#     `npm run build`) in a builderImage sandbox, then synthesizes a
#     tiny Dockerfile that COPYs outputDir into nginx. Kaniko ships it.
strategy: dockerfile

nixpacks:
  # Pin the binary version so builds are reproducible. The image
  # tag (kuso-nixpacks:<version>) carries the binary pre-installed
  # so the init container doesn't curl|tar 30 MB on every build.
  version: "1.41.0"
  # Override the registry/repo if mirroring kuso-nixpacks privately.
  # The chart appends ":<version>" automatically.
  image: "ghcr.io/sislelabs/kuso-nixpacks"

# Persistent build cache. When pvcName is non-empty the chart mounts
# that PVC at /cache and points each build container's per-language
# cache dirs (~/.npm, ~/go/pkg/mod, ~/.cache/pip, ~/.cargo, /nix) at
# subpaths inside /cache. Empty pvcName runs the cold path the
# pre-v0.8.9 chart used. Server-go provisions the PVC before
# creating the build CR; on PVC-create failure it leaves the field
# empty and the build proceeds without caching.
cache:
  pvcName: ""

buildpacks:
  # Cloud Native Buildpacks lifecycle image. The `creator` binary lives
  # at /cnb/lifecycle/creator and runs the full
  # detect→analyze→build→export→push flow in one shot.
  lifecycleImage: "buildpacksio/lifecycle:0.20.5"
  # The builder image creator pulls during the build. Paketo's
  # jammy-base supports Node, Python, Go, Java, .NET, Ruby out of the box.
  builderImage: "paketobuildpacks/builder-jammy-base:latest"

static:
  # Runtime image. Default ships a tiny nginx that serves /usr/share/nginx/html.
  runtimeImage: "nginx:1.27-alpine"
  # Sandbox image used to run the (optional) buildCmd. Override when
  # the source needs bun/python/php/etc.
  builderImage: "node:20-alpine"
  # Shell command to assemble the static output. Empty = treat the repo
  # path as already-built static files.
  buildCmd: ""
  # Path inside the source dir whose contents become the site root.
  # Defaults to "." which means "ship the whole repo as-is" — perfect
  # for static HTML repos. Set to "dist" / "build" / "_site" / etc.
  # for a build-step output.
  outputDir: "."

# Target registry. The server fills this in with the in-cluster registry
# URL (kuso-registry.kuso.svc.cluster.local:5000/<project>/<service>) and
# the immutable tag (commit SHA).
image:
  repository: ""
  tag: ""

# GitHub App installation id. When non-zero, an init container mints a
# clone-time installation token from a Kubernetes Secret named
# `kuso-github-app` (the same one the server uses) and configures git to
# use it. When zero, the repo is assumed public and cloned anonymously.
githubInstallationId: 0

# Resources for the kaniko Job pod. Builds are CPU-and-memory-heavy
# (especially nixpacks: nix-env compiles glibc/gcc on cold cache).
# Defaults aim at "small Hetzner box" (4 GB RAM); bigger boxes can
# raise via override.
#
# Memory limit calibration: 1Gi × 2 concurrent builds = 2Gi for
# build work, leaving 2Gi for k3s + kuso-server + traefik on a
# 4Gi box. Going above 1Gi here means a single build can starve
# the cluster — we hit exactly that on v0.8.9 with 2Gi limits and
# 5 concurrent builds. The cluster-wide MaxConcurrentBuilds cap is
# the second line of defence; this keeps each build's footprint
# bounded so the cap math holds.
resources:
  requests:
    cpu: 200m
    memory: 384Mi
  limits:
    cpu: 1500m
    memory: 1Gi
