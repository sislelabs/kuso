{{- /*
  Top-level no-op gate. Renders ZERO objects when the build is
  terminal (succeeded / failed / cancelled). Without this, an
  operator restart's initial cache sync — which ignores the
  build-state=done watch selector — would helm-install a fresh
  release for every old KusoBuild, recreating Jobs we'd already
  cleaned up. Caught after a real outage where two resurrected
  nixpacks builds OOMKilled a 4 GB host.

  The image.repository/image.tag/repo.url checks below are kept
  as a belt-and-braces defense for partial CRs (e.g. a malformed
  spec the chart can't render anyway).
*/ -}}
{{- if and (not .Values.done) .Values.image.repository .Values.image.tag .Values.repo.url }}
# Per-build ServiceAccount with NO bindings. Even with
# automountServiceAccountToken: false, the pod still gets the SA
# *identity* — admission webhooks (Kyverno / OPA / Pod Security)
# evaluate against it and a node-escaping kaniko exploit could
# borrow whatever the namespace's `default` SA had been granted.
# Fresh SA per build means there's nothing to inherit.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kusobuild.fullname" . }}-runner
  labels:
    {{- include "kusobuild.labels" . | nindent 4 }}
automountServiceAccountToken: false
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kusobuild.fullname" . }}
  labels:
    {{- include "kusobuild.labels" . | nindent 4 }}
spec:
  # Don't auto-retry; failed builds should surface as failed, not loop.
  backoffLimit: 0
  # Clean up the Job + Pod 1h after completion regardless of success.
  # Logs are streamed to the kuso server via the build status poller
  # before then; nothing in the Job needs to live longer.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "kusobuild.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      # Pod-level fsGroup ONLY — no runAsUser/runAsGroup. Each
      # container has its own UID (kaniko runs as root inside its
      # own rootless container; clone+env-detect+nixpacks-plan
      # need root to apk add packages; cache-init runs as 1000 via
      # its container securityContext below). Pinning runAsUser
      # here would cascade to every container and break the ones
      # that need root.
      #
      # fsGroup=1000 makes the cache PVC's mount point group-writable
      # by GID 1000 — that's what cache-init actually needed. The
      # kubelet only applies fsGroup to the volume, not to / or
      # /etc/apk/etc.
      securityContext:
        fsGroup: 1000
        # runAsNonRoot intentionally NOT set at pod level for the
        # same reason: env-detect needs apk add (which needs root).
        # Each long-running container (kaniko, the runtime build
        # itself) keeps allowPrivilegeEscalation:false + drop ALL
        # caps via its own securityContext, which is the actual
        # blast-radius reduction we care about.
        seccompProfile:
          type: RuntimeDefault
      # Pin to the dedicated SA above. Without this the pod runs as
      # the namespace `default` SA — fine in a vanilla install, but a
      # downstream operator who grants their default SA any permission
      # leaks it to every build pod.
      serviceAccountName: {{ include "kusobuild.fullname" . }}-runner
      # Build pods have zero reason to talk to the kube apiserver.
      # Belt-and-suspenders with the SA's own automount=false above.
      automountServiceAccountToken: false
      # Build-node steering. When a node carries the
      # kuso.sislelabs.com/build=true label and matching NoSchedule
      # taint, build Jobs prefer (soft preference) to land there
      # — keeps a kaniko Job from starving the control-plane node
      # under a build storm. The toleration is unconditional so a
      # tainted build node accepts these Jobs. Without a build
      # node, the preference is a no-op and Jobs schedule normally.
      tolerations:
        - key: "kuso.sislelabs.com/build"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: "kuso.sislelabs.com/build"
                    operator: "In"
                    values: ["true"]
      initContainers:
        {{- if .Values.cache.pvcName }}
        # Cache layout. The PVC is mounted at /cache; this init seeds
        # the subdirs so subsequent containers can mount specific
        # paths via subPath without "no such file or directory" race.
        # Idempotent — `mkdir -p` on an existing PVC is a no-op.
        - name: cache-init
          image: alpine:3.20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - /bin/sh
            - -c
            - |
              set -e
              # mkdir -p is idempotent on PVC re-mount. We previously
              # ran `chmod -R 0777 /cache` here too, but on a fresh
              # PVC the root-owned mount point can't be chmod'd by
              # the runAsUser=1000 init container — non-owner chmod
              # always errors. fsGroup on the pod spec already gives
              # the subdirs we just created group-write, which is
              # what kaniko + nixpacks need; the chmod was paranoid.
              mkdir -p /cache/nix /cache/deps/npm /cache/deps/go-mod \
                       /cache/deps/go-build /cache/deps/pip \
                       /cache/deps/cargo /cache/deps/gradle /cache/deps/m2
              # chmod each child best-effort so existing dirs from
              # an earlier root-owned build become writable. Errors
              # on dirs we already own are silenced (chmod returns 0
              # in that case anyway).
              chmod -R g+w /cache/nix /cache/deps 2>/dev/null || true
              du -sh /cache/* 2>/dev/null || true
          volumeMounts:
            - name: cache
              mountPath: /cache
        {{- end }}
        - name: clone
          image: alpine/git:2.45.2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cd /workspace
              {{- if gt (int .Values.githubInstallationId) 0 }}
              if [ -z "$GITHUB_INSTALLATION_TOKEN" ]; then
                echo "ERROR: GITHUB_INSTALLATION_TOKEN must be set for private repos"
                exit 1
              fi
              git clone --depth 1 --branch {{ .Values.branch | quote }} \
                https://x-access-token:$GITHUB_INSTALLATION_TOKEN@$(echo {{ .Values.repo.url | quote }} | sed -E 's|^https?://||') \
                /workspace/src
              {{- else }}
              git clone --depth 1 --branch {{ .Values.branch | quote }} \
                {{ .Values.repo.url | quote }} \
                /workspace/src
              {{- end }}
              cd /workspace/src
              REF="{{ .Values.ref }}"
              if echo "$REF" | grep -Eq '^[0-9a-f]{40}$'; then
                if ! git checkout "$REF" 2>/dev/null; then
                  echo "checkout $REF failed; deepening clone"
                  git fetch --unshallow
                  git checkout "$REF"
                fi
              else
                echo "ref $REF is not a SHA; using branch HEAD"
              fi
              echo "checked out: $(git rev-parse HEAD)"
          env:
            {{- if gt (int .Values.githubInstallationId) 0 }}
            - name: GITHUB_INSTALLATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kusobuild.fullname" . }}-token
                  key: token
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        # env-detect runs after clone, before any toolchain step. It
        # scans the source tree for likely env-var references and
        # writes a sentinel-fenced JSON block to stdout — the server's
        # build poller picks that up from the pod logs and stamps it
        # onto KusoBuild.status.detectedEnv. Two signals:
        #
        #   1. .env.example / .env.template / .env.sample / .env.dist
        #      → high signal, the project author *documented* the vars.
        #   2. Source grep for runtime accessors (process.env.X,
        #      os.getenv("X"), os.environ["X"], os.Getenv("X"),
        #      ENV["X"], System.getenv("X")). Catches projects that
        #      don't ship a .env example.
        #
        # Filters out kuso-managed names (PORT, HOSTNAME, HOME, PATH,
        # NODE_ENV, NODE_OPTIONS, KUBERNETES_*) and common framework
        # noise so the result is the user-actionable set. Output:
        # one JSON line bracketed by KUSO_ENV_DETECT_BEGIN/END so the
        # log parser can extract it without false positives from app
        # output that happens to look JSON-shaped.
        - name: env-detect
          image: alpine:3.20
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              SRC="/workspace/src/{{ .Values.repo.path | default "." }}"
              cd "$SRC"
              apk add --no-cache --quiet ripgrep jq >/dev/null 2>&1 || apk add --no-cache ripgrep jq

              FROM_DOTENV=""
              for f in .env.example .env.template .env.sample .env.dist; do
                if [ -f "$f" ]; then
                  while IFS= read -r line; do
                    case "$line" in
                      \#*|"") continue ;;
                    esac
                    name="${line%%=*}"
                    name="${name## }"; name="${name%% }"
                    if echo "$name" | grep -qE '^[A-Z][A-Z0-9_]*$'; then
                      FROM_DOTENV="${FROM_DOTENV}${name}\n"
                    fi
                  done < "$f"
                  echo "env-detect: read $f"
                fi
              done

              # Grep for runtime accessors. Skip vendored / build dirs
              # so node_modules's bundled libs don't drown out the
              # user's own references.
              GREP_GLOBS="-g !node_modules -g !vendor -g !.git -g !dist -g !build -g !.next -g !target -g !.venv -g !__pycache__"
              {
                rg -oN --no-heading $GREP_GLOBS 'process\.env\.[A-Z][A-Z0-9_]*' 2>/dev/null | sed -E 's/.*process\.env\.([A-Z][A-Z0-9_]*).*/\1/'
                rg -oN --no-heading $GREP_GLOBS 'import\.meta\.env\.[A-Z][A-Z0-9_]*' 2>/dev/null | sed -E 's/.*import\.meta\.env\.([A-Z][A-Z0-9_]*).*/\1/'
                rg -oN --no-heading $GREP_GLOBS 'os\.getenv\(["A-Z_0-9]+' 2>/dev/null | grep -oE '[A-Z][A-Z0-9_]+'
                rg -oN --no-heading $GREP_GLOBS 'os\.environ\[' 2>/dev/null | grep -oE '[A-Z][A-Z0-9_]{2,}' | sort -u
                rg -oN --no-heading $GREP_GLOBS 'os\.Getenv\("[A-Z][A-Z0-9_]*"' 2>/dev/null | grep -oE '"[A-Z][A-Z0-9_]+"' | tr -d '"'
                rg -oN --no-heading $GREP_GLOBS 'ENV\[' 2>/dev/null | grep -oE '[A-Z][A-Z0-9_]{2,}' | sort -u
                rg -oN --no-heading $GREP_GLOBS 'System\.getenv\("[A-Z][A-Z0-9_]*"' 2>/dev/null | grep -oE '"[A-Z][A-Z0-9_]+"' | tr -d '"'
              } > /tmp/grep-raw 2>/dev/null || true

              # Reserved/noise names: kubelet-managed, kuso-managed,
              # ubiquitous framework bookkeeping that's never user-set.
              RESERVED="PORT HOSTNAME HOME PATH USER PWD SHELL TERM LANG LC_ALL LC_CTYPE NODE_ENV NODE_OPTIONS NODE_VERSION NPM_CONFIG_LOGLEVEL DEBIAN_FRONTEND DEBUG CI VERCEL_ENV NEXT_RUNTIME RAILS_ENV"

              {
                printf '%b' "$FROM_DOTENV"
                cat /tmp/grep-raw 2>/dev/null
              } | sort -u | while read -r v; do
                [ -z "$v" ] && continue
                case " $RESERVED " in
                  *" $v "*) continue ;;
                esac
                case "$v" in
                  KUBERNETES_*) continue ;;
                esac
                echo "$v"
              done > /tmp/detected.txt

              mkdir -p /workspace/.kuso
              jq -R -s -c 'split("\n") | map(select(length > 0))' < /tmp/detected.txt > /workspace/.kuso/detected-env.json

              echo "KUSO_ENV_DETECT_BEGIN"
              cat /workspace/.kuso/detected-env.json
              echo
              echo "KUSO_ENV_DETECT_END"
              echo "env-detect: $(jq -r 'length' /workspace/.kuso/detected-env.json) candidate vars"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        {{- if eq .Values.strategy "nixpacks" }}
        # Nixpacks generates a Dockerfile + build context (.nixpacks/) so
        # kaniko can build daemonless. We point --out at the source dir
        # itself so .nixpacks/ lands alongside the repo files (matches
        # `docker build src -f src/.nixpacks/Dockerfile` from upstream
        # docs).
        #
        # Image is kuso-nixpacks:<version> — bakes the nixpacks binary
        # so each build skips the GitHub-Releases curl|tar (~5s + ~30 MB).
        - name: nixpacks-plan
          image: {{ printf "%s:%s" (.Values.nixpacks.image | default "ghcr.io/sislelabs/kuso-nixpacks") .Values.nixpacks.version | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              {{- if .Values.cache.pvcName }}
              # Persistent nix store. nixpacks/nix-env writes to /nix,
              # so we point /nix at /cache/nix via a bind-equivalent
              # symlink. mkdir -p first so the symlink target exists.
              # This is the single biggest perf win: a warm /nix
              # skips re-compiling glibc/gcc/the language runtime
              # every build.
              mkdir -p /cache/nix
              if [ ! -L /nix ] && [ ! -d /nix ]; then
                ln -sf /cache/nix /nix
              elif [ -d /nix ] && [ ! -L /nix ]; then
                # /nix exists as a real dir from the base image; rsync
                # any seed contents into the cache and replace with a
                # symlink. Most kuso-nixpacks builds won't have a
                # populated /nix in the base image — this is a safety
                # net for downstream forks that bake a seed store.
                cp -an /nix/. /cache/nix/ 2>/dev/null || true
                rm -rf /nix
                ln -sf /cache/nix /nix
              fi
              {{- end }}
              SRC="/workspace/src/{{ .Values.repo.path | default "." }}"
              cd "$SRC"

              # Detect the toolchain version a project actually
              # requires and pin it as build-time env. Nixpacks bundles
              # one version per language (Go 1.22, Node 18-22, Python
              # 3.11-3.12, Ruby 3.x...) — anything newer than the
              # bundle fails with "toolchain not available" or simply
              # picks an old runtime that the user's lockfile rejects.
              # We read the project's own version files BEFORE
              # nixpacks runs and emit a list of build envs that get
              # baked into the generated Dockerfile after the FROM.
              # That way the user's lockfile / engines field / version
              # file is the source of truth, and nixpacks just
              # provides the host OS layer.
              EXTRA_ENVS=""
              add_env() {
                EXTRA_ENVS="${EXTRA_ENVS}${EXTRA_ENVS:+ }$1"
                echo "  + $1"
              }

              echo "detecting project toolchain hints"

              # ---- Go ----
              if [ -f go.mod ]; then
                MOD_GO=$(awk '/^go [0-9]/ {print $2; exit}' go.mod)
                if [ -n "$MOD_GO" ]; then
                  case "$MOD_GO" in
                    *.*.*) add_env "GOTOOLCHAIN=go${MOD_GO}+auto" ;;
                    *.*)   add_env "GOTOOLCHAIN=go${MOD_GO}.0+auto" ;;
                  esac
                fi
                add_env "GOFLAGS=-mod=mod"
              fi

              # ---- Node.js ----
              if [ -f .nvmrc ]; then
                NODE_V=$(tr -d 'v[:space:]' < .nvmrc | head -c 16)
                [ -n "$NODE_V" ] && add_env "NODE_VERSION=${NODE_V}"
              elif [ -f package.json ]; then
                NODE_V=$(grep -oE '"node"[[:space:]]*:[[:space:]]*"[^"]*"' package.json \
                  | head -1 \
                  | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
                [ -n "$NODE_V" ] && add_env "NODE_VERSION=${NODE_V}"
              fi

              # ---- Python ----
              if [ -f .python-version ]; then
                PY_V=$(head -1 .python-version | tr -d '[:space:]')
                [ -n "$PY_V" ] && add_env "PYTHON_VERSION=${PY_V}"
              elif [ -f pyproject.toml ]; then
                PY_V=$(grep -oE 'requires-python[[:space:]]*=[[:space:]]*"[^"]*"' pyproject.toml \
                  | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
                [ -n "$PY_V" ] && add_env "PYTHON_VERSION=${PY_V}"
              fi

              # ---- Ruby ----
              if [ -f .ruby-version ]; then
                RB_V=$(head -1 .ruby-version | tr -d '[:space:]')
                [ -n "$RB_V" ] && add_env "RUBY_VERSION=${RB_V}"
              elif [ -f Gemfile ]; then
                RB_V=$(grep -oE "^[[:space:]]*ruby[[:space:]]*['\"][^'\"]*['\"]" Gemfile \
                  | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
                [ -n "$RB_V" ] && add_env "RUBY_VERSION=${RB_V}"
              fi

              # ---- Java ----
              if [ -f .sdkmanrc ]; then
                JV=$(grep -oE 'java=[0-9]+(\.[0-9]+)*' .sdkmanrc | head -1 | cut -d= -f2)
                [ -n "$JV" ] && add_env "JDK_VERSION=${JV}"
              fi

              echo "running nixpacks build --out ."
              NIXPACKS_ENV_FLAGS=""
              for env_pair in $EXTRA_ENVS; do
                NIXPACKS_ENV_FLAGS="$NIXPACKS_ENV_FLAGS --env $env_pair"
              done
              # shellcheck disable=SC2086
              nixpacks build . --out . $NIXPACKS_ENV_FLAGS

              # nixpacks emits `ARG <key>` without a default, so the
              # env vars only resolve when passed via docker
              # --build-arg at runtime. Kaniko doesn't auto-forward
              # our detected values, so we prepend literal ENV
              # statements right after the FROM line.
              ENV_BLOCK=""
              for env_pair in $EXTRA_ENVS; do
                ENV_BLOCK="${ENV_BLOCK}ENV ${env_pair}\n"
              done
              if [ -n "$ENV_BLOCK" ]; then
                awk -v block="$ENV_BLOCK" '
                  BEGIN { inserted = 0 }
                  /^FROM / && !inserted { print; printf "%s", block; inserted = 1; next }
                  { print }
                ' .nixpacks/Dockerfile > .nixpacks/Dockerfile.patched
                mv .nixpacks/Dockerfile.patched .nixpacks/Dockerfile
              fi

              echo "--- generated Dockerfile ---"
              cat .nixpacks/Dockerfile
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.cache.pvcName }}
            - name: cache
              mountPath: /cache
            {{- end }}
        {{- end }}
        {{- if eq .Values.strategy "static" }}
        # Static strategy: optionally run a build command, then synthesize
        # a tiny nginx Dockerfile that ships .Values.static.outputDir as
        # /usr/share/nginx/html. Kaniko picks that up downstream. The
        # build runs in a node:20-alpine sandbox by default — override
        # via .Values.static.builderImage if you need bun/python/etc.
        - name: static-plan
          image: {{ .Values.static.builderImage | default "node:20-alpine" | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          workingDir: /workspace/src/{{ .Values.repo.path | default "." }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- if .Values.static.buildCmd }}
              echo "running build: {{ .Values.static.buildCmd }}"
              {{ .Values.static.buildCmd }}
              {{- else }}
              echo "no buildCmd configured; using existing files in {{ .Values.static.outputDir | default "." }}"
              {{- end }}
              OUT="{{ .Values.static.outputDir | default "." }}"
              if [ ! -d "$OUT" ]; then
                echo "ERROR: outputDir $OUT does not exist after build"
                exit 1
              fi
              if [ -z "$(ls -A "$OUT")" ]; then
                echo "ERROR: outputDir $OUT is empty"
                exit 1
              fi
              # Synthesize the runtime Dockerfile in the source dir so
              # kaniko's --context picks it up. The `COPY $OUT` works
              # because $OUT is already relative to the build context.
              cat > .kuso-static.Dockerfile <<EOF
              FROM {{ .Values.static.runtimeImage | default "nginx:1.27-alpine" }}
              COPY $OUT /usr/share/nginx/html
              EOF
              echo "--- generated Dockerfile ---"
              cat .kuso-static.Dockerfile
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.cache.pvcName }}
            # static-plan benefits from the npm/yarn/pnpm cache for
            # JS-heavy static sites (next/vite/astro).
            - name: cache
              mountPath: /root/.npm
              subPath: deps/npm
            {{- end }}
        {{- end }}
      containers:
        {{- if eq .Values.strategy "buildpacks" }}
        # Cloud Native Buildpacks via the lifecycle's `creator` binary.
        # creator is daemonless: it auto-detects, downloads buildpacks,
        # builds, and pushes the OCI image directly. No kaniko needed.
        # Runs as the lifecycle UID/GID (1000:1000) — that's a baked-in
        # contract of the lifecycle image.
        - name: buildpacks
          image: {{ .Values.buildpacks.lifecycleImage | default "buildpacksio/lifecycle:0.20.5" | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command:
            - /cnb/lifecycle/creator
            - -app=/workspace/src/{{ .Values.repo.path | default "." }}
            - -log-level=info
            - -no-color
            - -skip-restore
            - {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          env:
            - name: CNB_BUILDER_IMAGE
              value: {{ .Values.buildpacks.builderImage | default "paketobuildpacks/builder-jammy-base:latest" | quote }}
            # Registry auth. The CNB lifecycle reads CNB_REGISTRY_AUTH
            # as a JSON env: {"<registry>":{"username":"...","password":"..."}}.
            # We pull it whole from a Secret key the server mints alongside
            # the build CR — keeps creds out of the manifest and lets us
            # rotate without re-rendering. When auth.secretName is empty
            # we assume the in-cluster anonymous registry and omit the env
            # entirely (lifecycle pushes anonymously).
            {{- if .Values.auth.secretName }}
            - name: CNB_REGISTRY_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.secretName | quote }}
                  key: cnb_registry_auth
            {{- end }}
            # Buildpacks frequently need a GitHub token for private
            # buildpacks or to clone Git-hosted dependencies referenced
            # from package.json/Gemfile. Mount the same installation
            # token the clone init container uses; lifecycle picks it
            # up via the standard GIT_ASKPASS env.
            {{- if gt (int .Values.githubInstallationId) 0 }}
            - name: GITHUB_INSTALLATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kusobuild.fullname" . }}-token
                  key: token
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: layers
              mountPath: /layers
            - name: cnb-cache
              mountPath: /cache
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- else }}
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2
          # Kaniko needs to chown files when it unpacks the base
          # image rootfs (e.g. `chown /etc/gshadow` from
          # node:20-bookworm-slim's init). Dropping ALL capabilities
          # killed every build at the unpack stage with
          # "chown /etc/gshadow: operation not permitted".
          #
          # We keep allowPrivilegeEscalation=false (no setuid escape)
          # and drop everything except CHOWN/DAC_OVERRIDE/FOWNER/
          # SETUID/SETGID — the minimum kaniko needs to manipulate
          # arbitrary base-image rootfs ownership. Kaniko itself
          # runs in user-namespace mode so this isn't a host-cap
          # leak; it just lets the chown syscall inside its sandbox
          # succeed.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER", "SETUID", "SETGID"]
          args:
            {{- if eq .Values.strategy "nixpacks" }}
            - --dockerfile=.nixpacks/Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- else if eq .Values.strategy "static" }}
            - --dockerfile=.kuso-static.Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- else }}
            - --dockerfile=Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- end }}
            - --destination={{ .Values.image.repository }}:{{ .Values.image.tag }}
            {{- if .Values.registry.allowInsecure }}
            - --insecure
            - --skip-tls-verify
            {{- end }}
            - --cache=true
            - --cache-repo={{ .Values.registry.cacheRepo | default (printf "%s/.cache" .Values.image.repository) }}
            - --cleanup
            # Memory-saving flags for small clusters. Without these
            # kaniko hashes every file's content on every snapshot,
            # which on a node_modules tree (~50k files, 200MiB) can
            # peak well past 2GiB and OOMKill on a 4GB box.
            #
            # --snapshot-mode=redo: only re-snapshot when a file's
            # mtime/size/perms change (vs full content hash). For
            # node_modules where files are written once and never
            # touched again, this collapses the snapshot peak from
            # ~1.5GiB to ~200MiB on representative builds.
            #
            # --use-new-run: switches to the streaming run executor
            # introduced in kaniko 1.10. Lower memory ceiling than
            # the legacy path because intermediate diffs are written
            # to disk instead of held in heap.
            #
            # --compressed-caching=false: skip the in-memory layer
            # compression buffer. Slightly larger pushed cache layers
            # but a meaningful drop in peak RSS during snapshot.
            - --snapshot-mode=redo
            - --use-new-run
            - --compressed-caching=false
          {{- if .Values.auth.secretName }}
          env:
            - name: DOCKER_CONFIG
              value: /kaniko/.docker
          {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.auth.secretName }}
            - name: docker-config
              mountPath: /kaniko/.docker
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.strategy "nixpacks") .Values.cache.pvcName }}
            # Symlink /nix → /cache/nix so the kaniko snapshot of the
            # nixpacks-generated image's RUN steps reads from the
            # warm store. nixpacks-plan symlinked it for its own
            # process; kaniko runs in a fresh container so we
            # symlink again here.
            - name: cache
              mountPath: /cache
            {{- end }}
            {{- if .Values.cache.pvcName }}
            # Per-language dep caches — exposed via subPath so each
            # mount is a clean dir from the user's perspective. The
            # Dockerfile RUN stages typically write to ~/.npm,
            # ~/go/pkg/mod, etc.; with these subPaths backed by the
            # PVC, a `npm ci` on the second build hits the local
            # cache instead of npmjs.com.
            - name: cache
              mountPath: /root/.npm
              subPath: deps/npm
            - name: cache
              mountPath: /root/go/pkg/mod
              subPath: deps/go-mod
            - name: cache
              mountPath: /root/.cache/go-build
              subPath: deps/go-build
            - name: cache
              mountPath: /root/.cache/pip
              subPath: deps/pip
            - name: cache
              mountPath: /root/.cargo/registry
              subPath: deps/cargo
            - name: cache
              mountPath: /root/.gradle
              subPath: deps/gradle
            - name: cache
              mountPath: /root/.m2
              subPath: deps/m2
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: workspace
          emptyDir: {}
        {{- if .Values.cache.pvcName }}
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Values.cache.pvcName | quote }}
        {{- end }}
        {{- if and (.Values.auth.secretName) (ne .Values.strategy "buildpacks") }}
        - name: docker-config
          secret:
            secretName: {{ .Values.auth.secretName | quote }}
            items:
              - key: .dockerconfigjson
                path: config.json
        {{- end }}
        {{- if eq .Values.strategy "buildpacks" }}
        - name: layers
          emptyDir: {}
        - name: cnb-cache
          {{- if .Values.cache.pvcName }}
          # Buildpacks' lifecycle uses /cache as its layer cache, so
          # the same PVC backs it — but with subPath so it doesn't
          # collide with the nix store.
          persistentVolumeClaim:
            claimName: {{ .Values.cache.pvcName | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
{{- end }}
