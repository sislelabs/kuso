{{- if and .Values.image.repository .Values.image.tag .Values.repo.url }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kusobuild.fullname" . }}
  labels:
    {{- include "kusobuild.labels" . | nindent 4 }}
spec:
  # Don't auto-retry; failed builds should surface as failed, not loop.
  backoffLimit: 0
  # Clean up the Job + Pod 1h after completion regardless of success.
  # Logs are streamed to the kuso server via the build status poller
  # before then; nothing in the Job needs to live longer.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "kusobuild.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      # Build-node steering. When a node carries the
      # kuso.sislelabs.com/build=true label and matching NoSchedule
      # taint, build Jobs prefer (soft preference) to land there
      # — keeps a kaniko Job from starving the control-plane node
      # under a build storm. The toleration is unconditional so a
      # tainted build node accepts these Jobs. Without a build
      # node, the preference is a no-op and Jobs schedule normally.
      tolerations:
        - key: "kuso.sislelabs.com/build"
          operator: "Exists"
          effect: "NoSchedule"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: "kuso.sislelabs.com/build"
                    operator: "In"
                    values: ["true"]
      initContainers:
        {{- if .Values.cache.pvcName }}
        # Cache layout. The PVC is mounted at /cache; this init seeds
        # the subdirs so subsequent containers can mount specific
        # paths via subPath without "no such file or directory" race.
        # Idempotent — `mkdir -p` on an existing PVC is a no-op.
        - name: cache-init
          image: alpine:3.20
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /cache/nix /cache/deps/npm /cache/deps/go-mod \
                       /cache/deps/go-build /cache/deps/pip \
                       /cache/deps/cargo /cache/deps/gradle /cache/deps/m2
              chmod -R 0777 /cache
              du -sh /cache/* 2>/dev/null || true
          volumeMounts:
            - name: cache
              mountPath: /cache
        {{- end }}
        - name: clone
          image: alpine/git:2.45.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              cd /workspace
              {{- if gt (int .Values.githubInstallationId) 0 }}
              if [ -z "$GITHUB_INSTALLATION_TOKEN" ]; then
                echo "ERROR: GITHUB_INSTALLATION_TOKEN must be set for private repos"
                exit 1
              fi
              git clone --depth 1 --branch {{ .Values.branch | quote }} \
                https://x-access-token:$GITHUB_INSTALLATION_TOKEN@$(echo {{ .Values.repo.url | quote }} | sed -E 's|^https?://||') \
                /workspace/src
              {{- else }}
              git clone --depth 1 --branch {{ .Values.branch | quote }} \
                {{ .Values.repo.url | quote }} \
                /workspace/src
              {{- end }}
              cd /workspace/src
              REF="{{ .Values.ref }}"
              if echo "$REF" | grep -Eq '^[0-9a-f]{40}$'; then
                if ! git checkout "$REF" 2>/dev/null; then
                  echo "checkout $REF failed; deepening clone"
                  git fetch --unshallow
                  git checkout "$REF"
                fi
              else
                echo "ref $REF is not a SHA; using branch HEAD"
              fi
              echo "checked out: $(git rev-parse HEAD)"
          env:
            {{- if gt (int .Values.githubInstallationId) 0 }}
            - name: GITHUB_INSTALLATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "kusobuild.fullname" . }}-token
                  key: token
            {{- end }}
          volumeMounts:
            - name: workspace
              mountPath: /workspace
        {{- if eq .Values.strategy "nixpacks" }}
        # Nixpacks generates a Dockerfile + build context (.nixpacks/) so
        # kaniko can build daemonless. We point --out at the source dir
        # itself so .nixpacks/ lands alongside the repo files (matches
        # `docker build src -f src/.nixpacks/Dockerfile` from upstream
        # docs).
        #
        # Image is kuso-nixpacks:<version> — bakes the nixpacks binary
        # so each build skips the GitHub-Releases curl|tar (~5s + ~30 MB).
        - name: nixpacks-plan
          image: {{ printf "%s:%s" (.Values.nixpacks.image | default "ghcr.io/sislelabs/kuso-nixpacks") .Values.nixpacks.version | quote }}
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              {{- if .Values.cache.pvcName }}
              # Persistent nix store. nixpacks/nix-env writes to /nix,
              # so we point /nix at /cache/nix via a bind-equivalent
              # symlink. mkdir -p first so the symlink target exists.
              # This is the single biggest perf win: a warm /nix
              # skips re-compiling glibc/gcc/the language runtime
              # every build.
              mkdir -p /cache/nix
              if [ ! -L /nix ] && [ ! -d /nix ]; then
                ln -sf /cache/nix /nix
              elif [ -d /nix ] && [ ! -L /nix ]; then
                # /nix exists as a real dir from the base image; rsync
                # any seed contents into the cache and replace with a
                # symlink. Most kuso-nixpacks builds won't have a
                # populated /nix in the base image — this is a safety
                # net for downstream forks that bake a seed store.
                cp -an /nix/. /cache/nix/ 2>/dev/null || true
                rm -rf /nix
                ln -sf /cache/nix /nix
              fi
              {{- end }}
              SRC="/workspace/src/{{ .Values.repo.path | default "." }}"
              cd "$SRC"

              # Detect the toolchain version a project actually
              # requires and pin it as build-time env. Nixpacks bundles
              # one version per language (Go 1.22, Node 18-22, Python
              # 3.11-3.12, Ruby 3.x...) — anything newer than the
              # bundle fails with "toolchain not available" or simply
              # picks an old runtime that the user's lockfile rejects.
              # We read the project's own version files BEFORE
              # nixpacks runs and emit a list of build envs that get
              # baked into the generated Dockerfile after the FROM.
              # That way the user's lockfile / engines field / version
              # file is the source of truth, and nixpacks just
              # provides the host OS layer.
              EXTRA_ENVS=""
              add_env() {
                EXTRA_ENVS="${EXTRA_ENVS}${EXTRA_ENVS:+ }$1"
                echo "  + $1"
              }

              echo "detecting project toolchain hints"

              # ---- Go ----
              if [ -f go.mod ]; then
                MOD_GO=$(awk '/^go [0-9]/ {print $2; exit}' go.mod)
                if [ -n "$MOD_GO" ]; then
                  case "$MOD_GO" in
                    *.*.*) add_env "GOTOOLCHAIN=go${MOD_GO}+auto" ;;
                    *.*)   add_env "GOTOOLCHAIN=go${MOD_GO}.0+auto" ;;
                  esac
                fi
                add_env "GOFLAGS=-mod=mod"
              fi

              # ---- Node.js ----
              if [ -f .nvmrc ]; then
                NODE_V=$(tr -d 'v[:space:]' < .nvmrc | head -c 16)
                [ -n "$NODE_V" ] && add_env "NODE_VERSION=${NODE_V}"
              elif [ -f package.json ]; then
                NODE_V=$(grep -oE '"node"[[:space:]]*:[[:space:]]*"[^"]*"' package.json \
                  | head -1 \
                  | grep -oE '[0-9]+(\.[0-9]+)*' | head -1)
                [ -n "$NODE_V" ] && add_env "NODE_VERSION=${NODE_V}"
              fi

              # ---- Python ----
              if [ -f .python-version ]; then
                PY_V=$(head -1 .python-version | tr -d '[:space:]')
                [ -n "$PY_V" ] && add_env "PYTHON_VERSION=${PY_V}"
              elif [ -f pyproject.toml ]; then
                PY_V=$(grep -oE 'requires-python[[:space:]]*=[[:space:]]*"[^"]*"' pyproject.toml \
                  | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
                [ -n "$PY_V" ] && add_env "PYTHON_VERSION=${PY_V}"
              fi

              # ---- Ruby ----
              if [ -f .ruby-version ]; then
                RB_V=$(head -1 .ruby-version | tr -d '[:space:]')
                [ -n "$RB_V" ] && add_env "RUBY_VERSION=${RB_V}"
              elif [ -f Gemfile ]; then
                RB_V=$(grep -oE "^[[:space:]]*ruby[[:space:]]*['\"][^'\"]*['\"]" Gemfile \
                  | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?' | head -1)
                [ -n "$RB_V" ] && add_env "RUBY_VERSION=${RB_V}"
              fi

              # ---- Java ----
              if [ -f .sdkmanrc ]; then
                JV=$(grep -oE 'java=[0-9]+(\.[0-9]+)*' .sdkmanrc | head -1 | cut -d= -f2)
                [ -n "$JV" ] && add_env "JDK_VERSION=${JV}"
              fi

              echo "running nixpacks build --out ."
              NIXPACKS_ENV_FLAGS=""
              for env_pair in $EXTRA_ENVS; do
                NIXPACKS_ENV_FLAGS="$NIXPACKS_ENV_FLAGS --env $env_pair"
              done
              # shellcheck disable=SC2086
              nixpacks build . --out . $NIXPACKS_ENV_FLAGS

              # nixpacks emits `ARG <key>` without a default, so the
              # env vars only resolve when passed via docker
              # --build-arg at runtime. Kaniko doesn't auto-forward
              # our detected values, so we prepend literal ENV
              # statements right after the FROM line.
              ENV_BLOCK=""
              for env_pair in $EXTRA_ENVS; do
                ENV_BLOCK="${ENV_BLOCK}ENV ${env_pair}\n"
              done
              if [ -n "$ENV_BLOCK" ]; then
                awk -v block="$ENV_BLOCK" '
                  BEGIN { inserted = 0 }
                  /^FROM / && !inserted { print; printf "%s", block; inserted = 1; next }
                  { print }
                ' .nixpacks/Dockerfile > .nixpacks/Dockerfile.patched
                mv .nixpacks/Dockerfile.patched .nixpacks/Dockerfile
              fi

              echo "--- generated Dockerfile ---"
              cat .nixpacks/Dockerfile
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.cache.pvcName }}
            - name: cache
              mountPath: /cache
            {{- end }}
        {{- end }}
        {{- if eq .Values.strategy "static" }}
        # Static strategy: optionally run a build command, then synthesize
        # a tiny nginx Dockerfile that ships .Values.static.outputDir as
        # /usr/share/nginx/html. Kaniko picks that up downstream. The
        # build runs in a node:20-alpine sandbox by default — override
        # via .Values.static.builderImage if you need bun/python/etc.
        - name: static-plan
          image: {{ .Values.static.builderImage | default "node:20-alpine" | quote }}
          workingDir: /workspace/src/{{ .Values.repo.path | default "." }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              {{- if .Values.static.buildCmd }}
              echo "running build: {{ .Values.static.buildCmd }}"
              {{ .Values.static.buildCmd }}
              {{- else }}
              echo "no buildCmd configured; using existing files in {{ .Values.static.outputDir | default "." }}"
              {{- end }}
              OUT="{{ .Values.static.outputDir | default "." }}"
              if [ ! -d "$OUT" ]; then
                echo "ERROR: outputDir $OUT does not exist after build"
                exit 1
              fi
              if [ -z "$(ls -A "$OUT")" ]; then
                echo "ERROR: outputDir $OUT is empty"
                exit 1
              fi
              # Synthesize the runtime Dockerfile in the source dir so
              # kaniko's --context picks it up. The `COPY $OUT` works
              # because $OUT is already relative to the build context.
              cat > .kuso-static.Dockerfile <<EOF
              FROM {{ .Values.static.runtimeImage | default "nginx:1.27-alpine" }}
              COPY $OUT /usr/share/nginx/html
              EOF
              echo "--- generated Dockerfile ---"
              cat .kuso-static.Dockerfile
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if .Values.cache.pvcName }}
            # static-plan benefits from the npm/yarn/pnpm cache for
            # JS-heavy static sites (next/vite/astro).
            - name: cache
              mountPath: /root/.npm
              subPath: deps/npm
            {{- end }}
        {{- end }}
      containers:
        {{- if eq .Values.strategy "buildpacks" }}
        # Cloud Native Buildpacks via the lifecycle's `creator` binary.
        # creator is daemonless: it auto-detects, downloads buildpacks,
        # builds, and pushes the OCI image directly. No kaniko needed.
        # Runs as the lifecycle UID/GID (1000:1000) — that's a baked-in
        # contract of the lifecycle image.
        - name: buildpacks
          image: {{ .Values.buildpacks.lifecycleImage | default "buildpacksio/lifecycle:0.20.5" | quote }}
          command:
            - /cnb/lifecycle/creator
            - -app=/workspace/src/{{ .Values.repo.path | default "." }}
            - -log-level=info
            - -no-color
            - -skip-restore
            - {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
          env:
            - name: CNB_BUILDER_IMAGE
              value: {{ .Values.buildpacks.builderImage | default "paketobuildpacks/builder-jammy-base:latest" | quote }}
            - name: CNB_REGISTRY_AUTH
              value: '{"{{ index (split ":" .Values.image.repository) "_0" }}":{"username":"","password":""}}'
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: layers
              mountPath: /layers
            - name: cnb-cache
              mountPath: /cache
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- else }}
        - name: kaniko
          image: gcr.io/kaniko-project/executor:v1.23.2
          args:
            {{- if eq .Values.strategy "nixpacks" }}
            - --dockerfile=.nixpacks/Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- else if eq .Values.strategy "static" }}
            - --dockerfile=.kuso-static.Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- else }}
            - --dockerfile=Dockerfile
            - --context=dir:///workspace/src/{{ .Values.repo.path | default "." }}
            {{- end }}
            - --destination={{ .Values.image.repository }}:{{ .Values.image.tag }}
            - --insecure
            - --skip-tls-verify
            - --cache=true
            - --cache-repo={{ .Values.image.repository }}/.cache
            - --cleanup
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            {{- if and (eq .Values.strategy "nixpacks") .Values.cache.pvcName }}
            # Symlink /nix → /cache/nix so the kaniko snapshot of the
            # nixpacks-generated image's RUN steps reads from the
            # warm store. nixpacks-plan symlinked it for its own
            # process; kaniko runs in a fresh container so we
            # symlink again here.
            - name: cache
              mountPath: /cache
            {{- end }}
            {{- if .Values.cache.pvcName }}
            # Per-language dep caches — exposed via subPath so each
            # mount is a clean dir from the user's perspective. The
            # Dockerfile RUN stages typically write to ~/.npm,
            # ~/go/pkg/mod, etc.; with these subPaths backed by the
            # PVC, a `npm ci` on the second build hits the local
            # cache instead of npmjs.com.
            - name: cache
              mountPath: /root/.npm
              subPath: deps/npm
            - name: cache
              mountPath: /root/go/pkg/mod
              subPath: deps/go-mod
            - name: cache
              mountPath: /root/.cache/go-build
              subPath: deps/go-build
            - name: cache
              mountPath: /root/.cache/pip
              subPath: deps/pip
            - name: cache
              mountPath: /root/.cargo/registry
              subPath: deps/cargo
            - name: cache
              mountPath: /root/.gradle
              subPath: deps/gradle
            - name: cache
              mountPath: /root/.m2
              subPath: deps/m2
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: workspace
          emptyDir: {}
        {{- if .Values.cache.pvcName }}
        - name: cache
          persistentVolumeClaim:
            claimName: {{ .Values.cache.pvcName | quote }}
        {{- end }}
        {{- if eq .Values.strategy "buildpacks" }}
        - name: layers
          emptyDir: {}
        - name: cnb-cache
          {{- if .Values.cache.pvcName }}
          # Buildpacks' lifecycle uses /cache as its layer cache, so
          # the same PVC backs it — but with subPath so it doesn't
          # collide with the nix store.
          persistentVolumeClaim:
            claimName: {{ .Values.cache.pvcName | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
{{- end }}
