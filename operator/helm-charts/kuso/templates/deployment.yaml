apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kuso.fullname" . }}
  labels:
    {{- include "kuso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "kuso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kuso.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kuso.serviceAccountName" . }}
      terminationGracePeriodSeconds: 0
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - mountPath: /data
              name: kuso-data
          env:
            - name: KUSO_HTTP_ADDR
              value: ":{{ .Values.service.port }}"
            - name: KUSO_DB_PATH
              value: /data/kuso.sqlite
            - name: KUSO_NAMESPACE
              value: "{{ .Values.kuso.namespace }}"
            {{- if .Values.kuso.auditLogs.enabled }}
            - name: KUSO_AUDIT
              value: "true"
            - name: KUSO_AUDIT_LIMIT
              value: "{{ .Values.kuso.auditLogs.limit }}"
            {{- end }}
            {{- if .Values.registry.enabled }}
            - name: KUSO_BUILD_REGISTRY
              value: "{{ .Values.registry.host }}"
            {{- end }}
            - name: KUSO_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: KUSO_ADMIN_USERNAME
                  optional: true
            - name: KUSO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: KUSO_ADMIN_PASSWORD
                  optional: true
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: JWT_SECRET
            - name: KUSO_SESSION_KEY
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: KUSO_SESSION_KEY
                  optional: true
            {{- if .Values.kuso.auth.github.enabled }}
            - name: GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: GITHUB_CLIENT_SECRET
            - name: GITHUB_CLIENT_ID
              value: {{ .Values.kuso.auth.github.id | quote }}
            - name: GITHUB_CLIENT_CALLBACKURL
              value: {{ .Values.kuso.auth.github.callbackUrl | quote }}
            - name: GITHUB_CLIENT_ORG
              value: {{ .Values.kuso.auth.github.org | quote }}
            {{- end }}
            {{- if .Values.kuso.auth.oauth2.enabled }}
            - name: OAUTH2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: OAUTH2_CLIENT_SECRET
            - name: OAUTH2_CLIENT_ID
              {{- if .Values.kuso.auth.oauth2.id }}
              value: {{ .Values.kuso.auth.oauth2.id | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: kuso-secrets
                  key: OAUTH2_CLIENT_ID
              {{- end }}
            - name: OAUTH2_CLIENT_AUTH_URL
              value: {{ .Values.kuso.auth.oauth2.authUrl | quote }}
            - name: OAUTH2_CLIENT_TOKEN_URL
              value: {{ .Values.kuso.auth.oauth2.tokenUrl | quote }}
            - name: OAUTH2_CLIENT_CALLBACKURL
              value: {{ .Values.kuso.auth.oauth2.callbackUrl | quote }}
            - name: OAUTH2_CLIENT_USER_INFO_URL
              value: {{ .Values.kuso.auth.oauth2.userInfoUrl | quote }}
            {{- if .Values.kuso.auth.oauth2.scope }}
            - name: OAUTH2_CLIENT_SCOPE
              value: {{ .Values.kuso.auth.oauth2.scope | quote }}
            {{- end }}
            {{- end }}
            # GitHub App envs are read from a separate Secret installed
            # by hack/install.sh (kuso-github-app). Wire them here too
            # so the Go server picks them up via envFrom-style refs.
          envFrom:
            - secretRef:
                name: kuso-github-app
                optional: true
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: kuso-data
          persistentVolumeClaim:
            claimName: {{ include "kuso.fullname" . }}-data
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
