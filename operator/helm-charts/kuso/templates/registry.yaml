{{- if .Values.registry.enabled -}}
{{- $basicAuth := printf "%s:%s" .Values.registry.account.username .Values.registry.account.hash -}}
# used by the registry ingress to authenticate users
apiVersion: v1
kind: Secret
metadata:
  name: registry-basic-auth
type: Opaque
data:
  auth: {{ $basicAuth | b64enc }}
---
{{- $dockerAuth := (printf "%s:%s" .Values.registry.account.username .Values.registry.account.password) | b64enc -}}
{{- $dockerconfigjson := printf "{\"auths\":{\"%s\":{\"username\":\"%s\",\"password\":\"%s\",\"auth\":\"%s\"}}}" .Values.registry.host .Values.registry.account.username .Values.registry.account.password $dockerAuth -}}
# copied to pipeline namespace for kpack, nixpack, dockerfile and to pull images
apiVersion: v1
kind: Secret
metadata:
  name: registry-login
type: Opaque
data:
  username: {{ .Values.registry.account.username | b64enc }}
  password: {{ .Values.registry.account.password | b64enc }}
  .dockerconfigjson: {{ $dockerconfigjson | b64enc }}
---
{{- if .Values.registry.create -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kuso-registry-data-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.registry.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.registry.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    run: registry
  name: kuso-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      run: registry
  template:
    metadata:
      labels:
        run: registry
    spec:
      containers:
      - name: registry
        image: registry:2
        ports:
        - containerPort: 5000
        env:
        - name: REGISTRY_HTTP_ADDR
          value: 0.0.0.0:5000
        # Enable the delete API so the registry-gc CronJob can drop
        # untagged blobs. Without this flag, garbage-collect refuses
        # to delete anything and the PVC grows unbounded.
        - name: REGISTRY_STORAGE_DELETE_ENABLED
          value: "true"
        volumeMounts:
        - name: registry-data
          mountPath: /var/lib/registry
          subPath: registry
      volumes:
      - name: registry-data
        persistentVolumeClaim:
          claimName: kuso-registry-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: kuso-registry
spec:
  type: ClusterIP
  selector:
    run: registry
  ports:
    - name: registry-tcp
      protocol: TCP
      port: 5000
      targetPort: 5000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kuso-registry-ingress
  labels:
    {{- include "kuso.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/tls-acme: "true"
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: registry-basic-auth
    nginx.ingress.kubernetes.io/auth-realm: 'Kuso Registry'
    nginx.ingress.kubernetes.io/proxy-body-size: '0'
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4}}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.registry.host }}
      secretName: kuso-registry-tls
  rules:
    - host: {{ .Values.registry.host | quote }}
      http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: kuso-registry
                port:
                  number: 5000
{{- end }}
{{- end }}