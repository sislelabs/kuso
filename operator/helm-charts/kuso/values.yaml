# Default values for kuso.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  # Go server image, published to GHCR. Set pullPolicy=IfNotPresent in
  # dev so a locally-imported image (`docker save | k3s ctr images
  # import -`) is preferred when present, and Always in production
  # behind a registry pull secret.
  repository: ghcr.io/sislelabs/kuso-server-go
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "v0.2.0-rc1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: 
  fsGroup: 1000

securityContext:
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 3000

prometheus:
  enabled: false
  create: false
  endpoint: http://kuso-prometheus-server # for internal access via service without ingress
  alertmanager:
    enabled: false
  kube-state-metrics:
    enabled: false
  server:
    enabled: true
    ingress:
      enabled: false
      hosts:
        - prometheus.localhost
  prometheus-node-exporter:
    enabled: false
  prometheus-pushgateway:
    enabled: false


registry:
  enabled: false  # creates registry credentials for a external or a local registry (required for build strategy apps)
  create: false   # spins up a local registry
  public: true   # makes the local registry public accessible (required, when cluster can't be configured to pull from nonHTTPS sources)
  #host: docker.io                          # requires a docker account. Might be the best choice when running on a non public domain
  #protocol: https
  #port: 443
  host: registry-kuso.kuso.svc          # internal registry. Use a FQDN for a public registry
  protocol: http
  port: 5000
  account:
    # MUST OVERRIDE — these placeholders intentionally render a broken
    # registry config so an operator who forgets to set credentials
    # gets an immediate 401 instead of a public-write registry.
    # Pre-v0.9.8 the defaults were username=kuso / password=kuso plus
    # the matching bcrypt hash, all committed in this file. Anyone who
    # rendered this chart unchanged exposed an unauthenticated push
    # surface to whoever could reach the cluster IP.
    #
    # Generate replacements with:
    #   docker run --entrypoint htpasswd httpd:2 -Bbn USERNAME PASSWORD
    # then set --set registry.account.{username,password,hash} on
    # `helm install`, OR write your own values.yaml that overrides
    # all three fields.
    username: ""
    password: ""
    hash: ""
  storage: 1Gi
  storageClassName:
  # Garbage collection. Runs `registry garbage-collect --delete-untagged`
  # against the in-cluster registry's PVC on a cron schedule, dropping
  # blobs no longer referenced by any tag (including kaniko's
  # `.cache/sha256:...` layer cache). Without this, every successful
  # build leaves blobs forever and the PVC eventually fills.
  #
  # The job briefly takes the registry offline (~1-3 min) because GC
  # against a live registry can corrupt the index. A recovery CronJob
  # fires shortly after to scale the registry back up if the GC Job
  # crashed before completing. Default is weekly at Sunday 03:30 UTC;
  # adjust if your traffic pattern differs.
  gc:
    enabled: true
    schedule: "30 3 * * 0"
    # Recovery scale-up runs ~10 minutes after the GC start to give a
    # successful GC time to scale back up on its own. In the happy
    # path this is a no-op.
    recoverSchedule: "40 3 * * 0"

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: localhost.kuso.sislelabs.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: kuso-tls
  #    hosts:
  #      - localhost.kuso.sislelabs.com

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

kuso:
  debug: ""
  namespace: kuso
  context: inClusterContext
  webhook_url: http://kuso.localhost/api/repo/webhooks
  #sessionKey: "randomString"
  auth:
    github:
      # set your secrets in the secret resource
      enabled: false
      id: ""
      callbackUrl: ""
      org: ""
    oauth2:
      enabled: false
      name: ""
      id: ""
      authUrl: ""
      tokenUrl: ""
      secret: ""
      callbackUrl: ""
      scope: "" # space seperated list of scopes
  auditLogs:
    enabled: false
    storageClassName:
    accessModes: 
      - ReadWriteOnce
    size: 0.1Gi
    limit: 1000
  database:
    storageClassName:
    accessModes: 
      - ReadWriteOnce
    size: 1Gi

  # NOTE: pre-v0.2 redesign this section also held inline `buildpacks:`
  # (per-language fetch/build/run image triples) and `podSizeList:`
  # (small/medium/large preset). Both are gone — buildpacks moved
  # under the per-service KusoService spec, and pod sizing is
  # configured live via /api/admin/settings/build (see
  # web/src/app/(app)/settings/builds/page.tsx). The templates here
  # never referenced either, so removing them is purely a doc cleanup.
  config:
    kuso:
      readonly: false
      admin:
        disabled: false
      console:
        enabled: false
      banner:
        show: false
        message: "Welcome to Kuso!"
        bgcolor: "#8560A9"
        fontcolor: "azure"
    clusterissuer: letsencrypt-prod
