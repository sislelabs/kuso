{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kusoapp.serviceAccountName" . }}
  labels:
    {{- include "kusoapp.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

---
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "kusoapp.serviceAccountName" . }}role
rules:
  - apiGroups: ["application.kuso.sislelabs.com"]
    resources: ["kusoapps"]
    verbs: ["update", "patch", "get", "list", "watch"]

---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ include "kusoapp.serviceAccountName" . }}rolebinding
subjects:
  - kind: ServiceAccount
    name: {{ include "kusoapp.serviceAccountName" . }}
roleRef:
  kind: Role
  name: {{ include "kusoapp.serviceAccountName" . }}role
  apiGroup: rbac.authorization.k8s.io
{{- end }}
