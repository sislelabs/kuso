# Default values for KusoAddon CRs. Polymorphic — set spec.kind to one of
# the supported engines below. The chart emits a kind-specific StatefulSet
# (or Deployment) plus a `<project>-<addon>-conn` Secret that every
# KusoEnvironment in the project picks up via envFrom.
#
# Kinds supported in v0.2.0:
#   postgres   — full implementation (StatefulSet + PVC, password generated)
#   redis      — full implementation (StatefulSet + PVC, password generated)
#
# Kinds reserved (skeleton-only in v0.2.0; real impls in v0.2.x):
#   mongodb, mysql, rabbitmq, memcached, clickhouse, elasticsearch, kafka,
#   cockroachdb, couchdb
#
# project: required. Used for the connection secret name and label scoping.
project: ""

# kind: required. One of the values listed above.
kind: postgres

# version: engine version tag. Defaults are kind-specific; see
# templates/<kind>.yaml.
version: ""

# size: small | medium | large; maps to default cpu/mem/storage requests.
size: small

# ha: when true, render a clustered/replicated variant of the engine.
#   postgres → CloudNativePG Cluster with 3 replicas, synchronous
#              replication, automated failover, and a -rw / -ro
#              Service pair. Requires the CNPG operator pre-installed
#              cluster-wide (one-shot, not managed by kuso). See
#              docs/ADDON_HA.md for the install command.
#   redis    → sentinel mode (3-pod replicated, automatic failover)
#   others   → ignored (single-node fallback)
ha: false

# singleNode: only honoured when ha=true on a Postgres addon. Allows
# the 3 CNPG replicas to colocate on one kube node — accepts the
# SPOF in exchange for HA-shaped replication on a single-node
# cluster (useful for dev / staging). Default false: pods land on
# different nodes via anti-affinity.
singleNode: false

# storageSize: PVC size override; defaults derived from size.
storageSize: ""

# resources: per-engine cpu/mem overrides; defaults derived from size.
resources: {}

# password: optional explicit password. When empty, the server (or a hook)
# generates a random one and stores it in the connection secret.
password: ""

# database: kind-specific default database name. For postgres/mongodb defaults
# to `<project>` if empty.
database: ""

backup:
  schedule: ""
  retentionDays: 14

# placement: pin the addon's StatefulSet to a subset of nodes. Same
# shape as the kusoenvironment chart's placement field. Empty =
# schedule anywhere. The kuso server passes spec.placement through
# verbatim; the user edits it via the addon settings drawer.
#
# placement:
#   labels:
#     region: eu        # → kuso.sislelabs.com/region=eu node label
#     tier: db
#   nodes:
#     - worker-2        # match by kubernetes.io/hostname
placement: {}

# external: connect-to-existing instead of provisioning. When set,
# the chart skips StatefulSet/Service/CronJob entirely. The kuso
# server is responsible for creating the <release>-conn Secret as
# a copy of external.secretName. Use when you already pay for a
# managed Postgres/Redis (Hetzner Cloud, Neon, RDS, Upstash).
# external:
#   secretName: my-managed-pg
#   secretKeys: [DATABASE_URL]   # optional allowlist
external: {}

# useInstanceAddon: name of an instance-shared addon (registered by
# admin via instance secret INSTANCE_ADDON_<UPPER>_DSN_ADMIN).
# When set, no StatefulSet is rendered; the kuso server creates a
# per-project database on the shared server and writes the DSN
# into <name>-conn.
useInstanceAddon: ""

# pooler: opt-in PgBouncer in front of a kind=postgres addon. When
# enabled, single-node addons get a self-managed 1-replica PgBouncer
# Deployment; HA (CNPG) addons get a CNPG-native Pooler CRD. Reach it
# via the POOLER_HOST/POOLER_PORT/POOLER_URL keys in <name>-conn;
# DATABASE_URL stays direct. Ignored for non-postgres kinds.
pooler:
  enabled: false

# publicTCP: opt-in public TCP endpoint for the addon. enabled is the
# user toggle; port is server-allocated from the cluster's configured
# pool (KUSO_TCP_PROXY_PORTS on kuso-server). The chart renders a
# Traefik IngressRouteTCP only when BOTH are set. Default off.
publicTCP:
  enabled: false
  port: 0
