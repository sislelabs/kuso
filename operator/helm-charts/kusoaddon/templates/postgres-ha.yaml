{{- /*
HA Postgres via CloudNativePG. Rendered when:
  - kind = postgres
  - ha    = true
  - external/useInstanceAddon are both unset (those paths bypass
    provisioning entirely)

CNPG must be installed cluster-wide for this to work — the operator
ships its own CRDs and reconciles `postgresql.cnpg.io/v1/Cluster`
into a 3-node Postgres with synchronous replication, automated
failover, and pgbouncer-style read pools. We don't manage the CNPG
operator itself; the kuso install docs flag it as a one-shot
prerequisite for HA addons.

The `<name>-conn` Secret keeps the SAME shape as the single-node
chart so consumer KusoEnvironments don't need a code change to
follow an addon from non-HA → HA. We do this by:

  1. Creating `<name>-app` upfront with a known password (lookup-
     reused on reconcile, same drift-guard trick as the bare chart).
  2. Pointing CNPG at that Secret via spec.bootstrap.initdb.secret.
  3. Writing `<name>-conn` ourselves, identical key set, hostname
     pointed at CNPG's `<cluster-name>-rw` Service which fronts the
     primary and follows failovers automatically.

Limitations the user should know about:
  - First boot creates 3 pods + 3 PVCs (one per replica). On a
    single-node cluster CNPG will refuse with "anti-affinity";
    set spec.affinity.enablePodAntiAffinity=false in the chart
    override to allow co-located replicas (ack the SPOF).
  - Failover on primary loss takes ~30s. Apps that don't reconnect
    cleanly should pin a connection-retry policy.
  - Backups are CNPG's barman backup, not our pg_dump cronjob.
    The legacy backup-cronjob.yaml is suppressed in HA mode.
*/}}
{{- if and (eq .Values.kind "postgres") .Values.ha (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- $version := .Values.version | default "16" -}}
{{- $database := .Values.database | default .Values.project -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $secretName := include "kusoaddon.connSecretName" . -}}
{{- $appSecret := printf "%s-app" $name -}}

{{- /* Password reuse — same lookup-or-generate dance as the
       single-node chart. The CNPG Cluster reads from $appSecret;
       we own that Secret so we control rotation lifecycle. */ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $appSecret -}}
{{- $existingPw := "" -}}
{{- if and $existing $existing.data (index $existing.data "password") -}}
  {{- $existingPw = (index $existing.data "password" | b64dec) -}}
{{- end -}}
{{- $providedPw := "" -}}
{{- if .Values.passwordSecret -}}
  {{- $key := default "password" .Values.passwordSecret.key -}}
  {{- $src := lookup "v1" "Secret" .Release.Namespace .Values.passwordSecret.name -}}
  {{- if and $src $src.data (index $src.data $key) -}}
    {{- $providedPw = (index $src.data $key | b64dec) -}}
  {{- end -}}
{{- end -}}
{{- $existingCluster := lookup "postgresql.cnpg.io/v1" "Cluster" .Release.Namespace $name -}}
{{- if and $existingCluster (not $existingPw) (not $providedPw) (not .Values.password) -}}
  {{- fail (printf "kusoaddon %s/%s: HA Cluster exists but app Secret is missing — refusing to generate a fresh password. Run `kuso project addon repair-password` to recover." .Release.Namespace $name) -}}
{{- end -}}
{{- $password := $providedPw | default .Values.password | default $existingPw | default (randAlphaNum 24) -}}

{{- /* CNPG-format app Secret. Keys: username, password, database,
       host, port, uri — the shape CNPG expects from a "basicAuth"
       style userSecret. CNPG won't overwrite our values; we own
       the Secret. */ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $appSecret }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
  annotations:
    # Keep the bootstrap app Secret on uninstall for the same reason the
    # Cluster (and its PVCs) are kept below: on a delete+recreate at the
    # same name the surviving pgdata must keep matching the surviving
    # password. Losing this Secret would regenerate a fresh password that
    # can't auth against the retained data volumes.
    "helm.sh/resource-policy": keep
type: kubernetes.io/basic-auth
# base64 data: not stringData: — avoids perpetual helm-operator reconcile churn (see postgres.yaml conn Secret comment).
data:
  username: {{ "kuso" | b64enc | quote }}
  password: {{ $password | b64enc | quote }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
  annotations:
    # Retain the CNPG Cluster on helm uninstall. The Cluster's per-replica
    # data PVCs carry ownerReferences back to this Cluster object, so a helm
    # delete of the Cluster cascades into deleting EVERY replica PVC — total
    # data loss. Keeping the Cluster means uninstall leaves the Cluster + its
    # PVCs behind, matching the single-node StatefulSet behavior (whose
    # VCT-spawned PVCs a StatefulSet never GCs and helm doesn't own). A
    # deliberate teardown goes through the PurgeData path, not helm uninstall.
    "helm.sh/resource-policy": keep
spec:
  imageName: "ghcr.io/cloudnative-pg/postgresql:{{ $version }}"
  instances: 3
  primaryUpdateStrategy: unsupervised
  storage:
    size: {{ include "kusoaddon.storageSize" . }}
  bootstrap:
    initdb:
      database: {{ $database | quote }}
      owner: kuso
      secret:
        name: {{ $appSecret }}
  {{- /* Resource shape mirrors the single-node chart so the user's
         spec.size selection is honoured for both modes. */}}
  resources:
    {{- include "kusoaddon.resources" . | nindent 4 }}
  affinity:
    {{- /* Pod anti-affinity by default so the 3 replicas land on
           different nodes. Override with .Values.singleNode=true
           when the cluster only has one node and the user
           accepts the SPOF for dev. */}}
    enablePodAntiAffinity: {{ ne (default false .Values.singleNode) true }}
    topologyKey: kubernetes.io/hostname
    {{- /* Placement. Same spec.placement.{labels,nodes} mapping as the
           single-node chart, but CNPG nests every scheduling knob under
           spec.affinity (nodeSelector / nodeAffinity / tolerations —
           there is no top-level spec.nodeSelector on a Cluster), so we
           parse the shared helper's output and re-nest it here. */}}
    {{- $placement := include "kusoaddon.placement" . | fromYaml | default dict }}
    {{- with $placement.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $placement.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $placement.affinity }}
    {{- with .nodeAffinity }}
    nodeAffinity:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- end }}
---
{{- /* Conn Secret: same key set as the single-node chart so consumer
       envs round-trip unchanged. POSTGRES_HOST points at the
       <name>-rw Service CNPG creates — that Service follows the
       primary across failovers. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
  annotations:
    # Same retain-on-uninstall trick as the single-node chart's PVC.
    "helm.sh/resource-policy": keep
type: Opaque
# base64 data: not stringData: — avoids perpetual helm-operator reconcile churn (see postgres.yaml conn Secret comment).
data:
  POSTGRES_HOST: {{ printf "%s-rw" $name | b64enc | quote }}
  POSTGRES_PORT: {{ "5432" | b64enc | quote }}
  POSTGRES_USER: {{ "kuso" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ $password | b64enc | quote }}
  POSTGRES_DB: {{ $database | b64enc | quote }}
  # CNPG serves TLS by default but we connect via the in-cluster Service
  # ClusterIP with sslmode=disable: plaintext avoids cert-handshake latency
  # and, more importantly, sidesteps the cross-driver self-signed-cert
  # incompatibility (Go/pgx vs node-postgres disagree on which sslmode
  # accepts an unverified chain — see the single-node postgres.yaml note).
  # In-cluster isolation is the CNI + NetworkPolicies' job. Apps needing
  # verified in-cluster TLS should pin CNPG's CA in their driver config.
  DATABASE_URL: {{ printf "postgres://kuso:%s@%s-rw:5432/%s?sslmode=disable" ($password | urlquery) $name $database | b64enc | quote }}
  {{- /* DIRECT_URL: un-pooled, session-safe DSN for Prisma `directUrl` and
         any migration tool that needs a sticky session. Points at the CNPG
         primary (-rw, direct :5432), never the -pooler:6432 endpoint, because
         session-scoped pg_advisory_lock (Prisma's migration lock 72707369)
         leaks across the transaction boundary under PgBouncer transaction
         pooling and hangs `migrate deploy`. Emitted unconditionally so the
         ${{ <addon>.DIRECT_URL }} contract is identical across the
         single-node, HA, and instance-shared paths. */}}
  DIRECT_URL: {{ printf "postgres://kuso:%s@%s-rw:5432/%s?sslmode=disable" ($password | urlquery) $name $database | b64enc | quote }}
  {{- /* Pooler keys are ALWAYS emitted (empty when disabled), not
         conditionally rendered: helm-operator's 3-way merge does not
         prune individual stringData keys that vanish between
         upgrades, so a conditional block leaves stale POOLER_URL
         values after pooler.enabled flips false. Same rationale as
         the single-node postgres.yaml chart. */}}
  {{- if and .Values.pooler .Values.pooler.enabled }}
  POOLER_HOST: {{ printf "%s-pooler" $name | b64enc | quote }}
  POOLER_PORT: {{ "6432" | b64enc | quote }}
  POOLER_URL: {{ printf "postgres://kuso:%s@%s-pooler:6432/%s?sslmode=disable" ($password | urlquery) $name $database | b64enc | quote }}
  {{- else }}
  POOLER_HOST: {{ "" | b64enc | quote }}
  POOLER_PORT: {{ "" | b64enc | quote }}
  POOLER_URL: {{ "" | b64enc | quote }}
  {{- end }}
  # Read-only fanout. Apps that want to send read traffic to a
  # replica wire READONLY_DATABASE_URL into their pool. Optional —
  # apps that don't care just use DATABASE_URL.
  READONLY_DATABASE_URL: {{ printf "postgres://kuso:%s@%s-ro:5432/%s?sslmode=disable" ($password | urlquery) $name $database | b64enc | quote }}
{{- /* Opt-in CNPG-native PgBouncer. CNPG manages the Pooler's own
       Deployment + a <name>-pooler Service and follows primary
       failover natively, so HA addons get pooling without a
       self-rendered Deployment. type: rw fronts the primary. */}}
{{- if and .Values.pooler .Values.pooler.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ $name }}-pooler
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ $name }}
  instances: 1
  type: rw
  pgbouncer:
    poolMode: transaction
{{- end }}
{{- end }}
