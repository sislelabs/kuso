{{- if and (eq .Values.kind "clickhouse") (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- $version := .Values.version | default "24.8-alpine" -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $secretName := include "kusoaddon.connSecretName" . -}}
{{/*
  ClickHouse — columnar OLAP database for analytics workloads. Bigger
  footprint than the other addons (~1 GB minimum, columnar storage,
  in-memory mark caches), but it's the right answer for indie SaaS
  founders building product-analytics tables, log warehouses, or
  ad-hoc reporting on their app DB. Postgres handles "what's the
  user's todo list"; ClickHouse handles "show me 90-day MRR by
  cohort", which is what makes a SaaS founder pay attention to it.

  Single-instance config — replication / sharded clusters are out of
  scope, you'd switch to ClickHouse Cloud or self-hosted via raw
  Helm if you need that. The auth model is the standard
  default-user + secret password: every connection authenticates;
  no anonymous access.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingPw := "" -}}
{{- if and $existing $existing.data (index $existing.data "CLICKHOUSE_PASSWORD") -}}
  {{- $existingPw = (index $existing.data "CLICKHOUSE_PASSWORD" | b64dec) -}}
{{- end -}}
{{- $password := .Values.password | default $existingPw | default (randAlphaNum 24) -}}
{{- $database := .Values.database | default "kuso" -}}
{{/*
  Default user config baked into a secret so we can interpolate the
  password into it. Mounting the secret as a file into ClickHouse's
  /etc/clickhouse-server/users.d/ overrides the built-in defaults.
*/}}
{{- $defaultUserXml := printf "<?xml version=\"1.0\"?>\n<clickhouse>\n  <users>\n    <default>\n      <password>%s</password>\n      <networks>\n        <ip>::/0</ip>\n      </networks>\n      <profile>default</profile>\n      <quota>default</quota>\n      <access_management>1</access_management>\n    </default>\n  </users>\n</clickhouse>\n" $password -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}-userconf
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: Opaque
# base64 data: not stringData: — avoids perpetual helm-operator reconcile churn (see postgres.yaml conn Secret comment).
data:
  default-user.xml: {{ $defaultUserXml | b64enc | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kusoaddon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoaddon.selectorLabels" . | nindent 8 }}
        {{- include "kusoaddon.labels" . | nindent 8 }}
    spec:
      {{- include "kusoaddon.podSecurityContext" . | nindent 6 }}
      {{- include "kusoaddon.placement" . | nindent 6 }}
      initContainers:
        # The CH entrypoint (with access-management on) rewrites files
        # under /etc/clickhouse-server/users.d at boot. A configmap/secret
        # subPath mount is read-only, so the entrypoint dies with
        # "Read-only file system". Stage our default-user.xml into a
        # WRITABLE emptyDir the entrypoint can also write to.
        - name: seed-userconf
          image: "clickhouse/clickhouse-server:{{ $version }}"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          command: ["/bin/sh", "-c"]
          args:
            - "cp /seed/default-user.xml /etc/clickhouse-server/users.d/default-user.xml"
          volumeMounts:
            - name: seed-userconf
              mountPath: /seed
            - name: usersd
              mountPath: /etc/clickhouse-server/users.d
      containers:
        - name: clickhouse
          image: "clickhouse/clickhouse-server:{{ $version }}"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8123
            - name: native
              containerPort: 9000
          env:
            # Auto-create the application database on first boot.
            # ClickHouse's official image reads CLICKHOUSE_DB env in
            # its entrypoint init scripts.
            - name: CLICKHOUSE_DB
              value: {{ $database | quote }}
            # The image entrypoint regenerates default-user.xml at boot
            # from CLICKHOUSE_USER/PASSWORD. Without PASSWORD here the
            # default user gets an EMPTY password on the server while the
            # conn-secret advertises the generated one → every client
            # using the secret fails auth. Pass the same $password the
            # conn-secret carries so server and secret agree.
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              value: {{ $password | quote }}
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: logs
              mountPath: /var/log/clickhouse-server
            - name: usersd
              mountPath: /etc/clickhouse-server/users.d
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          # Slow boot: ClickHouse needs ~10-30s to load schemas + warm
          # the mark cache. Without a startupProbe the readiness check
          # would false-fail and kube would Restart the container.
          startupProbe:
            httpGet:
              path: /ping
              port: http
            periodSeconds: 5
            failureThreshold: 30
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: logs
          emptyDir: {}
        # Read-only source for the seed initContainer.
        - name: seed-userconf
          secret:
            secretName: {{ $name }}-userconf
        # Writable users.d the entrypoint can rewrite at boot.
        - name: usersd
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          # Retain the data PVC on uninstall (matches postgres). Deleting
          # a KusoAddon CR cascades the StatefulSet; without this the PVC
          # + PV go too (stock k3s reclaimPolicy=Delete) and the data is
          # gone. Kept so an accidental addon delete isn't a data-loss
          # event — reclaim space with an explicit `kubectl delete pvc`.
          "helm.sh/resource-policy": keep
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ include "kusoaddon.storageSize" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8123
      targetPort: http
    - name: native
      port: 9000
      targetPort: native
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kusoaddon.connSecretName" . }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: Opaque
# base64 data: not stringData: — avoids perpetual helm-operator reconcile churn (see postgres.yaml conn Secret comment).
data:
  CLICKHOUSE_HOST: {{ $name | b64enc | quote }}
  CLICKHOUSE_HTTP_PORT: {{ "8123" | b64enc | quote }}
  CLICKHOUSE_NATIVE_PORT: {{ "9000" | b64enc | quote }}
  CLICKHOUSE_USER: {{ "default" | b64enc | quote }}
  CLICKHOUSE_PASSWORD: {{ $password | b64enc | quote }}
  CLICKHOUSE_DATABASE: {{ $database | b64enc | quote }}
  # HTTP URL — most TS/Python clients accept this form. Native URL
  # for the higher-perf clickhouse-driver / clickhouse-go SDKs.
  CLICKHOUSE_URL: {{ printf "http://default:%s@%s:8123/%s" $password $name $database | b64enc | quote }}
  CLICKHOUSE_NATIVE_URL: {{ printf "clickhouse://default:%s@%s:9000/%s" $password $name $database | b64enc | quote }}
{{- end }}
