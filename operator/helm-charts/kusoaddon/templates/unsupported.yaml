{{- $supported := list "postgres" "redis" "valkey" "mongodb" "mysql" "rabbitmq" "s3" "mailpit" "nats" "meilisearch" "clickhouse" "redpanda" -}}
{{- /* Kinds whose per-kind templates gate on `not .Values.ha` and have
       no -ha counterpart. Without this guard, ha=true on one of these
       renders ZERO resources yet helm exits 0 — the addon reconciles
       "successfully" into nothing. Fail loudly instead. (postgres/redis/
       nats have real -ha templates; clickhouse/mailpit/meilisearch/s3
       ignore ha and fall back to single-node by design — see values.yaml.
       external / useInstanceAddon bypass provisioning entirely, so ha
       is moot on those paths.) */ -}}
{{- $noHA := list "valkey" "mongodb" "mysql" "rabbitmq" "redpanda" -}}
{{- if and .Values.ha (has .Values.kind $noHA) (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- fail (printf "kusoaddon: kind %q does not support ha=true — no HA template exists, so nothing would be deployed. Set ha=false, or use an HA-capable kind (postgres, redis, nats)." .Values.kind) -}}
{{- end -}}
{{- if not (has .Values.kind $supported) }}

# Skeleton for addon kinds reserved in v0.2.0 but not yet implemented:
#   mysql, memcached, elasticsearch, kafka, cockroachdb, couchdb
#
# Implemented: redpanda (Kafka-API streaming), valkey (BSD redis fork),
# mongodb (document DB), rabbitmq (AMQP broker + mgmt UI). See their
# per-kind templates.
#
# Real implementations land across v0.2.x as users ask. v0.9.37
# added: mailpit (dev SMTP), nats (MQ + JetStream), meilisearch
# (full-text search), clickhouse (analytics OLAP). For the rest we
# emit a marker ConfigMap so the helm-operator reconcile succeeds
# and the user gets a clear "not yet supported" status to read.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kusoaddon.fullname" . }}-pending
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
data:
  status: "addon kind '{{ .Values.kind }}' is reserved but not implemented in v0.2.0"
{{- end }}
