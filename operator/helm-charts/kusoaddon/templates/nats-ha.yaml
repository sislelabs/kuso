{{- if and (eq .Values.kind "nats") .Values.ha (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- $version := .Values.version | default "2.10-alpine" -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $secretName := include "kusoaddon.connSecretName" . -}}
{{/*
  NATS JetStream HA — 3-replica clustered StatefulSet.

  Why: the single-pod NATS chart loses in-flight messages on pod
  delete / node failure until kube reschedules and JetStream
  redelivers. For payment platforms, ticketing, anything where
  emails/PDFs/payouts queue through the message bus, that's the
  wrong story. A 3-replica cluster with JetStream replicas: 3
  survives a single node loss with zero message loss.

  Mechanics:
    - Headless Service `<name>-cluster` for pod-to-pod routing
      (the cluster gossip protocol needs stable DNS per replica).
    - Public Service `<name>` clients connect to; load-balances
      across the 3 pods.
    - StatefulSet replicas: 3, each with its own PVC.
    - nats.conf cluster block declares routes nats-route://0:6222 →
      <name>-0…2.<name>-cluster (the headless service auto-emits
      `<pod-name>.<service-name>` DNS).
    - JetStream stream defaults (when users `nats stream add`)
      should specify --replicas 3 to get the HA guarantee. We do
      NOT enforce that at addon level — it's a stream-creation-
      time setting that depends on stream policy. Documented in
      the addon CTA.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingTok := "" -}}
{{- if and $existing $existing.data (index $existing.data "NATS_TOKEN") -}}
  {{- $existingTok = (index $existing.data "NATS_TOKEN" | b64dec) -}}
{{- end -}}
{{- $token := .Values.password | default $existingTok | default (randAlphaNum 32) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-conf
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
data:
  nats.conf: |
    port: 4222
    http_port: 8222
    server_name: $POD_NAME

    authorization {
      token: "$NATS_TOKEN_PLACEHOLDER"
    }

    cluster {
      name: {{ $name }}
      listen: 0.0.0.0:6222
      routes = [
        nats-route://{{ $name }}-0.{{ $name }}-cluster:6222
        nats-route://{{ $name }}-1.{{ $name }}-cluster:6222
        nats-route://{{ $name }}-2.{{ $name }}-cluster:6222
      ]
    }

    jetstream {
      store_dir: /data/jetstream
      max_file_store: 1GB
      max_memory_store: 64MB
    }
---
# Headless service for pod-to-pod gossip. Each pod gets a stable
# DNS name <pod>.<service>.<ns>.svc.cluster.local that the cluster
# block references — without this, routes resolve to ClusterIPs that
# don't survive pod restarts.
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}-cluster
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
  ports:
    - name: cluster
      port: 6222
      targetPort: cluster
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}-cluster
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "kusoaddon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoaddon.selectorLabels" . | nindent 8 }}
        {{- include "kusoaddon.labels" . | nindent 8 }}
    spec:
      {{- include "kusoaddon.podSecurityContext" . | nindent 6 }}
      {{- include "kusoaddon.placement" . | nindent 6 }}
      # Spread replicas across nodes — without this, kube can stack
      # all 3 on the same host and a node failure takes the whole
      # cluster down (defeating the point of HA).
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kusoaddon.selectorLabels" . | nindent 14 }}
      initContainers:
        - name: render-conf
          image: alpine:3.20
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              sed "s#\$NATS_TOKEN_PLACEHOLDER#${NATS_TOKEN}#g" \
                /raw/nats.conf > /etc/nats/nats.conf
          env:
            - name: NATS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: NATS_TOKEN
          volumeMounts:
            - name: raw-conf
              mountPath: /raw
            - name: conf
              mountPath: /etc/nats
      containers:
        - name: nats
          image: "nats:{{ $version }}"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          imagePullPolicy: IfNotPresent
          # POD_NAME is interpolated into server_name so each replica
          # registers a distinct identity in the cluster.
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          args: ["--name", "$(POD_NAME)", "-c", "/etc/nats/nats.conf"]
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: conf
              mountPath: /etc/nats
            - name: data
              mountPath: /data
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- include "kusoaddon.resources" . | nindent 12 }}
      volumes:
        - name: raw-conf
          configMap:
            name: {{ $name }}-conf
        - name: conf
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        # NOTE: volumeClaimTemplates must stay annotation-free. K8s forbids
        # any change to a StatefulSet's volumeClaimTemplates after creation,
        # so adding a VCT annotation traps every pre-existing addon in a
        # failed helm upgrade (see chart_render addon_vct_test). PVC data is
        # retained regardless: a StatefulSet never garbage-collects its
        # VCT-spawned PVCs, and helm uninstall doesn't own them either.
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ include "kusoaddon.storageSize" . }}
---
# Public client service. Round-robins across the 3 pods. Clients
# can connect to any one; NATS clients auto-discover the cluster
# topology from the server's INFO message and reconnect to a
# different replica on pod-loss.
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
  ports:
    - name: client
      port: 4222
      targetPort: client
    - name: monitor
      port: 8222
      targetPort: monitor
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kusoaddon.connSecretName" . }}
  annotations:
    # Keep the conn Secret aligned with the data PVCs' lifecycle: a
    # delete+re-add over the surviving PVCs must reuse the same credentials,
    # or clients fail auth against the retained JetStream data. Mirrors
    # mongodb / valkey / postgres-ha conn Secrets.
    helm.sh/resource-policy: keep
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: Opaque
# base64 data: not stringData: — avoids perpetual helm-operator reconcile churn (see postgres.yaml conn Secret comment).
data:
  NATS_HOST: {{ $name | b64enc | quote }}
  NATS_PORT: {{ "4222" | b64enc | quote }}
  NATS_TOKEN: {{ $token | b64enc | quote }}
  # HA-aware URL with comma-separated seeds so clients failing over
  # don't depend on the ClusterIP service alone resolving.
  #
  # IMPORTANT: token-auth wants `nats://<token>@host`, NOT
  # `nats://:<token>@host`. The leading colon makes the server
  # interpret it as user="" + password=token and return
  # "Authorization Violation". Same bug + fix as the single-pod
  # nats.yaml.
  NATS_URL: {{ printf "nats://%s@%s-0.%s-cluster:4222,nats://%s@%s-1.%s-cluster:4222,nats://%s@%s-2.%s-cluster:4222" $token $name $name $token $name $name $token $name $name | b64enc | quote }}
  NATS_MONITOR_URL: {{ printf "http://%s:8222" $name | b64enc | quote }}
{{- end }}
