{{- /*
Opt-in single-node PgBouncer for a kind=postgres addon.

Rendered when:
  - kind = postgres
  - pooler.enabled = true
  - ha = false  (the HA path uses a CNPG-native Pooler CRD, in
    postgres-ha.yaml)
  - external / useInstanceAddon both unset (those bypass provisioning)

This mirrors the instance-control-plane pooler in deploy/postgres.yaml:
a PgBouncer Deployment in transaction-pool mode, fronting the addon
StatefulSet's Service. One replica — this is a single-node addon, so
a second pooler replica adds no availability (the DB itself is the
SPOF). A pooler pod restart briefly drops client connections; that's
an accepted cost of this opt-in convenience.

The userlist is rendered at pod start from the <name>-conn Secret's
POSTGRES_USER / POSTGRES_PASSWORD by an init container (PgBouncer's
md5 userlist format is "user" "md5<hash>", hash = md5(password+user)).
Password rotation (kuso project addon repair-password) needs a pooler
pod restart to re-render — rare, operator-driven, acceptable.
*/}}
{{- /*
   Render gate. Normally we skip useInstanceAddon (consumers bypass
   provisioning), but the shared cluster-PG pooler IS rendered for the
   instance PG addon — it sets pooler.instancePooler=true and never sets
   useInstanceAddon (it's the server, not a consumer). So allow render
   when either: a dedicated postgres addon opts in, OR this is the
   instance pooler. external + ha still bypass (ha uses a CNPG Pooler).
*/ -}}
{{- if and (eq .Values.kind "postgres") .Values.pooler .Values.pooler.enabled (not .Values.ha) (not .Values.external) (or (not .Values.useInstanceAddon) (and .Values.pooler.instancePooler)) -}}
{{- $authQuery := eq (default "" .Values.pooler.authMode) "query" -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $poolerName := printf "%s-pooler" $name -}}
{{- $connSecret := include "kusoaddon.connSecretName" . -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $poolerName }}-config
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
data:
  pgbouncer.ini: |
    [databases]
    ; * matches whatever dbname the client connects with, routed at
    ; the addon's Postgres StatefulSet Service on :5432.
    * = host={{ $name }} port=5432

    [pgbouncer]
    listen_addr = 0.0.0.0
    listen_port = 6432
    ; scram-sha-256, not md5: the addon's stock postgres:16 image
    ; defaults password_encryption=scram-sha-256, so the role's
    ; stored verifier is SCRAM. An md5 auth_type + md5 userlist
    ; can't authenticate to a SCRAM backend — pgbouncer rejects the
    ; backend login with "wrong password type". With auth_type
    ; scram-sha-256 and a plaintext-password userlist, pgbouncer
    ; runs SCRAM both to the client and to the backend.
    auth_type = scram-sha-256
    auth_file = /etc/pgbouncer/userlist.txt
    {{- if $authQuery }}
    ; auth_query mode (shared cluster-DB pooler): the backend serves many
    ; per-project roles created/rotated dynamically as projects opt in, so a
    ; static userlist can't keep up. PgBouncer logs in as auth_user (the
    ; instance superuser, the only entry in userlist.txt) and looks up each
    ; client's SCRAM verifier from pg_shadow via auth_query — no pooler
    ; restart when a new per-project role appears.
    ; auth_user is the postgres chart's fixed superuser "kuso" (same
    ; literal the chart stamps into the conn secret + pg_isready probe);
    ; it's the sole entry rendered into userlist.txt below.
    auth_user = kuso
    auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1
    {{- end }}
    pool_mode = transaction
    max_client_conn = 200
    default_pool_size = 25
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    query_wait_timeout = 30
    server_idle_timeout = 600
    log_connections = 0
    log_disconnections = 0
    log_pooler_errors = 1
    ignore_startup_parameters = extra_float_digits,search_path
    admin_users = kuso
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $poolerName }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
    kuso.sislelabs.com/component: pooler
  ports:
    - name: pgbouncer
      port: 6432
      targetPort: 6432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $poolerName }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  # 1 replica — single-node addon, the DB is the SPOF anyway.
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "kusoaddon.selectorLabels" . | nindent 6 }}
      kuso.sislelabs.com/component: pooler
  template:
    metadata:
      labels:
        {{- include "kusoaddon.labels" . | nindent 8 }}
        kuso.sislelabs.com/component: pooler
    spec:
      # kuso-platform priority: the kubelet evicts a workload pod
      # before this pooler when a node goes hot. Matches the addon
      # StatefulSet and the instance pooler in deploy/postgres.yaml.
      priorityClassName: kuso-platform
      # Pod-level hardening. We deliberately do NOT use
      # kusoaddon.podSecurityContext here: that helper pins
      # runAsUser to the addon-kind UID (999 for postgres), which is
      # the Postgres image's user, not the pooler's. Both this pod's
      # images only touch an emptyDir (init: cat/sed/printf into
      # /shared; pgbouncer: read the world-readable userlist + listen
      # on :6432) — none of that needs a specific UID, so we pin a
      # fixed non-root UID for the whole pod. fsGroup makes the
      # emptyDir group-writable so the init container can create the
      # userlist regardless of the chosen UID. This satisfies a PSA
      # `restricted` policy without depending on either image's
      # baked-in user.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      {{- include "kusoaddon.placement" . | nindent 6 }}
      # Init container writes PgBouncer's userlist.txt from the
      # <name>-conn Secret. auth_type=scram-sha-256 (see the ConfigMap
      # comment) takes a PLAINTEXT password entry — pgbouncer derives
      # the SCRAM exchange for both client and backend from it. Format
      # is `"user" "password"`; embedded " and \ are doubled per
      # PgBouncer's userlist quoting rules so passwordSecret-supplied
      # creds with reserved chars round-trip intact.
      initContainers:
        - name: render-userlist
          image: alpine/k8s:1.30.4
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          command: [/bin/sh, -ec]
          args:
            - |
              set -e
              user="$(cat /etc/pg-conn/POSTGRES_USER)"
              pass="$(cat /etc/pg-conn/POSTGRES_PASSWORD)"
              if [ -z "$user" ] || [ -z "$pass" ]; then
                echo "[render-userlist] FATAL: POSTGRES_USER/POSTGRES_PASSWORD missing from conn secret" >&2
                exit 1
              fi
              # Double embedded backslash then double-quote — PgBouncer
              # userlist escaping. Order matters: backslash first.
              esc_user="$(printf '%s' "$user" | sed -e 's/\\/\\\\/g' -e 's/"/""/g')"
              esc_pass="$(printf '%s' "$pass" | sed -e 's/\\/\\\\/g' -e 's/"/""/g')"
              printf '"%s" "%s"\n' "$esc_user" "$esc_pass" > /shared/userlist.txt
              chmod 0444 /shared/userlist.txt
          volumeMounts:
            - { name: pg-conn, mountPath: /etc/pg-conn, readOnly: true }
            - { name: shared, mountPath: /shared }
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:v1.25.1-p0
          imagePullPolicy: IfNotPresent
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          ports:
            - { name: pgbouncer, containerPort: 6432 }
          command: ["/usr/bin/pgbouncer"]
          args: ["/etc/pgbouncer/pgbouncer.ini"]
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          readinessProbe:
            tcpSocket: { port: 6432 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 6432 }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: config, mountPath: /etc/pgbouncer/pgbouncer.ini, subPath: pgbouncer.ini, readOnly: true }
            - { name: shared, mountPath: /etc/pgbouncer/userlist.txt, subPath: userlist.txt, readOnly: true }
      volumes:
        - name: config
          configMap: { name: {{ $poolerName }}-config }
        - name: pg-conn
          secret:
            secretName: {{ $connSecret }}
            items:
              - { key: POSTGRES_USER, path: POSTGRES_USER }
              - { key: POSTGRES_PASSWORD, path: POSTGRES_PASSWORD }
        - name: shared
          emptyDir: {}
{{- end }}
