{{- /*
Backup CronJob for the addon. Only emitted when:
  - addon kind is supported (postgres for v1)
  - .Values.backup.schedule is set (cron expression)

Each run dumps the addon's database with pg_dump, gzips it, and
uploads to s3://$KUSO_BACKUP_BUCKET/<project>/<addon>/<utc-iso>.sql.gz
via the s3cmd container shipped with the kuso-backup image.

S3 credentials live in the cluster-wide kuso-backup-s3 Secret. When
that secret doesn't exist the CronJob still installs but every run
fails — operators see the failure in `kubectl get jobs` and in
notify (the Job-failed alert from the health watcher).
*/ -}}
{{- /* Suppressed in HA mode — CNPG ships its own barman-cloud backup
       scheduling and our pg_dump cronjob would conflict with the
       managed backups. Configure CNPG-native backups via
       spec.backup.barmanObjectStore on the Cluster CR (out-of-band
       for now; native plumbing in a future kuso version). */}}
{{- if and .Values.backup.schedule (eq .Values.kind "postgres") (not .Values.ha) (not .Values.external) (not .Values.useInstanceAddon) }}
{{- /*
  Note (v0.7.x bugfix): POSTGRES_HOST used to be "<release>-postgresql"
  but the actual Service is just <release> (see postgres.yaml service
  name). Backups have been silently failing on DNS resolution since
  the chart shipped — fixed below by using kusoaddon.fullname directly.

  Retention: a separate prune step lists s3://.../<project>/<addon>/
  and deletes objects older than .Values.backup.retentionDays. Without
  this the bucket grew unbounded.
*/ -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  # Graceful no-op when backup S3 isn't configured: the
                  # kuso-backup-s3 Secret is absent until an operator sets
                  # up backup settings, so BUCKET is empty (its secretKeyRef
                  # is optional). Exit 0 with a clear message rather than
                  # failing every scheduled run.
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.sql.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> dumping ${ADDON} → s3://${BUCKET}/${KEY}"
                  # --clean --if-exists so a restore onto a populated DB
                  # (the pre-deploy-snapshot rollback case) DROPs-then-recreates
                  # instead of aborting on "relation already exists" under the
                  # restore's ON_ERROR_STOP=1 --single-transaction.
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump --clean --if-exists \
                    -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" "${POSTGRES_DB}" \
                    | gzip > /tmp/dump.gz
                  SHA=$(sha256sum /tmp/dump.gz | awk '{print $1}')
                  BYTES=$(wc -c < /tmp/dump.gz | tr -d ' ')
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/dump.gz "s3://${BUCKET}/${KEY}"
                  echo "==> upload done (sha256=${SHA} bytes=${BYTES})"
                  # Integrity manifest written beside the artifact. Restore
                  # verifies the sha256 before applying. No secret values here.
                  # printf (not a heredoc): the script is indented inside a YAML
                  # block scalar, and an indented heredoc terminator is never
                  # matched — it would swallow the rest of the script.
                  printf '{"schemaVersion":1,"createdAt":"%s","project":"%s","addon":"%s","addonKind":"postgres","producer":"pg_dump","artifacts":[{"key":"%s","sha256":"%s","bytes":%s,"payloadKind":"pg_dump"}]}\n' \
                    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PROJECT}" "${ADDON}" "${KEY}" "${SHA}" "${BYTES}" > /tmp/manifest.json
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/manifest.json "s3://${BUCKET}/${KEY}.manifest.json"
                  rm -f /tmp/dump.gz /tmp/manifest.json
                  echo "==> manifest done"

                  # Multi-DB detection: this backup only dumps the primary
                  # $POSTGRES_DB. If the addon hosts additional logical
                  # databases they are silently NOT in this artifact. We
                  # can't safely change the artifact/manifest shape here
                  # (that's the restore contract), so make the gap LOUD.
                  OTHER_DBS=$(PGPASSWORD="${POSTGRES_PASSWORD}" psql \
                    -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                    -tAc "SELECT datname FROM pg_database WHERE datistemplate=false AND datname NOT IN ('postgres')" \
                    2>/dev/null | grep -vxF "${POSTGRES_DB}" || true)
                  if [ -n "${OTHER_DBS}" ]; then
                    N=$(printf '%s\n' "${OTHER_DBS}" | grep -c . || true)
                    echo "WARNING: addon has ${N} logical DBs but only ${POSTGRES_DB} is backed up — other DBs are NOT in this backup" >&2
                  fi

                  # Retention prune. List existing dumps, drop ones
                  # older than RETENTION_DAYS. We keep the logic in the
                  # cronjob (rather than relying on bucket lifecycle)
                  # because some S3-compat backends (Wasabi, B2) don't
                  # support lifecycle rules consistently.
                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    # `|| true`: the backup + manifest already uploaded OK by
                    # here. Under `set -o pipefail` a transient `aws s3 ls`
                    # error (or the trailing `while`'s exit status) would
                    # otherwise abort the whole Job AFTER success, firing a
                    # false backup-failed alert. Prune is best-effort.
                    { aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done ; } || true
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                # POSTGRES_HOST points at the in-cluster Service. The
                # Service name is just <release> (see postgres.yaml
                # spec.serviceName); the historical "-postgresql" suffix
                # was wrong and caused all backups to fail with DNS
                # resolution errors.
                - { name: POSTGRES_HOST, value: {{ include "kusoaddon.fullname" . | quote }} }
                - { name: POSTGRES_USER, value: {{ default "kuso" .Values.username | quote }} }
                # Database name MUST match what postgres.yaml created
                # (which falls back to .Values.project, not "kuso"),
                # otherwise pg_dump fails with `database "kuso" does
                # not exist` and every backup pod errors. We mirror
                # the same precedence chain:
                #   .Values.database → .Values.project → "kuso"
                - { name: POSTGRES_DB,   value: {{ .Values.database | default .Values.project | default "kuso" | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: POSTGRES_PASSWORD
                # S3 credentials: cluster-wide Secret managed by the
                # kuso server's settings page.
                # S3 creds are optional:true so the CronJob installs and
                # RUNS even before backup S3 settings are configured — the
                # script guards on empty BUCKET and exits 0 ("not
                # configured") instead of the pod crashing with
                # CreateContainerConfigError "secret kuso-backup-s3 not
                # found". Mirrors deploy/postgres-backup.yaml.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
External Postgres backup (PlanetScale / Hetzner / Neon / Supabase / RDS).
Runs pg_dump against the external DSN that the user provided via
spec.external.secretName and uploads to the cluster-wide kuso-backup-s3
bucket. Same key shape as the native postgres backup so restores into
either path work the same way.

Why this exists separately: the in-cluster postgres backup speaks to
<release>-postgresql:5432 with a local user; external addons have a
fully-qualified DSN with TLS, a remote host, and provider-specific
auth. pg_dump "$DATABASE_URL" handles all of that natively — no need
to parse the DSN apart.

The conn secret synthesized from spec.external.secretName MUST carry
DATABASE_URL (kuso's convention for postgres conn secrets). Providers
that hand you separate host/user/pass keys need the user to compose
DATABASE_URL=postgres://... in their source Secret. Documented in
docs/EXTERNAL_DB_BACKUPS.md.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "postgres") .Values.external }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
    kuso.sislelabs.com/external: "true"
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
            # External backups need outbound to the managed provider —
            # they're not talking to an in-cluster Service. Stamp the
            # public-egress label so the project NetworkPolicy allows it.
            kuso.sislelabs.com/network-egress-public: "true"
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  # Graceful no-op when backup S3 isn't configured: the
                  # kuso-backup-s3 Secret is absent until an operator sets
                  # up backup settings, so BUCKET is empty (its secretKeyRef
                  # is optional). Exit 0 with a clear message rather than
                  # failing every scheduled run.
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.sql.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> dumping external ${ADDON} → s3://${BUCKET}/${KEY}"
                  # --no-owner / --no-acl: managed providers usually
                  # disallow GRANT/REVOKE commands in dumps, which makes
                  # an unfiltered pg_dump fail at restore time. Match
                  # what PlanetScale / Neon / Supabase docs recommend.
                  # Dump to /tmp first (not a streamed pipe to s3) so we can
                  # sha256 the artifact and emit an integrity manifest — the
                  # restore path verifies sha256 before applying.
                  pg_dump --clean --if-exists --no-owner --no-acl "${DATABASE_URL}" | gzip > /tmp/dump.gz
                  SHA=$(sha256sum /tmp/dump.gz | awk '{print $1}')
                  BYTES=$(wc -c < /tmp/dump.gz | tr -d ' ')
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/dump.gz "s3://${BUCKET}/${KEY}"
                  echo "==> upload done (sha256=${SHA} bytes=${BYTES})"
                  # Integrity manifest written beside the artifact. printf
                  # (not a heredoc): indented heredoc terminators never match
                  # inside a YAML block scalar.
                  printf '{"schemaVersion":1,"createdAt":"%s","project":"%s","addon":"%s","addonKind":"postgres","producer":"pg_dump","artifacts":[{"key":"%s","sha256":"%s","bytes":%s,"payloadKind":"pg_dump"}]}\n' \
                    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PROJECT}" "${ADDON}" "${KEY}" "${SHA}" "${BYTES}" > /tmp/manifest.json
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/manifest.json "s3://${BUCKET}/${KEY}.manifest.json"
                  rm -f /tmp/dump.gz /tmp/manifest.json
                  echo "==> manifest done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    # `|| true`: the backup + manifest already uploaded OK by
                    # here. Under `set -o pipefail` a transient `aws s3 ls`
                    # error (or the trailing `while`'s exit status) would
                    # otherwise abort the whole Job AFTER success, firing a
                    # false backup-failed alert. Prune is best-effort.
                    { aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done ; } || true
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: DATABASE_URL
                # S3 creds are optional:true so the CronJob installs and
                # RUNS even before backup S3 settings are configured — the
                # script guards on empty BUCKET and exits 0 ("not
                # configured") instead of the pod crashing with
                # CreateContainerConfigError "secret kuso-backup-s3 not
                # found". Mirrors deploy/postgres-backup.yaml.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
Redis backup. Runs `redis-cli --rdb /tmp/dump.rdb` against the addon's
in-cluster Service, then uploads the dump to S3 with the same
project/addon/timestamp.rdb.gz key shape as Postgres backups. Pruning
mirrors the Postgres prune step.

Why --rdb (not BGSAVE + scp from the StatefulSet pod): --rdb runs a
SAVE-equivalent on the server and streams the snapshot down to the
client; we never need to copy a file out of the addon pod, so this
works even when the addon is on a different node.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "redis") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  # Graceful no-op when backup S3 isn't configured: the
                  # kuso-backup-s3 Secret is absent until an operator sets
                  # up backup settings, so BUCKET is empty (its secretKeyRef
                  # is optional). Exit 0 with a clear message rather than
                  # failing every scheduled run.
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.rdb.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> snapshotting ${ADDON} → s3://${BUCKET}/${KEY}"
                  redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning --rdb /tmp/dump.rdb
                  gzip -c /tmp/dump.rdb > /tmp/dump.rdb.gz
                  SHA=$(sha256sum /tmp/dump.rdb.gz | awk '{print $1}')
                  BYTES=$(wc -c < /tmp/dump.rdb.gz | tr -d ' ')
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/dump.rdb.gz "s3://${BUCKET}/${KEY}"
                  echo "==> upload done (sha256=${SHA} bytes=${BYTES})"
                  printf '{"schemaVersion":1,"createdAt":"%s","project":"%s","addon":"%s","addonKind":"redis","producer":"redis_rdb","artifacts":[{"key":"%s","sha256":"%s","bytes":%s,"payloadKind":"redis_rdb"}]}\n' \
                    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PROJECT}" "${ADDON}" "${KEY}" "${SHA}" "${BYTES}" > /tmp/manifest.json
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/manifest.json "s3://${BUCKET}/${KEY}.manifest.json"
                  rm -f /tmp/dump.rdb /tmp/dump.rdb.gz /tmp/manifest.json
                  echo "==> upload done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    # `|| true`: the backup + manifest already uploaded OK by
                    # here. Under `set -o pipefail` a transient `aws s3 ls`
                    # error (or the trailing `while`'s exit status) would
                    # otherwise abort the whole Job AFTER success, firing a
                    # false backup-failed alert. Prune is best-effort.
                    { aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done ; } || true
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: REDIS_HOST, value: {{ include "kusoaddon.fullname" . | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: REDIS_PASSWORD
                # S3 creds are optional:true so the CronJob installs and
                # RUNS even before backup S3 settings are configured — the
                # script guards on empty BUCKET and exits 0 ("not
                # configured") instead of the pod crashing with
                # CreateContainerConfigError "secret kuso-backup-s3 not
                # found". Mirrors deploy/postgres-backup.yaml.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
MongoDB backup. mongodump --archive --gzip streams a single compressed
archive to /tmp, we sha256 + upload it plus a manifest, same key shape
(<project>/<addon>/<ts>.archive.gz) and prune logic as the others.
MONGO_URL is the full connection URI from the addon's -conn Secret.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "mongodb") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.archive.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> dumping ${ADDON} → s3://${BUCKET}/${KEY}"
                  mongodump --uri "${MONGO_URL}" --archive --gzip > /tmp/dump.archive.gz
                  SHA=$(sha256sum /tmp/dump.archive.gz | awk '{print $1}')
                  BYTES=$(wc -c < /tmp/dump.archive.gz | tr -d ' ')
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/dump.archive.gz "s3://${BUCKET}/${KEY}"
                  echo "==> upload done (sha256=${SHA} bytes=${BYTES})"
                  printf '{"schemaVersion":1,"createdAt":"%s","project":"%s","addon":"%s","addonKind":"mongodb","producer":"mongodump","artifacts":[{"key":"%s","sha256":"%s","bytes":%s,"payloadKind":"mongodump"}]}\n' \
                    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PROJECT}" "${ADDON}" "${KEY}" "${SHA}" "${BYTES}" > /tmp/manifest.json
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/manifest.json "s3://${BUCKET}/${KEY}.manifest.json"
                  rm -f /tmp/dump.archive.gz /tmp/manifest.json
                  echo "==> manifest done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    # `|| true`: the backup + manifest already uploaded OK by
                    # here. Under `set -o pipefail` a transient `aws s3 ls`
                    # error (or the trailing `while`'s exit status) would
                    # otherwise abort the whole Job AFTER success, firing a
                    # false backup-failed alert. Prune is best-effort.
                    { aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done ; } || true
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: MONGO_URL
                  valueFrom:
                    secretKeyRef:
                      # Use connSecretName (the same helper mongodb.yaml uses to
                      # NAME this secret) rather than fullname-conn — they match
                      # today but only connSecretName is the authoritative name.
                      name: {{ include "kusoaddon.connSecretName" . | quote }}
                      key: MONGO_URL
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
MySQL backup. mysqldump | gzip to /tmp, sha256 + upload artifact +
manifest, same key shape (<project>/<addon>/<ts>.sql.gz) + prune as the
others. MYSQL_PASSWORD from the conn Secret; host/user/db are known.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "mysql") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.sql.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> dumping ${ADDON} → s3://${BUCKET}/${KEY}"
                  MYSQL_PWD="${MYSQL_PASSWORD}" mysqldump -h "${MYSQL_HOST}" -u "${MYSQL_USER}" "${MYSQL_DB}" | gzip > /tmp/dump.sql.gz
                  SHA=$(sha256sum /tmp/dump.sql.gz | awk '{print $1}')
                  BYTES=$(wc -c < /tmp/dump.sql.gz | tr -d ' ')
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/dump.sql.gz "s3://${BUCKET}/${KEY}"
                  echo "==> upload done (sha256=${SHA} bytes=${BYTES})"
                  printf '{"schemaVersion":1,"createdAt":"%s","project":"%s","addon":"%s","addonKind":"mysql","producer":"mysqldump","artifacts":[{"key":"%s","sha256":"%s","bytes":%s,"payloadKind":"mysqldump"}]}\n' \
                    "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${PROJECT}" "${ADDON}" "${KEY}" "${SHA}" "${BYTES}" > /tmp/manifest.json
                  aws s3 cp --endpoint-url "${S3_ENDPOINT}" /tmp/manifest.json "s3://${BUCKET}/${KEY}.manifest.json"
                  rm -f /tmp/dump.sql.gz /tmp/manifest.json
                  echo "==> manifest done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    # `|| true`: the backup + manifest already uploaded OK by
                    # here. Under `set -o pipefail` a transient `aws s3 ls`
                    # error (or the trailing `while`'s exit status) would
                    # otherwise abort the whole Job AFTER success, firing a
                    # false backup-failed alert. Prune is best-effort.
                    { aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done ; } || true
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: MYSQL_HOST, value: {{ include "kusoaddon.fullname" . | quote }} }
                - { name: MYSQL_USER, value: {{ default "kuso" .Values.username | quote }} }
                - { name: MYSQL_DB,   value: {{ .Values.database | default .Values.project | default "kuso" | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "kusoaddon.connSecretName" . | quote }}
                      key: MYSQL_PASSWORD
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
S3/MinIO bucket backup. Mirrors the entire in-cluster bucket to the
cluster-wide backup bucket under <project>/<addon>/<utc-iso>/. Uses
`aws s3 sync` with `--delete` against a per-run timestamp prefix so
each backup is a self-contained point-in-time snapshot (not a moving
mirror that loses history on a tenant-side delete).

Retention prunes whole timestamped prefixes older than RETENTION_DAYS.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "s3") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: sync
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -euo pipefail
                  # Graceful no-op when backup S3 isn't configured: the
                  # kuso-backup-s3 Secret is absent until an operator sets
                  # up backup settings, so BUCKET is empty (its secretKeyRef
                  # is optional). Exit 0 with a clear message rather than
                  # failing every scheduled run.
                  if [ -z "${BUCKET:-}" ]; then
                    echo "==> backup S3 not configured (no kuso-backup-s3 secret) — skipping"
                    exit 0
                  fi
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  DEST="s3://${BUCKET}/${PROJECT}/${ADDON}/${TS}/"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> syncing s3://${SRC_BUCKET}/ → ${DEST}"
                  AWS_ACCESS_KEY_ID="${SRC_ACCESS_KEY}" \
                  AWS_SECRET_ACCESS_KEY="${SRC_SECRET_KEY}" \
                    aws s3 sync --endpoint-url "${SRC_ENDPOINT}" "s3://${SRC_BUCKET}/" /tmp/src/
                  aws s3 sync --endpoint-url "${S3_ENDPOINT}" /tmp/src/ "${DEST}"
                  rm -rf /tmp/src
                  echo "==> sync done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning snapshots older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '/PRE / {print $2}' \
                      | while read ts; do
                          [ -z "${ts}" ] && continue
                          ts_clean=${ts%/}
                          # ts looks like 20260101T020000Z; convert.
                          d=${ts_clean%T*}
                          t=${ts_clean#*T}
                          obj_ts=$(date -u -d "${d:0:4}-${d:4:2}-${d:6:2}T${t:0:2}:${t:2:2}:${t:4:2}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm -r s3://${BUCKET}/${PREFIX}${ts}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" --recursive "s3://${BUCKET}/${PREFIX}${ts}" || true
                          fi
                        done
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                # Source bucket: the in-cluster MinIO that this addon manages.
                - name: SRC_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_BUCKET
                - name: SRC_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_ENDPOINT
                - name: SRC_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_ACCESS_KEY_ID
                - name: SRC_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_SECRET_ACCESS_KEY
                # Destination: cluster-wide backup bucket.
                # S3 creds are optional:true so the CronJob installs and
                # RUNS even before backup S3 settings are configured — the
                # script guards on empty BUCKET and exits 0 ("not
                # configured") instead of the pod crashing with
                # CreateContainerConfigError "secret kuso-backup-s3 not
                # found". Mirrors deploy/postgres-backup.yaml.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket, optional: true } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint, optional: true } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId, optional: true } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey, optional: true } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}
