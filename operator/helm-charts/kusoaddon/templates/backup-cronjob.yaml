{{- /*
Backup CronJob for the addon. Only emitted when:
  - addon kind is supported (postgres for v1)
  - .Values.backup.schedule is set (cron expression)

Each run dumps the addon's database with pg_dump, gzips it, and
uploads to s3://$KUSO_BACKUP_BUCKET/<project>/<addon>/<utc-iso>.sql.gz
via the s3cmd container shipped with the kuso-backup image.

S3 credentials live in the cluster-wide kuso-backup-s3 Secret. When
that secret doesn't exist the CronJob still installs but every run
fails — operators see the failure in `kubectl get jobs` and in
notify (the Job-failed alert from the health watcher).
*/ -}}
{{- /* Suppressed in HA mode — CNPG ships its own barman-cloud backup
       scheduling and our pg_dump cronjob would conflict with the
       managed backups. Configure CNPG-native backups via
       spec.backup.barmanObjectStore on the Cluster CR (out-of-band
       for now; native plumbing in a future kuso version). */}}
{{- if and .Values.backup.schedule (eq .Values.kind "postgres") (not .Values.ha) (not .Values.external) (not .Values.useInstanceAddon) }}
{{- /*
  Note (v0.7.x bugfix): POSTGRES_HOST used to be "<release>-postgresql"
  but the actual Service is just <release> (see postgres.yaml service
  name). Backups have been silently failing on DNS resolution since
  the chart shipped — fixed below by using kusoaddon.fullname directly.

  Retention: a separate prune step lists s3://.../<project>/<addon>/
  and deletes objects older than .Values.backup.retentionDays. Without
  this the bucket grew unbounded.
*/ -}}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.sql.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> dumping ${ADDON} → s3://${BUCKET}/${KEY}"
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" "${POSTGRES_DB}" \
                    | gzip \
                    | aws s3 cp --endpoint-url "${S3_ENDPOINT}" - "s3://${BUCKET}/${KEY}"
                  echo "==> upload done"

                  # Retention prune. List existing dumps, drop ones
                  # older than RETENTION_DAYS. We keep the logic in the
                  # cronjob (rather than relying on bucket lifecycle)
                  # because some S3-compat backends (Wasabi, B2) don't
                  # support lifecycle rules consistently.
                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                # POSTGRES_HOST points at the in-cluster Service. The
                # Service name is just <release> (see postgres.yaml
                # spec.serviceName); the historical "-postgresql" suffix
                # was wrong and caused all backups to fail with DNS
                # resolution errors.
                - { name: POSTGRES_HOST, value: {{ include "kusoaddon.fullname" . | quote }} }
                - { name: POSTGRES_USER, value: {{ default "kuso" .Values.username | quote }} }
                # Database name MUST match what postgres.yaml created
                # (which falls back to .Values.project, not "kuso"),
                # otherwise pg_dump fails with `database "kuso" does
                # not exist` and every backup pod errors. We mirror
                # the same precedence chain:
                #   .Values.database → .Values.project → "kuso"
                - { name: POSTGRES_DB,   value: {{ .Values.database | default .Values.project | default "kuso" | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: POSTGRES_PASSWORD
                # S3 credentials: cluster-wide Secret managed by the
                # kuso server's settings page.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
Redis backup. Runs `redis-cli --rdb /tmp/dump.rdb` against the addon's
in-cluster Service, then uploads the dump to S3 with the same
project/addon/timestamp.rdb.gz key shape as Postgres backups. Pruning
mirrors the Postgres prune step.

Why --rdb (not BGSAVE + scp from the StatefulSet pod): --rdb runs a
SAVE-equivalent on the server and streams the snapshot down to the
client; we never need to copy a file out of the addon pod, so this
works even when the addon is on a different node.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "redis") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: dump
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  KEY="${PROJECT}/${ADDON}/${TS}.rdb.gz"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> snapshotting ${ADDON} → s3://${BUCKET}/${KEY}"
                  redis-cli -h "${REDIS_HOST}" -a "${REDIS_PASSWORD}" --no-auth-warning --rdb /tmp/dump.rdb
                  gzip -c /tmp/dump.rdb \
                    | aws s3 cp --endpoint-url "${S3_ENDPOINT}" - "s3://${BUCKET}/${KEY}"
                  rm -f /tmp/dump.rdb
                  echo "==> upload done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning dumps older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '{print $1, $2, $4}' \
                      | while read date time name; do
                          [ -z "${name}" ] && continue
                          obj_ts=$(date -u -d "${date}T${time}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm s3://${BUCKET}/${PREFIX}${name}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}${name}" || true
                          fi
                        done
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: REDIS_HOST, value: {{ include "kusoaddon.fullname" . | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                - name: REDIS_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: REDIS_PASSWORD
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}

{{- /*
S3/MinIO bucket backup. Mirrors the entire in-cluster bucket to the
cluster-wide backup bucket under <project>/<addon>/<utc-iso>/. Uses
`aws s3 sync` with `--delete` against a per-run timestamp prefix so
each backup is a self-contained point-in-time snapshot (not a moving
mirror that loses history on a tenant-side delete).

Retention prunes whole timestamped prefixes older than RETENTION_DAYS.
*/ -}}
{{- if and .Values.backup.schedule (eq .Values.kind "s3") (not .Values.external) (not .Values.useInstanceAddon) }}
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-backup" (include "kusoaddon.fullname" .) | quote }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
    kuso.sislelabs.com/role: backup
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            kuso.sislelabs.com/role: backup
            kuso.sislelabs.com/addon: {{ .Release.Name | quote }}
            kuso.sislelabs.com/project: {{ .Values.project | default "" | quote }}
        spec:
          restartPolicy: OnFailure
          {{- include "kusoaddon.podSecurityContext" . | nindent 10 }}
          containers:
            - name: sync
              image: {{ default "ghcr.io/sislelabs/kuso-backup:latest" .Values.backup.image | quote }}
              {{- include "kusoaddon.containerSecurityContext" . | nindent 14 }}
              imagePullPolicy: IfNotPresent
              command: [sh, -c]
              args:
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  DEST="s3://${BUCKET}/${PROJECT}/${ADDON}/${TS}/"
                  PREFIX="${PROJECT}/${ADDON}/"
                  echo "==> syncing s3://${SRC_BUCKET}/ → ${DEST}"
                  AWS_ACCESS_KEY_ID="${SRC_ACCESS_KEY}" \
                  AWS_SECRET_ACCESS_KEY="${SRC_SECRET_KEY}" \
                    aws s3 sync --endpoint-url "${SRC_ENDPOINT}" "s3://${SRC_BUCKET}/" /tmp/src/
                  aws s3 sync --endpoint-url "${S3_ENDPOINT}" /tmp/src/ "${DEST}"
                  rm -rf /tmp/src
                  echo "==> sync done"

                  if [ -n "${RETENTION_DAYS:-}" ] && [ "${RETENTION_DAYS}" -gt 0 ]; then
                    CUTOFF=$(date -u -d "-${RETENTION_DAYS} days" +%s 2>/dev/null \
                             || python3 -c "import datetime,sys; print(int((datetime.datetime.utcnow()-datetime.timedelta(days=int(sys.argv[1]))).timestamp()))" "${RETENTION_DAYS}")
                    echo "==> pruning snapshots older than ${RETENTION_DAYS}d (cutoff=$CUTOFF)"
                    aws s3 ls --endpoint-url "${S3_ENDPOINT}" "s3://${BUCKET}/${PREFIX}" \
                      | awk '/PRE / {print $2}' \
                      | while read ts; do
                          [ -z "${ts}" ] && continue
                          ts_clean=${ts%/}
                          # ts looks like 20260101T020000Z; convert.
                          d=${ts_clean%T*}
                          t=${ts_clean#*T}
                          obj_ts=$(date -u -d "${d:0:4}-${d:4:2}-${d:6:2}T${t:0:2}:${t:2:2}:${t:4:2}Z" +%s 2>/dev/null || echo 0)
                          if [ "${obj_ts}" -gt 0 ] && [ "${obj_ts}" -lt "${CUTOFF}" ]; then
                            echo "    rm -r s3://${BUCKET}/${PREFIX}${ts}"
                            aws s3 rm --endpoint-url "${S3_ENDPOINT}" --recursive "s3://${BUCKET}/${PREFIX}${ts}" || true
                          fi
                        done
                  fi
                  echo "==> done"
              env:
                - { name: PROJECT, value: {{ .Values.project | default "" | quote }} }
                - { name: ADDON,   value: {{ .Release.Name | quote }} }
                - { name: RETENTION_DAYS, value: {{ .Values.backup.retentionDays | default 14 | quote }} }
                # Source bucket: the in-cluster MinIO that this addon manages.
                - name: SRC_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_BUCKET
                - name: SRC_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_ENDPOINT
                - name: SRC_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_ACCESS_KEY_ID
                - name: SRC_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ printf "%s-conn" (include "kusoaddon.fullname" .) | quote }}
                      key: S3_SECRET_ACCESS_KEY
                # Destination: cluster-wide backup bucket.
                - { name: BUCKET,        valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: bucket } } }
                - { name: S3_ENDPOINT,   valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: endpoint } } }
                - { name: AWS_ACCESS_KEY_ID,     valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: accessKeyId } } }
                - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: secretAccessKey } } }
                - { name: AWS_DEFAULT_REGION,    valueFrom: { secretKeyRef: { name: kuso-backup-s3, key: region }, optional: true } }
{{- end }}
