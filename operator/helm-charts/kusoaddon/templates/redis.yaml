{{- if and (eq .Values.kind "redis") (not .Values.ha) (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- $version := .Values.version | default "7" -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $secretName := include "kusoaddon.connSecretName" . -}}
{{/*
  Reuse the password from the live Secret if it exists. Same reason
  as postgres.yaml: without this, every reconcile rotates the
  password and the operator burns CPU + flips credentials forever.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingPw := "" -}}
{{- if and $existing $existing.data (index $existing.data "REDIS_PASSWORD") -}}
  {{- $existingPw = (index $existing.data "REDIS_PASSWORD" | b64dec) -}}
{{- end -}}
{{- $password := .Values.password | default $existingPw | default (randAlphaNum 24) -}}

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kusoaddon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoaddon.selectorLabels" . | nindent 8 }}
        {{- include "kusoaddon.labels" . | nindent 8 }}
    spec:
      {{- include "kusoaddon.podSecurityContext" . | nindent 6 }}
      {{- include "kusoaddon.placement" . | nindent 6 }}
      containers:
        - name: redis
          image: "redis:{{ $version }}-alpine"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          command: ["redis-server", "--requirepass", "$(REDIS_PASSWORD)", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kusoaddon.connSecretName" . }}
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- include "kusoaddon.resources" . | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
        # NOTE: volumeClaimTemplates must stay annotation-free. K8s forbids
        # any change to a StatefulSet's volumeClaimTemplates after creation,
        # so adding a VCT annotation traps every pre-existing addon in a
        # failed helm upgrade (see chart_render addon_vct_test). PVC data is
        # retained regardless: a StatefulSet never garbage-collects its
        # VCT-spawned PVCs, and helm uninstall doesn't own them either.
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ include "kusoaddon.storageSize" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
  ports:
    - name: redis
      port: 6379
      targetPort: redis
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kusoaddon.connSecretName" . }}
  annotations:
    # Align the conn Secret's lifecycle with the data PVC's (which
    # survives addon deletion). Without keep, a delete+re-add over the
    # surviving PVC mints a fresh password that won't match the DB that
    # was initialised with the original — every app fails auth. Mirrors
    # postgres-ha's conn Secret and the TLS secret.
    helm.sh/resource-policy: keep
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: Opaque
# base64 `data:` not `stringData:` — see postgres.yaml conn Secret comment
# (stringData triggers perpetual helm-operator reconcile churn).
data:
  REDIS_HOST: {{ $name | b64enc | quote }}
  REDIS_PORT: {{ "6379" | b64enc | quote }}
  REDIS_PASSWORD: {{ $password | b64enc | quote }}
  REDIS_URL: {{ printf "redis://default:%s@%s:6379" $password $name | b64enc | quote }}
{{- end }}
