{{- /* Single-node Postgres. Rendered only when ha=false. The HA branch
       lives in postgres-ha.yaml and uses CloudNativePG to render a
       3-replica Cluster with synchronous replication + automated
       failover. Both branches emit the same `<name>-conn` Secret
       shape so consumer apps round-trip unchanged. */}}
{{- if and (eq .Values.kind "postgres") (not .Values.ha) (not .Values.external) (not .Values.useInstanceAddon) -}}
{{- $version := .Values.version | default "16" -}}
{{- $database := .Values.database | default .Values.project -}}
{{- $name := include "kusoaddon.fullname" . -}}
{{- $secretName := include "kusoaddon.connSecretName" . -}}
{{/*
  Password reuse — critical for the helm-operator reconcile loop.
  Without this, every reconcile generates a fresh random password,
  which renders a different Secret manifest, which makes the helm
  release look "changed", which the operator upgrades, which writes
  status.deployedRelease, which retriggers the reconcile. Infinite
  loop with rotating credentials. The lookup function reads the
  live cluster's existing Secret (if any) so a steady-state reconcile
  produces an identical manifest and the operator detects no-op.

  randAlphaNum is only invoked on first install when no Secret yet
  exists. To bring your own password, set
  spec.passwordSecret.{name,key} on KusoAddon and create that Secret
  out-of-band — the legacy spec.password field has been removed
  because it persisted plaintext credentials in etcd.

  Backwards compat: if .Values.password is still set (legacy clusters
  whose CRDs haven't been re-applied), we honour it but log a Helm
  warning via the chart's NOTES.txt. New clusters won't see this
  field on the CR at all.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingPw := "" -}}
{{- if and $existing $existing.data (index $existing.data "POSTGRES_PASSWORD") -}}
  {{- $existingPw = (index $existing.data "POSTGRES_PASSWORD" | b64dec) -}}
{{- end -}}
{{/* Resolve passwordSecret reference if present. */}}
{{- $providedPw := "" -}}
{{- if .Values.passwordSecret -}}
  {{- $key := default "password" .Values.passwordSecret.key -}}
  {{- $src := lookup "v1" "Secret" .Release.Namespace .Values.passwordSecret.name -}}
  {{- if and $src $src.data (index $src.data $key) -}}
    {{- $providedPw = (index $src.data $key | b64dec) -}}
  {{- end -}}
{{- end -}}
{{/*
  Drift guard: if the StatefulSet was already initialized (its data
  PVC has the password baked into pgdata via initdb) but our conn
  Secret is missing or empty, we MUST NOT randAlphaNum — that would
  silently rotate the conn-secret to a value that no longer matches
  the on-disk pgdata, breaking auth for every client. Fail the
  render instead so the operator surfaces it and the user can run
  `kuso project addon repair-password` to recover.
*/}}
{{- $existingSts := lookup "apps/v1" "StatefulSet" .Release.Namespace $name -}}
{{- if and $existingSts (not $existingPw) (not $providedPw) (not .Values.password) -}}
  {{- fail (printf "kusoaddon %s/%s: StatefulSet exists but conn Secret is missing — refusing to generate a fresh password. Run `kuso project addon repair-password` to recover." .Release.Namespace $name) -}}
{{- end -}}
{{- $password := $providedPw | default .Values.password | default $existingPw | default (randAlphaNum 24) -}}

# StatefulSet running the upstream Postgres image. Plain non-HA single-node;
# good enough for v0.2 and most indie-dev workloads. Switch to CloudNativePG
# in v0.3 for HA + automated backups.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  serviceName: {{ $name }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "kusoaddon.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kusoaddon.selectorLabels" . | nindent 8 }}
        {{- include "kusoaddon.labels" . | nindent 8 }}
        # Discriminates the DB pod from the opt-in pooler Deployment's
        # pods (postgres-pooler.yaml), which also carry kusoaddon.labels.
        # The <name> Service below selects on this so :5432 traffic
        # never lands on a pooler pod (which only listens on :6432).
        kuso.sislelabs.com/component: postgres
    spec:
      {{- include "kusoaddon.podSecurityContext" . | nindent 6 }}
      {{- include "kusoaddon.placement" . | nindent 6 }}
      # initContainer copies the TLS bundle into a writable dir with the
      # restrictive perms postgres demands (mode 0600, owner postgres).
      # Mounted Secret keys land as 0444 root-owned symlinks even when
      # defaultMode is set, so postgres refuses to start with
      # "private key file ... has group or world access". The cp owns
      # the perms problem once instead of teaching every postgres
      # release to live with k8s's projected-volume mode quirks.
      initContainers:
        - name: tls-prep
          image: "postgres:{{ $version }}"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          command:
            - sh
            - -c
            - |
              set -e
              cp /tls-src/tls.crt /tls-dst/server.crt
              cp /tls-src/tls.key /tls-dst/server.key
              chmod 0600 /tls-dst/server.key
              chmod 0644 /tls-dst/server.crt
              # postgres image runs as uid 999 (postgres) — make sure the
              # files are readable by that user even when the source mount
              # was root-owned.
              chown 999:999 /tls-dst/server.crt /tls-dst/server.key
          volumeMounts:
            - name: tls-src
              mountPath: /tls-src
              readOnly: true
            - name: tls
              mountPath: /tls-dst
      containers:
        - name: postgres
          image: "postgres:{{ $version }}"
          {{- include "kusoaddon.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: postgres
              containerPort: 5432
          # Enable TLS on the wire. Required so the connection string
          # can advertise sslmode=require, which Tickero-style strict
          # production-mode checks demand.
          args:
            - "-c"
            - "ssl=on"
            - "-c"
            - "ssl_cert_file=/tls/server.crt"
            - "-c"
            - "ssl_key_file=/tls/server.key"
          env:
            - name: POSTGRES_DB
              value: {{ $database | quote }}
            - name: POSTGRES_USER
              value: kuso
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "kusoaddon.connSecretName" . }}
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: tls
              mountPath: /tls
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "kuso", "-d", {{ $database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: tls-src
          secret:
            secretName: {{ printf "%s-tls" $name }}
            defaultMode: 0444
        - name: tls
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
        annotations:
          # `helm.sh/resource-policy: keep` tells the helm-operator to
          # leave the PVC behind on uninstall. Without this, deleting
          # a KusoAddon CR cascades the StatefulSet AND the PVC; with
          # the cluster's default reclaim policy (Delete on stock k3s)
          # the underlying PV + the customer's data go with it. The
          # PVC sticks around as orphan storage the operator can
          # manually kubectl-delete to actually free the space —
          # accidental kubectl-delete-addon stops being a 500GB
          # data-loss event.
          "helm.sh/resource-policy": keep
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ include "kusoaddon.storageSize" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kusoaddon.selectorLabels" . | nindent 4 }}
    # Pin to the DB pod — the opt-in pooler Deployment shares
    # kusoaddon.selectorLabels but is not a Postgres backend.
    kuso.sislelabs.com/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
# TLS bundle. Self-signed cert+key the postgres container loads to
# serve TLS on 5432. Reused across reconciles via lookup + the
# helm.sh/resource-policy annotation so the cert doesn't rotate on
# every helm-operator pass (which would invalidate live client
# connections every few minutes).
#
# We generate locally with helm's genSelfSignedCert rather than
# requiring cert-manager to be installed for the basic single-node
# addon to work. The single SAN covers <name>.<namespace>.svc and
# both shorter forms — apps connect via the service DNS name.
# sslmode=require (not verify-full) is what we advertise, so SAN
# match isn't enforced client-side; the cert is mostly there to
# make TLS the default channel, not to defend against in-cluster
# MITM (the kube network already authenticates pod-to-pod via CNI).
{{- $tlsSecretName := printf "%s-tls" $name -}}
{{- $existingTLS := lookup "v1" "Secret" .Release.Namespace $tlsSecretName -}}
{{- $tlsCert := "" -}}
{{- $tlsKey := "" -}}
{{- if and $existingTLS $existingTLS.data (index $existingTLS.data "tls.crt") (index $existingTLS.data "tls.key") -}}
  {{- $tlsCert = (index $existingTLS.data "tls.crt" | b64dec) -}}
  {{- $tlsKey = (index $existingTLS.data "tls.key" | b64dec) -}}
{{- else -}}
  {{- $cn := printf "%s.%s.svc" $name .Release.Namespace -}}
  {{- $sans := list $name $cn (printf "%s.%s.svc.cluster.local" $name .Release.Namespace) -}}
  {{- $gen := genSelfSignedCert $cn nil $sans 3650 -}}
  {{- $tlsCert = $gen.Cert -}}
  {{- $tlsKey = $gen.Key -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsSecretName }}
  annotations:
    # Same reasoning as the PVC keep policy: don't let an accidental
    # KusoAddon delete wipe the TLS material. Re-rendering after a
    # delete-and-recreate is fine because lookup falls back to
    # genSelfSignedCert; but keeping it spares a pod restart.
    helm.sh/resource-policy: keep
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $tlsCert | b64enc | quote }}
  tls.key: {{ $tlsKey | b64enc | quote }}
---
# Connection secret. Picked up by every KusoEnvironment in the project via
# envFrom. Standard env names match Heroku/Railway conventions so apps that
# already speak those don't need configuration.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kusoaddon.connSecretName" . }}
  labels:
    {{- include "kusoaddon.labels" . | nindent 4 }}
type: Opaque
# Rendered as base64 `data:` (NOT `stringData:`) on purpose. The apiserver
# write-translates stringData → base64 data and nulls stringData on the
# stored object, so a stringData-rendered Secret never byte-matches what the
# helm-operator reads back — it then runs `helm upgrade` on EVERY 3-minute
# reconcile, bumping the release revision forever and re-applying the addon
# Service (kube-router reprograms iptables → brief connection-refused windows
# that break migration release Jobs and `kuso run`). Emitting base64 data
# makes render == stored, so the reconcile is a true no-op.
data:
  POSTGRES_HOST: {{ $name | b64enc | quote }}
  POSTGRES_PORT: {{ "5432" | b64enc | quote }}
  POSTGRES_USER: {{ "kuso" | b64enc | quote }}
  POSTGRES_PASSWORD: {{ $password | b64enc | quote }}
  POSTGRES_DB: {{ $database | b64enc | quote }}
  # sslmode=require: the postgres container serves TLS via the
  # self-signed cert in <name>-tls. Apps' production strictness checks
  # (Tickero, Rails RAILS_ENV=production, etc.) accept this without
  # verify-full because in-cluster Service traffic is already
  # authenticated by the CNI — the cert proves "you're talking to
  # postgres", not "you're talking to THIS specific tenant's postgres"
  # (CNI does the latter). For verify-full, override DATABASE_URL with
  # your own URL or pin a CA cert via your driver config.
  #
  # urlquery the password so user-supplied creds with reserved chars
  # (`@`, `:`, `/`, `?`, `#`, `%`) don't corrupt the connection string.
  # The auto-generated password (randAlphaNum) is safe without it, but
  # passwordSecret-supplied values can be anything.
  DATABASE_URL: {{ printf "postgres://kuso:%s@%s:5432/%s?sslmode=require" ($password | urlquery) $name $database | b64enc | quote }}
  {{- /* DIRECT_URL: always the un-pooled, session-safe DSN (== the direct
         DATABASE_URL above for this StatefulSet path). Apps running Prisma
         migrations point Prisma's `directUrl` here. It matters mainly when
         the app routes runtime queries through POOLER_URL (transaction
         pooling), where session-scoped pg_advisory_lock — Prisma's migration
         lock 72707369 — leaks across the txn boundary and `migrate deploy`
         hangs 10s then CrashLoopBackOffs. Emitted unconditionally so the key
         set matches the instance-shared conn secret (instance_provisioner.go),
         giving apps one stable ${{ <addon>.DIRECT_URL }} contract everywhere. */}}
  DIRECT_URL: {{ printf "postgres://kuso:%s@%s:5432/%s?sslmode=require" ($password | urlquery) $name $database | b64enc | quote }}
  {{- /* Pooler keys. Additive — DATABASE_URL above stays direct at
         the StatefulSet so existing consumers are unaffected. Apps
         opt into pooling with ${{ <addon>.POOLER_URL }}.

         These keys are ALWAYS emitted (empty-valued when the pooler
         is disabled), NOT conditionally rendered. helm-operator's
         3-way merge does not prune individual data keys that
         disappear between upgrades — a conditional block would leave
         stale POOLER_URL values pointing at a torn-down pooler after
         pooler.enabled flips false. A stable key set with empty
         values is overwritten cleanly. An app reading POOLER_URL
         while the pooler is off gets "" — an honest "not enabled".
         The pooler Deployment/Service live in postgres-pooler.yaml
         and ARE conditionally rendered (whole-object delete prunes
         fine; only per-key pruning is the helm gap). */}}
  {{- if and .Values.pooler .Values.pooler.enabled }}
  POOLER_HOST: {{ printf "%s-pooler" $name | b64enc | quote }}
  POOLER_PORT: {{ "6432" | b64enc | quote }}
  {{- /* sslmode=disable: PgBouncer serves PLAINTEXT on :6432 (no
         client_tls in postgres-pooler.yaml), so a require/verify DSN
         fails the TLS negotiation against the pooler. Matches the HA
         pooler URL (postgres-ha.yaml) and the control-plane pgbouncer
         DSN (deploy/postgres.yaml). In-cluster pooler traffic is
         already authenticated by the CNI. The direct DATABASE_URL above
         keeps sslmode=require (the StatefulSet DOES serve TLS). */}}
  POOLER_URL: {{ printf "postgres://kuso:%s@%s-pooler:6432/%s?sslmode=disable" ($password | urlquery) $name $database | b64enc | quote }}
  {{- else }}
  POOLER_HOST: {{ "" | b64enc | quote }}
  POOLER_PORT: {{ "" | b64enc | quote }}
  POOLER_URL: {{ "" | b64enc | quote }}
  {{- end }}
{{- end }}
