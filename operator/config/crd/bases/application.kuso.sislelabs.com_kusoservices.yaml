---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoservices.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoService
    listKind: KusoServiceList
    plural: kusoservices
    singular: kusoservice
    shortNames: [ks, ksvc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Port
          type: integer
          jsonPath: .spec.port
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoService is one deployable process inside a KusoProject.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project]
              properties:
                project:
                  type: string
                repo:
                  type: object
                  properties:
                    url:
                      type: string
                    path:
                      type: string
                      default: "."
                runtime:
                  type: string
                  enum: ["", dockerfile, nixpacks, buildpacks, static, worker]
                  description: |
                    Build/runtime mode. "worker" is special — same image as
                    a sibling web service, but no ingress and a custom
                    command. Pair it with spec.command and spec.fromService
                    pointing at the web sibling whose image to reuse.
                command:
                  type: array
                  items: { type: string }
                  description: argv override; only consulted for runtime=worker.
                fromService:
                  type: string
                  description: |
                    For runtime=worker: name of the sibling KusoService
                    whose image this worker should use. Empty = build from
                    the worker's own repo.
                port:
                  type: integer
                  format: int32
                domains:
                  type: array
                  items:
                    type: object
                    properties:
                      host: { type: string }
                      tls: { type: boolean, default: true }
                internal:
                  type: boolean
                  description: When true, skip the Ingress entirely. The in-cluster Service still exists so sibling pods can reach the service via ${{ svc.URL }}, but no public domain or TLS is provisioned. Mirrored onto every KusoEnvironment owned by this service.
                  default: false
                privateEgress:
                  type: boolean
                  description: When true, this service's pods are denied public internet egress (sibling pods, DNS and the in-cluster registry stay reachable). Default false — pods can reach the internet. Mirrored onto every KusoEnvironment owned by this service.
                  default: false
                envVars:
                  # Closed schema — preserve-unknown-fields would let a
                  # tenant slip valueFrom.secretKeyRef in and exfiltrate
                  # arbitrary cluster secrets (e.g. kuso-postgres-conn)
                  # into their pod's env. The server-side envVar
                  # rewriter only emits these exact keys; if we ever
                  # need richer expressions, extend the schema
                  # explicitly rather than re-opening the door.
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          secretKeyRef:
                            type: object
                            required: [name, key]
                            properties:
                              name:
                                type: string
                                # The `<addon>-conn` suffix is the
                                # convention every kuso-managed addon
                                # secret follows. Tenants who try to
                                # reference cluster-wide secrets
                                # (kuso-server-secrets, kuso-postgres-
                                # conn) get rejected at admission.
                                pattern: "^[a-z0-9][a-z0-9-]*-conn$"
                              key:
                                type: string
                scale:
                  type: object
                  properties:
                    min:
                      type: integer
                      default: 1
                    max:
                      type: integer
                      default: 5
                    targetCPU:
                      type: integer
                      default: 70
                sleep:
                  type: object
                  description: |
                    Cold-pause behaviour. When enabled, the operator scales
                    the deployment to 0 after `afterMinutes` of no inbound
                    traffic; the first request wakes it back up.

                    DO NOT enable for services that receive third-party
                    webhooks or payment callbacks (Stripe, ePay, GitHub,
                    Slack, etc.). Cold-start can exceed the sender's
                    retry timeout, producing duplicate or late
                    deliveries. Safe for backoffice tools, internal
                    dashboards, and preview environments.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    afterMinutes:
                      type: integer
                      default: 30
                # Strategy-specific build config. Only consulted when
                # spec.runtime matches; fields and defaults documented
                # in the kusobuild helm chart's values.yaml.
                static:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                buildpacks:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                placement:
                  type: object
                  description: AND-of-labels node selector + explicit node allowlist. Empty/missing means "schedule anywhere". The env helm chart fans this out to nodeSelector + topologySpreadConstraints.
                  properties:
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    nodes:
                      type: array
                      items: { type: string }
                volumes:
                  type: array
                  description: Persistent volumes to mount into every env's pod. Each entry maps to a PVC + a volumeMount. Declared explicitly so the apiserver doesn't prune them on write.
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      mountPath: { type: string }
                      size: { type: string }
                      storageClass: { type: string }
                      accessModes:
                        type: array
                        items: { type: string }
                displayName:
                  type: string
                  description: |
                    Free-form label shown in the UI (canvas chip,
                    overlay header). Decoupled from the CR name + URL
                    slug so renaming the visual label is fast and
                    doesn't recreate kube resources. Validation:
                    letters / digits / spaces / hyphens, max 60 chars.
                    Empty = UI falls back to the slug.
                image:
                  type: object
                  description: |
                    Registry-image pointer for runtime=image services
                    (no kaniko build). The propagation step copies
                    this onto every KusoEnvironment so the chart
                    pulls the tag directly. Other runtimes leave it
                    nil; the build poller writes the env's Image
                    after a successful build.
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                    pullPolicy: { type: string }
                github:
                  type: object
                  description: |
                    Per-service GitHub App installation override. Lets
                    different services in one project bind to different
                    installations (different orgs, accounts). Same wire
                    shape as KusoProject.spec.github — installationId
                    is what the build pod uses to mint clone tokens.
                  properties:
                    installationId:
                      type: integer
                      format: int64
                previews:
                  type: object
                  description: |
                    Per-service preview opt-out. When disabled=true the
                    service is excluded from PR previews even when the
                    project-level toggle is on. Useful for shared
                    workers, crons, internal-only services that don't
                    make sense as throwaway URLs. Nil = inherit the
                    project setting.
                  properties:
                    disabled:
                      type: boolean
                      default: false
                release:
                  type: object
                  description: |
                    Pre-deploy release hook. When set, the build poller
                    runs `command` as a Job using the NEW build's image
                    + this env's effective envVars/envFromSecrets BEFORE
                    promoting the image onto the deployment. Heroku-
                    style — typical use is `./bin/migrate` or
                    `npx prisma migrate deploy`.

                    On non-zero exit (or timeout) the build is marked
                    release-failed and the image tag is NOT patched —
                    existing pods keep running on the previous image.
                    A notify event fires so a failed migration doesn't
                    silently bury itself in the build history.

                    The Job is named `<env>-release-<short-image-tag>`,
                    so re-deploying the same tag is a no-op (Job exists,
                    already succeeded). Mirrored onto every
                    KusoEnvironment owned by this service.
                  properties:
                    command:
                      type: array
                      description: argv for the release Job container. Empty list = no release hook (equivalent to omitting the release block).
                      items: { type: string }
                    timeoutSeconds:
                      type: integer
                      description: Hard cap on the Job. On timeout the build is marked release-failed. Default 900s (15min).
                      default: 900
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
