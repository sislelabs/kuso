---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoservices.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoService
    listKind: KusoServiceList
    plural: kusoservices
    singular: kusoservice
    shortNames: [ks, ksvc]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Runtime
          type: string
          jsonPath: .spec.runtime
        - name: Port
          type: integer
          jsonPath: .spec.port
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoService is one deployable process inside a KusoProject.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project]
              properties:
                project:
                  type: string
                repo:
                  type: object
                  properties:
                    url:
                      type: string
                    path:
                      type: string
                      default: "."
                runtime:
                  type: string
                  enum: ["", dockerfile, nixpacks, buildpacks, static, worker]
                  description: |
                    Build/runtime mode. "worker" is special — same image as
                    a sibling web service, but no ingress and a custom
                    command. Pair it with spec.command and spec.fromService
                    pointing at the web sibling whose image to reuse.
                command:
                  type: array
                  items: { type: string }
                  description: argv override; only consulted for runtime=worker.
                fromService:
                  type: string
                  description: |
                    For runtime=worker: name of the sibling KusoService
                    whose image this worker should use. Empty = build from
                    the worker's own repo.
                port:
                  type: integer
                  format: int32
                domains:
                  type: array
                  items:
                    type: object
                    properties:
                      host: { type: string }
                      tls: { type: boolean, default: true }
                envVars:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                scale:
                  type: object
                  properties:
                    min:
                      type: integer
                      default: 1
                    max:
                      type: integer
                      default: 5
                    targetCPU:
                      type: integer
                      default: 70
                sleep:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    afterMinutes:
                      type: integer
                      default: 30
                # Strategy-specific build config. Only consulted when
                # spec.runtime matches; fields and defaults documented
                # in the kusobuild helm chart's values.yaml.
                static:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                buildpacks:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
