---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoprojects.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoProject
    listKind: KusoProjectList
    plural: kusoprojects
    singular: kusoproject
    shortNames: [kp, kproj]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Repo
          type: string
          jsonPath: .spec.defaultRepo.url
        - name: Branch
          type: string
          jsonPath: .spec.defaultRepo.defaultBranch
        - name: Previews
          type: boolean
          jsonPath: .spec.previews.enabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoProject is the top-level grouping for one product.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              properties:
                description:
                  type: string
                baseDomain:
                  type: string
                  description: Domain under which auto-generated service hostnames are emitted.
                namespace:
                  type: string
                  description: |
                    Optional execution namespace for this project's child
                    resources (services, environments, addons, builds,
                    plus their per-service Secrets). The KusoProject CR
                    itself always lives in the server's home namespace;
                    this field controls only child routing. Empty = home.
                defaultRepo:
                  type: object
                  properties:
                    url:
                      type: string
                    defaultBranch:
                      type: string
                      default: main
                github:
                  type: object
                  properties:
                    installationId:
                      type: integer
                      format: int64
                previews:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    ttlDays:
                      type: integer
                      default: 7
                    triggers:
                      type: array
                      description: >-
                        Gate preview-env spawn on PR target branch.
                        Empty = pre-v0.17 behavior (spawn on every PR).
                        Non-empty = only PRs targeting one of the listed
                        branches spawn a preview; the matched entry's
                        baseEnv selects which existing env to clone
                        env-vars and addon subscriptions from.
                      items:
                        type: object
                        required: [branch, baseEnv]
                        properties:
                          branch:
                            type: string
                          baseEnv:
                            type: string
                    defaultReviewerEmail:
                      type: string
                      description: >-
                        Address kuso sends the magic-link reviewer URL
                        to when the PR has no `reviewer:<email>` label.
                        Empty = no email; operator gets the URL only
                        from the dashboard + GitHub PR comment.
                configAsCode:
                  type: object
                  description: >-
                    Controls the kuso.yaml-on-push behaviour. When
                    enabled (default), a push to the default branch
                    makes kuso fetch kuso.yaml via the GitHub Contents
                    API and apply it before builds run.
                  properties:
                    enabled:
                      type: boolean
                      default: true
                alwaysOn:
                  type: boolean
                  description: |
                    When true, every service in this project runs with
                    sleep.enabled=false regardless of per-service sleep
                    config. Lets a project opt out of scale-to-zero
                    globally — useful when cold-start latency is
                    unacceptable (low-traffic but latency-sensitive
                    APIs, background processors that must always be
                    listening).
                  default: false
                placement:
                  type: object
                  description: |
                    Project-default node-pinning policy. Services
                    without their own placement inherit it; new
                    environments derived from a service inherit the
                    service's effective placement (with project as
                    fallback). Empty = schedule anywhere.
                  properties:
                    labels:
                      type: object
                      description: |
                        Node-label matchers (AND across keys). The
                        server prefixes them with kuso.sislelabs.com/
                        behind the scenes so user-typed labels are
                        kept in a separate namespace from kube's.
                      additionalProperties: { type: string }
                    nodes:
                      type: array
                      description: |
                        Specific hostnames the workload may schedule
                        onto. Combines with labels via AND: a node
                        must match all labels AND be in this list
                        (when set), or match all labels (when empty).
                      items: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
