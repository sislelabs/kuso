---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusocrons.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoCron
    listKind: KusoCronList
    plural: kusocrons
    singular: kusocron
    shortNames: [kc, kcron]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Suspended
          type: boolean
          jsonPath: .spec.suspend
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoCron schedules a recurring job — typically `rails runner …` / `manage.py …` against a service's image.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, service, schedule, command]
              properties:
                project:
                  type: string
                service:
                  type: string
                  description: KusoService name (FQN, e.g. <project>-<short>) whose image + envFromSecrets we reuse.
                schedule:
                  type: string
                  description: Standard cron expression — `*/15 * * * *`. Validated server-side.
                command:
                  type: array
                  items: { type: string }
                  description: argv for the job container — first element is the binary, rest are args.
                suspend:
                  type: boolean
                  default: false
                concurrencyPolicy:
                  type: string
                  enum: [Allow, Forbid, Replace]
                  default: Forbid
                successfulJobsHistoryLimit:
                  type: integer
                  default: 3
                failedJobsHistoryLimit:
                  type: integer
                  default: 3
                activeDeadlineSeconds:
                  type: integer
                  description: Hard kill after N seconds. 0 = no limit.
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                image:
                  type: object
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                    pullPolicy:
                      type: string
                      default: IfNotPresent
                envFromSecrets:
                  type: array
                  items: { type: string }
                placement:
                  type: object
                  properties:
                    labels:
                      type: object
                      additionalProperties: { type: string }
                    nodes:
                      type: array
                      items: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
