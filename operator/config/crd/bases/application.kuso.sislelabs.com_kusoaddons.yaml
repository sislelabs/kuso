---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoaddons.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoAddon
    listKind: KusoAddonList
    plural: kusoaddons
    singular: kusoaddon
    shortNames: [ka, kadd]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Size
          type: string
          jsonPath: .spec.size
        - name: HA
          type: boolean
          jsonPath: .spec.ha
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoAddon is a managed dependency (Postgres, Redis, ...) belonging to a KusoProject.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, kind]
              properties:
                project:
                  type: string
                kind:
                  type: string
                  enum:
                    - postgres
                    - redis
                    - s3
                    - mailpit
                    - nats
                    - meilisearch
                    - clickhouse
                    - mongodb
                    - mysql
                    - rabbitmq
                    - memcached
                    - elasticsearch
                    - kafka
                    - cockroachdb
                    - couchdb
                version:
                  type: string
                size:
                  type: string
                  enum: [small, medium, large]
                  default: small
                ha:
                  type: boolean
                  default: false
                pooler:
                  type: object
                  description: >-
                    Opt-in PgBouncer connection pooler in front of a
                    kind=postgres addon. Reach it via the
                    POOLER_HOST/POOLER_PORT/POOLER_URL keys in the addon's
                    <name>-conn Secret; DATABASE_URL stays direct. Ignored
                    for non-postgres kinds.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    authMode:
                      type: string
                      enum: ["", userlist, query]
                      description: >-
                        How PgBouncer authenticates clients. "" / "userlist"
                        (default) = static userlist from the addon's single
                        conn-secret role (dedicated single-addon pooler).
                        "query" = auth_query against the backend's pg_shadow
                        via a privileged auth user — for the shared cluster-DB
                        pooler fronting many per-project roles.
                    instancePooler:
                      type: boolean
                      default: false
                      description: >-
                        Marks this as the shared pooler for the cluster
                        (instance) Postgres, so the chart renders it even
                        though the CR sets no useInstanceAddon.
                publicTCP:
                  type: object
                  description: >-
                    Opt-in public TCP endpoint. When enabled and the
                    cluster's Traefik install has a configured TCP
                    entrypoint pool, kuso allocates one port from the
                    pool, renders a Traefik IngressRouteTCP, and the
                    addon becomes reachable on the cluster's public IP
                    at that port. Admin-only — a public database is a
                    real attack surface. The allocated port lives in
                    spec.publicTCP.port (server-stamped).
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    port:
                      type: integer
                      description: >-
                        Server-allocated TCP port from the configured
                        pool. 0 = unallocated. Set by the kuso server;
                        do not edit by hand.
                webUI:
                  type: object
                  description: >-
                    Opt-in: expose the addon's built-in web console
                    (mailpit's mail viewer, NATS monitor, …) through
                    the kuso server as an authenticated reverse proxy
                    at /api/projects/<p>/addons/<a>/webui/. No new
                    ingress, no per-UI password — access is gated by
                    the caller's kuso session. Kinds without a known
                    UI port silently no-op.
                  properties:
                    enabled:
                      type: boolean
                      default: false
                storageSize:
                  type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # password: REMOVED in v0.7.x. Plaintext passwords on
                # the CR were persisted in etcd and visible to anyone
                # with `kubectl get kusoaddon -o yaml`. Generated
                # passwords now live in <release>-conn (a real K8s
                # Secret) and are never round-tripped through the CR.
                # To bring your own password, create a Secret manually
                # and reference it via passwordSecret below.
                passwordSecret:
                  type: object
                  description: |
                    Reference an existing Secret containing the addon
                    password. The chart copies the value at install
                    time into <release>-conn instead of generating
                    a random one. Leave unset to let the chart
                    generate a random 24-char password.
                  properties:
                    name: { type: string }
                    key:  { type: string, default: password }
                database:
                  type: string
                backup:
                  type: object
                  properties:
                    schedule:
                      type: string
                    retentionDays:
                      type: integer
                      default: 14
                # Hard placement: addons schedule on nodes whose labels
                # match. Same shape as KusoService.spec.placement —
                # operator helm chart turns this into nodeSelector +
                # required nodeAffinity. Empty = schedule anywhere.
                placement:
                  type: object
                  properties:
                    labels:
                      type: object
                      additionalProperties: { type: string }
                    nodes:
                      type: array
                      items: { type: string }
                # external: connect-to-existing instead of provisioning.
                # When set, kuso doesn't deploy a StatefulSet — it
                # mirrors the user-provided Secret as the addon's
                # conn secret so services can envFrom: it like a
                # native addon. Use case: managed Postgres (Hetzner /
                # Neon / RDS / Supabase) where you already pay for
                # the database; kuso just exposes its envs.
                external:
                  type: object
                  properties:
                    secretName:
                      type: string
                      description: |
                        Name of an existing kube Secret in the project
                        namespace. Its keys are mirrored into the addon's
                        <name>-conn secret.
                    secretKeys:
                      type: array
                      items: { type: string }
                      description: |
                        Optional allowlist of keys to mirror. Empty =
                        mirror every key from the source secret.
                useInstanceAddon:
                  type: string
                  description: |
                    Name of an instance-shared addon (registered by
                    admin via instance secret keyed
                    INSTANCE_ADDON_<UPPER>_DSN_ADMIN). The server
                    creates a per-project database on the shared
                    server and writes its DSN into <name>-conn. No
                    StatefulSet is rendered.
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
