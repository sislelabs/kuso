---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoaddons.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoAddon
    listKind: KusoAddonList
    plural: kusoaddons
    singular: kusoaddon
    shortNames: [ka, kadd]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Version
          type: string
          jsonPath: .spec.version
        - name: Size
          type: string
          jsonPath: .spec.size
        - name: HA
          type: boolean
          jsonPath: .spec.ha
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoAddon is a managed dependency (Postgres, Redis, ...) belonging to a KusoProject.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, kind]
              properties:
                project:
                  type: string
                kind:
                  type: string
                  enum:
                    - postgres
                    - redis
                    - mongodb
                    - mysql
                    - rabbitmq
                    - memcached
                    - clickhouse
                    - elasticsearch
                    - kafka
                    - cockroachdb
                    - couchdb
                version:
                  type: string
                size:
                  type: string
                  enum: [small, medium, large]
                  default: small
                ha:
                  type: boolean
                  default: false
                storageSize:
                  type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                password:
                  type: string
                database:
                  type: string
                backup:
                  type: object
                  properties:
                    schedule:
                      type: string
                    retentionDays:
                      type: integer
                      default: 14
                # Hard placement: addons schedule on nodes whose labels
                # match. Same shape as KusoService.spec.placement —
                # operator helm chart turns this into nodeSelector +
                # required nodeAffinity. Empty = schedule anywhere.
                placement:
                  type: object
                  properties:
                    labels:
                      type: object
                      additionalProperties: { type: string }
                    nodes:
                      type: array
                      items: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
