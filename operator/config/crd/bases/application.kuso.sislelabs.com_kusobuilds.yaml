---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusobuilds.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoBuild
    listKind: KusoBuildList
    plural: kusobuilds
    singular: kusobuild
    shortNames: [kb, kbuild]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Ref
          type: string
          jsonPath: .spec.ref
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoBuild is one build attempt. The operator renders a kaniko Job that clones the repo, builds the image, and pushes it to the in-cluster registry.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, service, ref]
              properties:
                project:
                  type: string
                service:
                  type: string
                # Git context. URL must be HTTPS for build-time fetch (kaniko
                # uses git clone). For private repos the build job is wired to
                # a token-providing initContainer; see the helm chart.
                repo:
                  type: object
                  properties:
                    url:
                      type: string
                    path:
                      type: string
                      default: "."
                # branch + commit SHA. Both stored — the SHA is the immutable
                # truth (image tag), the branch is the human label.
                ref:
                  type: string
                branch:
                  type: string
                # GitHub App installation id, used to mint a clone token if
                # the repo is private. Empty for public repos.
                githubInstallationId:
                  type: integer
                  format: int64
                # Build strategy. Four wired:
                #   - dockerfile: kaniko reads <path>/Dockerfile.
                #   - nixpacks: init container emits Dockerfile + .nixpacks/,
                #     kaniko builds from the source dir.
                #   - buildpacks: CNB lifecycle creator builds + pushes
                #     daemonless; replaces kaniko entirely for this strategy.
                #   - static: init container runs an optional buildCmd
                #     then synthesizes a tiny nginx Dockerfile.
                strategy:
                  type: string
                  enum: [dockerfile, nixpacks, buildpacks, static]
                  default: dockerfile
                dockerfile:
                  type: string
                  description: >-
                    Dockerfile filename (relative to repo.path) for
                    strategy=dockerfile. Empty defaults to "Dockerfile".
                buildEnv:
                  type: object
                  propertyNames:
                    pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
                  additionalProperties:
                    type: string
                  description: >-
                    Service env vars resolved to literals, baked into the
                    image at build time (ENV-after-FROM). Set by the server
                    from the service's envVars (secretKeyRefs resolved
                    server-side). For apps that read env during build
                    (Prisma, Next.js NEXT_PUBLIC_*). Values bake into image
                    layers.
                # done=true means the build reached a terminal state
                # (succeeded / failed / cancelled). The kusobuild chart
                # treats this as a hard no-op gate: when true, the
                # chart renders ZERO objects, so even if helm-operator
                # picks up the CR on its initial cache sync (which
                # ignores the build-state=done watch selector) and
                # runs `helm install`, the rendered manifest is empty
                # and no Job is created.
                #
                # Why this and not the existing build-state=done label:
                # the watch selector skips reconcile EVENTS for done
                # builds, but operator-sdk's startup re-syncs every
                # CR of the watched kind regardless of selectors. Pre-
                # this field, that initial sync resurrected stuck
                # cancelled/done builds on every operator restart;
                # we OOMKilled the host once because two resurrected
                # nixpacks builds piled on top of each other.
                done:
                  type: boolean
                  default: false
                # dryRun runs the build through compile + image-layer
                # assembly but skips the registry push AND the env
                # promotion. Surfaces "does this PR build?" feedback
                # without burning registry storage or rolling prod.
                dryRun:
                  type: boolean
                  default: false
                # Strategy-specific configuration. Both blocks are
                # preserve-unknown-fields-friendly since the chart
                # interprets them; the server only needs to round-trip.
                static:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                buildpacks:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                # Where to push. Server fills this with the in-cluster
                # registry URL + a tag derived from the commit SHA.
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                # Persistent build cache. When pvcName is set, the
                # chart mounts the PVC at /cache and points each
                # container's per-language cache dirs (~/.npm, /nix,
                # ~/go/pkg/mod, etc) at subpaths inside it. Server-go
                # provisions the PVC on Create.
                cache:
                  type: object
                  properties:
                    pvcName:
                      type: string
                # Per-build resource overrides. When set, the chart
                # uses these in place of values.yaml's defaults.
                # Server-go fills them from the live admin Settings
                # at CR-create time. Quantity strings ("1500m", "2Gi").
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
                    limits:
                      type: object
                      properties:
                        cpu:    { type: string }
                        memory: { type: string }
                # Registry auth. Names a Secret with .dockerconfigjson
                # (kaniko) and cnb_registry_auth (CNB lifecycle) keys.
                # Empty = anonymous push to in-cluster registry.
                auth:
                  type: object
                  properties:
                    secretName: { type: string }
                    registry:   { type: string }
                # Registry transport tuning. allowInsecure flips kaniko's
                # --insecure flag for plain-HTTP in-cluster registries;
                # external registries (HTTPS) must set this false.
                registry:
                  type: object
                  properties:
                    allowInsecure: { type: boolean }
                    cacheRepo:     { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
