---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoenvironments.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoEnvironment
    listKind: KusoEnvironmentList
    plural: kusoenvironments
    singular: kusoenvironment
    shortNames: [ke, kenv]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Branch
          type: string
          jsonPath: .spec.branch
        - name: Host
          type: string
          jsonPath: .spec.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          description: KusoEnvironment is one running instance of a KusoService — production or preview.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, service]
              properties:
                project:
                  type: string
                service:
                  type: string
                kind:
                  type: string
                  # production: the always-on env auto-created with each
                  #   KusoService. Exactly one per service.
                  # preview:    ephemeral, PR-driven (kuso-server's GH
                  #             dispatcher manages lifecycle).
                  # custom:     user-created long-lived env (staging,
                  #             qa, demo). Same chart shape as
                  #             production; distinguished here so the
                  #             dashboard's env-switcher can group +
                  #             list them separately.
                  enum: [production, preview, custom]
                  default: production
                branch:
                  type: string
                  default: main
                pullRequest:
                  type: object
                  properties:
                    number:
                      type: integer
                    headRef:
                      type: string
                ttl:
                  type: object
                  properties:
                    expiresAt:
                      type: string
                      format: date-time
                image:
                  type: object
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                    pullPolicy:
                      type: string
                      default: IfNotPresent
                pendingImage:
                  type: object
                  description: >-
                    A runtime=image target withheld until the service's
                    release hook (migration) succeeds. Promoted to image by
                    the imagerelease watcher.
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                    pullPolicy:
                      type: string
                port:
                  type: integer
                  format: int32
                healthcheck:
                  type: object
                  description: >-
                    Resolved HTTP health check (propagated from the service).
                    When `path` is set the chart renders HTTP readiness +
                    liveness probes against it instead of the default TCP
                    readiness/startup probes.
                  properties:
                    path: { type: string }
                    port: { type: integer }
                    initialDelaySeconds: { type: integer }
                    periodSeconds: { type: integer }
                    timeoutSeconds: { type: integer }
                    failureThreshold: { type: integer }
                replicaCount:
                  type: integer
                  default: 1
                spreadPolicy:
                  type: string
                  description: >-
                    How multi-replica pods spread across nodes. "hard" =
                    topologySpreadConstraints DoNotSchedule (replicas forced onto
                    distinct nodes); "soft"/"" = ScheduleAnyway (single-node safe).
                    Server-managed from the live schedulable-node count.
                autoscaling:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                    minReplicas: { type: integer, default: 1 }
                    maxReplicas: { type: integer, default: 5 }
                    targetCPUUtilizationPercentage: { type: integer, default: 70 }
                sleep:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                host:
                  type: string
                additionalHosts:
                  type: array
                  description: Extra hostnames routed to this env's pod. Server populates this from KusoService.spec.domains so custom domains attach without losing the auto-generated host.
                  items: { type: string }
                tlsHosts:
                  type: array
                  description: Subset of {host, additionalHosts...} eligible for a Let's Encrypt cert. Server populates this using the Mozilla public-suffix list — hosts that aren't public FQDNs (e.g. single-label or reserved suffixes like .local) are filtered out so they don't poison the Ingress's all-or-nothing tls block. Unset on legacy CRs falls back to a coarser chart-level check.
                  items: { type: string }
                internal:
                  type: boolean
                  description: When true, skip the Ingress entirely. Service still exists for in-cluster DNS access; no public domain or TLS. Mirrors KusoService.spec.internal.
                  default: false
                privateEgress:
                  type: boolean
                  description: When true, deny public internet egress for this env's pods. Mirrors KusoService.spec.privateEgress.
                  default: false
                stopped:
                  type: boolean
                  description: When true, hard-stop this env — pin to 0 replicas and do NOT wake on traffic. Mirrors KusoService.spec.stopped. The activator serves a "service stopped" 503 for a stopped env instead of scaling it up.
                  default: false
                tlsEnabled:
                  type: boolean
                  default: true
                clusterIssuer:
                  type: string
                  default: letsencrypt-prod
                ingressClassName:
                  type: string
                  default: traefik
                envVars:
                  # See KusoService CRD comment — closed schema to
                  # block valueFrom.secretKeyRef smuggling. Mirror any
                  # changes to the KusoService copy or the rewriter
                  # output (server-go internal/projects/services_ops.go)
                  # will fail admission.
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      value:
                        type: string
                      valueFrom:
                        type: object
                        properties:
                          secretKeyRef:
                            type: object
                            required: [name, key]
                            properties:
                              name:
                                type: string
                                # Allow the addon convention (<addon>-conn) AND
                                # the two well-known shared secret names so the
                                # sharedEnvKeys expansion (server-rewritten
                                # explicit valueFrom for project + instance
                                # shared keys) passes the same admission check.
                                # Cluster-wide secrets (kuso-server-secrets,
                                # kuso-postgres-conn, kuso-github-app, etc.)
                                # remain unreferencable from a tenant CR.
                                # The CEL rule closes the pattern's blind
                                # spot: kuso-postgres-conn matches *-conn.
                                pattern: "^([a-z0-9][a-z0-9-]*-conn|[a-z0-9][a-z0-9-]*-shared|kuso-instance-shared)$"
                                x-kubernetes-validations:
                                  - rule: "self == 'kuso-instance-shared' || !self.startsWith('kuso-')"
                                    message: "control-plane secrets (kuso-*) cannot be referenced from workload CRs"
                              key:
                                type: string
                envFromSecrets:
                  # Server-stamped mount list: addon conn-secrets
                  # (<project>-<addon>-conn), <project>-shared,
                  # <project>-<svc>[-env]-secrets, kuso-instance-shared.
                  # Shape + CEL guard keep a hand-edited CR from
                  # mounting control-plane secrets (kuso-postgres-conn
                  # etc.) into tenant pods.
                  type: array
                  items:
                    type: string
                    pattern: "^([a-z0-9][a-z0-9-]*-(conn|shared|secrets)|kuso-instance-shared)$"
                    x-kubernetes-validations:
                      - rule: "self == 'kuso-instance-shared' || !self.startsWith('kuso-')"
                        message: "control-plane secrets (kuso-*) cannot be mounted into workload pods"
                envOverrides:
                  type: array
                  description: >-
                    Env-var NAMES the user deliberately pinned to this
                    env via the per-env scoped editor. The kuso server's
                    propagation step preserves these env-local values and
                    re-stamps every other service-owned var from the
                    parent KusoService — the explicit marker that tells a
                    deliberate override from a stale inherited seed.
                    Server-managed; the chart does not render it.
                  items:
                    type: string
                sharedEnvKeys:
                  type: array
                  description: >-
                    Mirrored from the parent KusoService.spec.sharedEnvKeys
                    by the kuso server's propagation step. nil =
                    legacy (chart falls back to envFromSecrets blanket
                    mount); non-nil = chart renders individual env
                    entries per key (per-service opt-in).
                  items:
                    type: string
                subscribedAddons:
                  type: array
                  description: >-
                    Mirrored from the parent KusoService.spec.subscribedAddons.
                    nil = legacy auto-mount-all addon-conn secrets;
                    non-nil = operator only includes the listed
                    addons' conn-secrets in envFromSecrets.
                  items:
                    type: string
                publicEnv:
                  type: array
                  items:
                    type: string
                  description: >-
                    Env var names baked as __KUSO_RUNTIME_<KEY>__ sentinels at
                    build and substituted with the real per-deploy value at pod
                    start. Mirrored from the parent KusoService.spec.publicEnv.
                    Must exist here because the kuso-server build/deploy path
                    writes env.spec.publicEnv; a missing field makes the
                    apiserver silently prune it and the server boots in
                    degraded mode (readyz=503, writes refused).
                secretsRev:
                  type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                securityContext:
                  type: object
                  description: >-
                    Opt-in extra Linux capabilities and privilege escalation
                    for images that self-drop root at runtime. Default drops
                    ALL caps with no escalation.
                  properties:
                    capabilities:
                      type: object
                      properties:
                        add:
                          type: array
                          items:
                            type: string
                    allowPrivilegeEscalation:
                      type: boolean
                runtime:
                  type: string
                  description: Mirrors KusoService.spec.runtime so the env helm chart can specialise (e.g. workers skip Service/Ingress/probes).
                command:
                  type: array
                  items: { type: string }
                  description: argv override; only used when runtime == "worker".
                release:
                  type: object
                  description: |
                    Pre-deploy release hook mirrored from
                    KusoService.spec.release by the server. The build
                    poller reads this off the env CR (already in its
                    hot path) when deciding whether to run a release
                    Job before promoting an image.
                  properties:
                    command:
                      type: array
                      items: { type: string }
                    timeoutSeconds:
                      type: integer
                      default: 900
                placement:
                  type: object
                  description: Inherits the parent service placement so the env-helm chart can render nodeSelector + topologySpread. Pruning was the v0.7.x silent-data-loss bug — schema now covers what server-go writes.
                  properties:
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    nodes:
                      type: array
                      items: { type: string }
                volumes:
                  type: array
                  description: Persistent volumes to mount into the env's pod. Same shape as KusoService.spec.volumes; declared explicitly so the apiserver doesn't prune them.
                  items:
                    type: object
                    properties:
                      name: { type: string }
                      mountPath: { type: string }
                      # MUST match kube.KusoVolume json tags: sizeGi (int) +
                      # accessMode (string). Previously size (string) +
                      # accessModes (array) — pruned by the apiserver on write,
                      # so PVCs silently rendered 1Gi / ReadWriteOnce. See the
                      # KusoService CRD for the full explanation.
                      sizeGi: { type: integer }
                      storageClass: { type: string }
                      accessMode: { type: string }
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
