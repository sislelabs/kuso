---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: kusoenvironments.application.kuso.sislelabs.com
spec:
  group: application.kuso.sislelabs.com
  names:
    kind: KusoEnvironment
    listKind: KusoEnvironmentList
    plural: kusoenvironments
    singular: kusoenvironment
    shortNames: [ke, kenv]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Project
          type: string
          jsonPath: .spec.project
        - name: Service
          type: string
          jsonPath: .spec.service
        - name: Kind
          type: string
          jsonPath: .spec.kind
        - name: Branch
          type: string
          jsonPath: .spec.branch
        - name: Host
          type: string
          jsonPath: .spec.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          description: KusoEnvironment is one running instance of a KusoService — production or preview.
          type: object
          properties:
            apiVersion: { type: string }
            kind: { type: string }
            metadata: { type: object }
            spec:
              type: object
              required: [project, service]
              properties:
                project:
                  type: string
                service:
                  type: string
                kind:
                  type: string
                  enum: [production, preview]
                  default: production
                branch:
                  type: string
                  default: main
                pullRequest:
                  type: object
                  properties:
                    number:
                      type: integer
                    headRef:
                      type: string
                ttl:
                  type: object
                  properties:
                    expiresAt:
                      type: string
                      format: date-time
                image:
                  type: object
                  properties:
                    repository: { type: string }
                    tag: { type: string }
                    pullPolicy:
                      type: string
                      default: IfNotPresent
                port:
                  type: integer
                  format: int32
                replicaCount:
                  type: integer
                  default: 1
                autoscaling:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                    minReplicas: { type: integer, default: 1 }
                    maxReplicas: { type: integer, default: 5 }
                    targetCPUUtilizationPercentage: { type: integer, default: 70 }
                sleep:
                  type: object
                  properties:
                    enabled: { type: boolean, default: false }
                host:
                  type: string
                tlsEnabled:
                  type: boolean
                  default: true
                clusterIssuer:
                  type: string
                  default: letsencrypt-prod
                ingressClassName:
                  type: string
                  default: traefik
                envVars:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                envFromSecrets:
                  type: array
                  items:
                    type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
