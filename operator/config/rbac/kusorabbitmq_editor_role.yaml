# permissions for end users to edit kusorabbitmqs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusorabbitmq-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusorabbitmqs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusorabbitmqs/status
  verbs:
  - get
