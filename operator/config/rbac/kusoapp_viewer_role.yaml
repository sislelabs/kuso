# permissions for end users to view kusoapps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusoapp-viewer-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoapps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoapps/status
  verbs:
  - get
