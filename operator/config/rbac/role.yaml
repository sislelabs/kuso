apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:

##
## Helm-operator core permissions
##
# Helm release secrets + per-namespace bookkeeping. Helm itself
# stores release manifests in Secrets; without this the operator
# can't track its own deployments.
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps", "secrets", "events"]
  verbs: ["*"]

##
## Kuso CRDs (v0.2+ topology). These are the resources the helm-
## operator reconciles. /status + /finalizers must be listed
## explicitly so it can write status back and manage uninstall
## finalizers; without /status the helm release succeeds but the
## controller crashloops trying to update the CR (see operator log
## "<resource> not found" — that's actually a 403 on the status
## subresource that surfaces as a not-found in client-go).
##
- apiGroups: ["application.kuso.sislelabs.com"]
  resources:
    - kusoes
    - kusoes/status
    - kusoes/finalizers
    - kusoprojects
    - kusoprojects/status
    - kusoprojects/finalizers
    - kusoservices
    - kusoservices/status
    - kusoservices/finalizers
    - kusoenvironments
    - kusoenvironments/status
    - kusoenvironments/finalizers
    - kusoaddons
    - kusoaddons/status
    - kusoaddons/finalizers
    - kusobuilds
    - kusobuilds/status
    - kusobuilds/finalizers
  verbs: ["create", "delete", "get", "list", "patch", "update", "watch"]

##
## Workload resources the kuso helm charts render.
## - apps/Deployment + StatefulSet for service runtimes and addons.
## - core ServiceAccount/Service/PVC for everything.
## - networking ingresses for HTTP exposure.
## - autoscaling HPA for service scale targets.
## - batch Jobs/CronJobs for builds + scheduled backups.
## - cert-manager Certificates for TLS issuance.
## - policy PDBs for HA addons.
## - rbac roles/bindings the chart provisions for in-cluster service
##   accounts (e.g. backup CronJobs that need to read addon Secrets).
##
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "replicasets"]
  verbs: ["*"]
- apiGroups: [""]
  resources:
    - serviceaccounts
    - services
    - persistentvolumeclaims
    - persistentvolumes
    - pods
  verbs: ["*"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["*"]
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["*"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["*"]
- apiGroups: ["cert-manager.io"]
  resources: ["certificates", "issuers", "clusterissuers"]
  verbs: ["*"]
- apiGroups: ["policy"]
  resources: ["poddisruptionbudgets"]
  verbs: ["*"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["*"]
