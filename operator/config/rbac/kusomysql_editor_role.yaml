# permissions for end users to edit kusomysqls.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusomysql-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomysqls
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomysqls/status
  verbs:
  - get
