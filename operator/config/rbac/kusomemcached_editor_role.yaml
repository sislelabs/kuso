# permissions for end users to edit kusomemcacheds.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusomemcached-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomemcacheds
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomemcacheds/status
  verbs:
  - get
