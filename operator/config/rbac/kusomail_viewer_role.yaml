# permissions for end users to view kusomails.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusomail-viewer-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomails
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomails/status
  verbs:
  - get
