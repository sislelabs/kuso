# permissions for end users to edit kusokafkas.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusokafka-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusokafkas
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusokafkas/status
  verbs:
  - get
