# permissions for end users to edit kusomails.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusomail-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomails
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomails/status
  verbs:
  - get
