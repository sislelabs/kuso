# permissions for end users to edit kusoapps.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusoapp-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoapps/status
  verbs:
  - get
