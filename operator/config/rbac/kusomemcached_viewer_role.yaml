# permissions for end users to view kusomemcacheds.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kusomemcached-viewer-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomemcacheds
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusomemcacheds/status
  verbs:
  - get
