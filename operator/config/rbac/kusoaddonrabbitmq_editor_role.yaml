# This rule is not used by the project kuso-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the application.kuso.sislelabs.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kuso-operator
    app.kubernetes.io/managed-by: kustomize
  name: kusoaddonrabbitmq-editor-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoaddonrabbitmqs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoaddonrabbitmqs/status
  verbs:
  - get
