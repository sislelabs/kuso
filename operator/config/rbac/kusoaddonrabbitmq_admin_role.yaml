# This rule is not used by the project kuso-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over application.kuso.sislelabs.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kuso-operator
    app.kubernetes.io/managed-by: kustomize
  name: kusoaddonrabbitmq-admin-role
rules:
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoaddonrabbitmqs
  verbs:
  - '*'
- apiGroups:
  - application.kuso.sislelabs.com
  resources:
  - kusoaddonrabbitmqs/status
  verbs:
  - get
