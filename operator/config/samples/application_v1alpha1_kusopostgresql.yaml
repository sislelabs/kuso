apiVersion: application.kuso.sislelabs.com/v1alpha1
kind: KusoPostgresql
metadata:
  name: kusopostgresql-sample
spec:
  # Default values copied from <project_dir>/helm-charts/kusopostgresql/values.yaml
  postgresql:
    global:
      storageClass: ""
      postgresql:
        auth:
          postgresPassword: ""
          username: ""
          password: ""
          database: ""

    primary:
      persistence:
        ## @param primary.persistence.size PVC Storage Request for PostgreSQL volume
        ##
        size: 8Gi